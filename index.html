"1958–2006","reg":"俄罗斯","q":"她在公寓电梯里被枪杀。那天是普京的生日。","body":"Anna Politkovskaya是《新报》(Novaya Gazeta)的记者，专注报道车臣战争中俄军对平民的暴行——酷刑、法外处决、\"过滤营\"里的失踪。她多次前往车臣战区采访，2004年在飞往别斯兰人质事件现场的航班上被下毒，险些死亡。她写了《普京的俄罗斯》一书，称普京治下的俄罗斯正在\"滑向苏联式极权\"。2006年10月7日——普京54岁生日——她在莫斯科公寓楼的电梯里被人近距离射杀。凶手后来被抓获并定罪，但外界普遍认为幕后主使从未被追究。普京在她遇害后的记者会上说：\"她的影响力极其微小。\"她的同事在《新报》继续她的报道方向——其中多人后来也遭遇暗杀或威胁。2021年《新报》主编穆拉托夫获得诺贝尔和平奖，被普遍视为对Politkovskaya遗志的致敬。","ref":"Anna Politkovskaya《Putin's Russia》(2004)","lat":56,"lng":38},{"id":"jour_07","pool":"journalism","poolLabel":"新闻与出版","name":"Gloria Steinem","cn":"格洛丽亚·斯泰纳姆","era":"1934–","reg":"美国","q":"她在33岁时假扮花花公子兔女郎，卧底了三个星期。","body":"1963年，Gloria Steinem以\"Marie Catherine Ochs\"的假名应聘纽约花花公子俱乐部兔女郎，成功入职。三周里她穿着紧身兔装——连体泳衣式制服要求\"干棉花填充胸部以营造效果\"——端盘子、陪笑脸、忍受客人动手动脚。她把这段经历写成了《I Was a Playboy Bunny》，揭露了光鲜外表下的低薪、骚扰和剥削。这篇文章让她一夜成名，但也让她被长期贴上\"那个兔女郎记者\"的标签。她花了此后的半个世纪来证明自己不只是那篇文章。1971年她联合创办了《Ms.》杂志——美国第一本由女性创办、为女性发声的主流杂志，首期30万份在8天内售罄。她成为第二波女权运动最具辨识度的面孔，也因此成为最容易被攻击的靶子。有人说她\"太漂亮不像真正的女权主义者\"——好像长相好看是一种道德缺陷。她66岁结婚，嫁给了南非裔英国商人David Bale，三年后丈夫病逝。","ref":"Gloria Steinem《My Life on the Road》(2015)","lat":39,"lng":-98},{"id":"jour_08","pool":"journalism","poolLabel":"新闻与出版","name":"Marie Colvin","cn":"玛丽·科尔文","era":"1956–2012","reg":"美国","q":"她在斯里兰卡失去了一只眼睛。然后她戴着眼罩继续报道下一场战争。","body":"2001年，Marie Colvin在斯里兰卡报道泰米尔猛虎组织的冲突时被手榴弹碎片击中左眼，永久失明。此后她戴着标志性的黑色眼罩继续工作——伊拉克、利比亚、叙利亚，她去的都是最危险的地方。她的采访重心永远是平民，不是将军和政客。2012年2月，她从叙利亚霍姆斯的临时新闻中心做了最后一次卫星连线，对着镜头说：\"今天在这座城市里，一个两岁的婴儿被杀了。这就是叙利亚政府声称的'对待恐怖分子的方式'。\"第二天，叙利亚政府军的炮弹精准击中了那个新闻中心——她和法国摄影师Rémi Ochlik当场死亡。后来的调查显示，叙利亚军方跟踪了她的卫星电话信号来定位。她被炸死的原因就是因为她在做她的工作——告诉世界真相。","ref":"Lindsey Hilsum《In Extremis: The Life and Death of the War Correspondent Marie Colvin》(2018)","lat":39,"lng":-98},{"id":"jour_09","pool":"journalism","poolLabel":"新闻与出版","name":"","cn":"汤修慧","era":"1902–1983","reg":"中国","q":"她在丈夫的报纸上打了中国报业史上第一场笔仗，对手是她丈夫的情妇。","body":"汤修慧是《新民报》创办人陈铭德的妻子，也是这份报纸的实际经营者。在那个女性鲜少出现在报业管理层的年代，她从校对做起，一步步成为报社的核心运营者。1940年代《新民报》在重庆发展为有全国影响力的民间报纸，这背后是汤修慧的经营能力。但真正让她进入公众视野的是另一件事：丈夫陈铭德有了外遇，对方也是文化圈中人。汤修慧没有选择忍耐或私下解决——她在自家报纸上发表文章公开回击，引发了中国近代报业史上第一场由女性主导的公共舆论战。这不只是一次私人恩怨的公开化，而是一个女人拒绝按照\"贤妻\"剧本行事的声明：你可以背叛我，但你不能让我沉默。","ref":"《新民报》史料；中国近代女性报人研究","lat":35,"lng":105},{"id":"jour_10","pool":"journalism","poolLabel":"新闻与出版","name":"陈鲁豫","cn":"鲁豫","era":"1970–","reg":"中国","q":"二十年来她做了上万场采访。最常被嘲笑的一句话是\"我不信\"。","body":"陈鲁豫可能是中国最被低估的访谈者。她被嘲笑了二十年——嘲笑她太瘦、嘲笑她\"尬聊\"、嘲笑她对嘉宾说\"我不信\"\"真的吗\"\"然后呢\"。但仔细看她的采访，那些看似敷衍的追问恰恰是最有效的技术：她不预设答案，不引导方向，用沉默和简单的反问给嘉宾空间去说出他们没打算说的话。她的节目《鲁豫有约》从2002年开播，做了超过四千期，从政商领袖到普通人。她是中国电视史上持续最久的访谈类节目主持人。嘲笑她容易，替代她很难——二十年来中国出了无数访谈节目，没有一个活过她。她本人很少回应争议，偶尔在节目里说一句\"我就是这样\"，然后继续问下一个问题。","ref":"《鲁豫有约》(2002–)","lat":35,"lng":105},{"id":"jour_11","pool":"journalism","poolLabel":"新闻与出版","name":"Katharine Graham","cn":"凯瑟琳·格雷厄姆","era":"1917–2001","reg":"美国","q":"丈夫自杀后她接手了华盛顿邮报。然后她做了两个让总统下台的决定。","body":"Katharine Graham的父亲在1933年买下了快要倒闭的《华盛顿邮报》。他没有把报纸交给女儿——\"没有男人应该给自己的妻子打工\"——而是交给了女婿Philip Graham。Philip才华横溢但饱受躁郁症折磨，1963年在家中自杀身亡。46岁的Katharine突然成了一家报纸的掌门人，而她此前的身份是社交名媛和四个孩子的母亲。她在回忆录里写道自己的第一反应是：\"我？不可能。\"但她接手了。1971年，她做了第一个决定：在联邦法官禁令下发表五角大楼文件——美国政府关于越战的秘密研究报告——这意味着如果败诉，她可能坐牢。1972年她做了第二个决定：支持两个年轻记者Woodward和Bernstein追查水门事件。尼克松政府威胁要吊销邮报旗下电视台的执照。她的律师朋友劝她收手。她没有。1974年尼克松辞职。Nora Ephron评价她的自传说：\"从女儿到妻子到寡妇到女人——她的旅程在某种惊人的程度上就是这个世纪女性的历史。\"","ref":"Katharine Graham《Personal History》(1997，普利策自传奖)；电影《The Post》(2017)","lat":39,"lng":-98},{"id":"jour_12","pool":"journalism","poolLabel":"新闻与出版","name":"","cn":"胡舒立","era":"1953–","reg":"中国","q":"《商业周刊》叫她\"中国最危险的女人\"。她不说狠话，只说事实。","body":"胡舒立的外公胡仲持是《申报》编辑，外公的哥哥胡愈之是鲁迅挚友、新中国首任出版总署署长。她1982年从人民大学新闻系毕业，进《工人日报》做调查记者。1998年创办《财经》杂志，用十一年时间把它打造成中国最具影响力的财经媒体——揭露基金黑幕、银行骗贷、上市公司造假，每一篇重磅报道都是深海炸弹。她的团队习惯花几周甚至几个月收集信息，等官方出了短讯再推出完整调查——先知先觉，乘势而动。2007年《谁的鲁能》报道触怒了\"不能得罪的人\"，网站被迫删稿、报摊撤刊。2009年因\"采编独立\"与投资方冲突，她从一手创办的《财经》辞职——174人的采编团队有147人跟她走，两个月后创办《财新》。马云和马化腾——从来不同槽的两个人——都入了股。2021年财新被从官方新闻稿源\"白名单\"中除名。她说过：\"这些年，我们坚持打造中国最值得信任的财经新闻媒体。\"这句话在中国的语境下，既是使命宣言，也是一种精确计算的政治行为。","ref":"胡舒立《舒立观察：中国十年之真问题》(2010)","lat":35,"lng":105}]},"espionage":{"label":"间谍与情报","cards":[{"id":"spy_01","pool":"espionage","poolLabel":"间谍与情报","name":"Mata Hari","cn":"玛塔·哈里","era":"1876–1917","reg":"荷兰","q":"她到底是不是间谍？一百年后法国还没给出一个让人信服的答案。","body":"Mata Hari的真名叫Margaretha Zelle，荷兰人，嫁了一个酗酒家暴的殖民军官，离婚后去巴黎跳脱衣舞谋生——她编造了一个异域身世，说自己是爪哇神庙的舞者，本名意为\"黎明之眼\"。1910年代的巴黎为她疯狂。一战期间她周旋于法、德、荷三国的军官和外交官之间——床上得到的信息比情报机关的多。1917年法国以间谍罪逮捕了她，证据极其薄弱：主要是她收了德国人给的钱（她说那是旧情人的礼物，不是间谍报酬）。军事法庭在没有充分证据的情况下判处死刑。行刑当天据说她拒绝蒙眼，朝行刑队飞了一个吻。她可能真的传递过情报，也可能只是一个在战争年代生存方式太过招摇的女人——法国需要一个替罪羊来解释前线的失败，一个有异国面孔的脱衣舞女是完美的靶子。2017年她的档案解密后，历史学家仍然分成两派。关于她的唯一确定结论是：她被杀害了。","ref":"Pat Shipman《Femme Fatale: Love, Lies, and the Unknown Life of Mata Hari》(2007)","lat":52.4,"lng":4.9},{"id":"spy_02","pool":"espionage","poolLabel":"间谍与情报","name":"Noor Inayat Khan","cn":"努尔·伊纳亚特·汗","era":"1914–1944","reg":"印度/英国","q":"她是一位苏菲派王子的后代、一个儿童文学作家。她自愿去做了纳粹占领区的间谍。","body":"Noor Inayat Khan的父亲是一位印度苏菲派音乐家和精神导师，母亲是美国人。她在巴黎长大，学音乐、写儿童故事，为法国广播电台创作童话。纳粹占领法国后她逃到英国，加入了英国特别行动处（SOE）。训练教官对她的评估并不好——说她\"不够强硬\"\"太情绪化\"\"不适合做间谍\"。但她是当时唯一一个能操作无线电发报机并且法语流利的女性候选人，于是被派往巴黎。她是SOE在巴黎的第一位女性无线电操作员。1943年她的同事们相继被捕，整个网络崩溃，伦敦命令她撤退——她拒绝了，独自坚持发报四个多月，是巴黎和伦敦之间唯一的通讯线。她最终被一个法国女人出卖，被盖世太保逮捕。审讯中她什么也没说。她试图逃跑两次。1944年9月她被送到达豪集中营，跪在地上被枪杀。据目击者说，她最后喊出的一个词是\"Liberté\"。她被追授了乔治十字勋章——英国平民最高荣誉。","ref":"Shrabani Basu《Spy Princess: The Life of Noor Inayat Khan》(2006)","lat":22,"lng":78},{"id":"spy_03","pool":"espionage","poolLabel":"间谍与情报","name":"Virginia Hall","cn":"弗吉尼亚·霍尔","era":"1906–1982","reg":"美国","q":"她有一条假腿。盖世太保称她为\"盟军最危险的间谍\"。","body":"Virginia Hall在读研究生时因为一次狩猎事故，左腿膝盖以下被截肢。她装了一条木制假腿，给它取名\"Cuthbert\"。这条假腿没有阻止她做任何事——但当她申请加入美国外交部时，被告知\"残疾人不能当外交官\"。二战爆发后她加入了英国SOE，被派往法国维希政权控制区。她用记者身份做掩护，建立了一整套抵抗网络：安全屋、逃亡路线、情报传递系统。盖世太保知道有一个假腿的美国女人在搞破坏，发布通缉令称她为\"盟军最危险的间谍\"，命令\"必须不惜一切代价找到并消灭这个跛脚的女人\"。1942年她不得不翻越比利牛斯山脉逃入西班牙——冬天、高山、一条假腿。她发给伦敦的电报说：\"Cuthbert给我造成了不少麻烦。\"伦敦不知道Cuthbert是假腿，回电说：\"如果Cuthbert给你造成麻烦，把他干掉。\"1944年她重返法国，这次代表美国OSS（CIA前身），继续组织抵抗力量直到解放。战后她成为CIA最早的女性特工之一。她从不谈论自己的经历，死后才逐渐被公众知晓。","ref":"Sonia Purnell《A Woman of No Importance: The Untold Story of the American Spy Who Helped Win World War II》(2019)","lat":39,"lng":-98},{"id":"spy_04","pool":"espionage","poolLabel":"间谍与情报","name":"Nancy Wake","cn":"南希·韦克","era":"1912–2011","reg":"新西兰/澳大利亚","q":"盖世太保悬赏五百万法郎捉她。她在路上调情过关卡，手刃过党卫军哨兵。","body":"Nancy Wake是二战中盟军获勋最多的女军人。盖世太保叫她\"白鼠\"——因为她像老鼠一样滑溜，怎么也抓不到。她的丈夫Henri Fiocca是法国富商，夫妻俩一起帮助数百名盟军飞行员和战俘从法国逃往西班牙。1943年她逃到英国接受SOE训练，1944年跳伞回法国——伞挂在树上，法国游击队长说\"今年法国的树都结出这么美的果子就好了\"。她回答：\"别跟我来那套法国屎话。\"她指挥7500名游击队员，和两万两千名党卫军作战，造成1400名敌军伤亡，己方只损失约100人。一次突袭中一个党卫军哨兵发现了她的队伍，她用SOE教的手刀一击——\"啪\"——把他打死了。她后来说：\"我真的很惊讶。\"过德军检查站时她的策略是擦粉涂口红，冲卫兵抛媚眼说\"要搜身吗？\"她自称是\"一个爱调情的小混蛋\"。战后她才得知丈夫Henri早在1943年就被盖世太保逮捕、审讯、处决了——他至死没有说出她的下落。","ref":"Peter FitzSimons《Nancy Wake: A Biography of Our Greatest War Heroine》(2001)","lat":-25,"lng":134},{"id":"spy_05","pool":"espionage","poolLabel":"间谍与情报","name":"Josephine Baker","cn":"约瑟芬·贝克","era":"1906–1975","reg":"美国/法国","q":"她用别在内衣上的隐形墨水纸条传递情报。她说：\"法国让我成了我自己。我愿意为她而死。","body":"Josephine Baker在密苏里州圣路易斯的贫民区长大，12岁开始在街头表演，20岁去了巴黎，一夜之间成为欧洲最耀眼的黑人歌舞明星——她穿着香蕉裙跳舞的画面成了爵士时代的标志。法国给了她在美国永远不可能得到的东西：自由和尊严。所以当二战爆发，她毫不犹豫地为法国做间谍。她的方法极其巧妙：作为明星她可以自由出入各国外交派对，和军官、外交官聊天——没人怀疑一个歌舞女郎在收集情报。她把偷来的地图和情报用隐形墨水抄在乐谱上，把纸条别在内衣里，利用演出巡回穿越国境。战后戴高乐亲自授予她荣誉军团勋章和战争十字勋章。她把一生的积蓄用来领养了12个来自不同国家和种族的孩子——她叫他们\"彩虹部落\"，用来证明不同种族可以作为一个家庭生活在一起。1963年她是马丁·路德·金\"我有一个梦想\"演讲当天唯一在台上发言的女性。2021年她被移入先贤祠——第六位入葬先贤祠的女性，第一位黑人女性。","ref":"纪录片《Josephine Baker: The Story of an Awakening》(2018)","lat":39,"lng":-98},{"id":"spy_06","pool":"espionage","poolLabel":"间谍与情报","name":"","cn":"关露","era":"1907–1982","reg":"中国","q":"她接受了一个任务：打入汪伪特务机关做地下工作。代价是一辈子的\"汉奸\"骂名。","body":"1930年代的上海，关露是和丁玲齐名的左翼女作家，写诗、写小说，在文坛崭露头角。1939年，中共地下党组织给她一个特殊任务：利用她的社交关系打入汪精卫伪政权的特务机构\"76号\"（极司菲尔路76号），搜集情报。这意味着她必须公开出现在汉奸聚会上，和日伪人员交往，发表亲日言论——同时在暗中传递情报。她接受了。此后她在日伪控制的杂志上发表文章，参加日方组织的\"大东亚文学者大会\"——每一次公开露面都在加固她\"汉奸文人\"的标签。抗战结束后，尽管组织上清楚她的身份，但她的\"汉奸\"名声已经无法公开澄清——地下工作的性质决定了她不能被平反而不暴露情报网络。此后几十年她反复被审查、被批斗、被关押。文革中她被打成\"日本特务\"，关押多年。1982年，在得到正式平反的消息之前不久，她在北京的一间小屋里服安眠药自杀，身边放着一面小镜子和一束野花。她的一生是关于\"不能说的秘密\"的悲剧——她的牺牲不在战场上，在于几十年默默承受一个她不能解释的误解。","ref":"关露诗集；上海地下党史料","lat":35,"lng":105}]},"environment":{"label":"环保与动物保护","cards":[{"id":"env_01","pool":"environment","poolLabel":"环保与动物保护","name":"Rachel Carson","cn":"蕾切尔·卡森","era":"1907–1964","reg":"美国","q":"她写了一本书，化工行业花了几百万美元说她是个\"疯女人\"。然后DDT被禁了。","body":"1962年，Rachel Carson出版了《寂静的春天》——这本书描述了DDT等化学农药如何通过食物链在动物体内累积，导致鸟类蛋壳变薄、无法孵化，最终会带来一个\"没有鸟叫的春天\"。化工行业震怒。他们花了超过25万美元（1960年代的25万）发动公关反击：说她是\"歇斯底里的女人\"，说她\"不是真正的科学家\"（她是海洋生物学家），说她\"想把人类送回黑暗时代\"。有人暗示她的\"情绪化\"源于她未婚。美国化学学会甚至出了一本小册子来逐条反驳她。但她的科学数据是扎实的。肯尼迪总统下令调查，总统科学顾问委员会的报告支持了她的结论。1972年美国禁止了DDT的农业使用。Carson没有等到这一天——她在1964年死于乳腺癌，只有56岁。在生命最后两年里她一边化疗一边出席国会听证会为自己的研究辩护。她被称为\"现代环保运动之母\"——整个环境保护运动、EPA（美国环保署）的成立、地球日的创设，都可以追溯到这本书。","ref":"Rachel Carson《Silent Spring》(1962)","lat":39,"lng":-98},{"id":"env_02","pool":"environment","poolLabel":"环保与动物保护","name":"Jane Goodall","cn":"简·古道尔","era":"1934–","reg":"英国","q":"她没有大学文凭就去了非洲研究黑猩猩。她发现了改写人类定义的事实。","body":"1960年，26岁的Jane Goodall到达坦桑尼亚的贡贝溪保护区时，她没有大学学位——只有一个秘书文凭和对动物的狂热。古人类学家Louis Leakey选中她恰恰是因为她没受过学术训练——他认为一个没有先入之见的头脑更容易看到真相。Goodall很快看到了所有人都没看到的东西：她观察到黑猩猩用草茎从白蚁丘里\"钓\"白蚁吃——这是制造和使用工具。在此之前\"人类\"的定义之一就是\"会使用工具的动物\"。她给Leakey发了电报，Leakey回复：\"现在我们必须重新定义'工具'，重新定义'人类'，或者接受黑猩猩是人。\"她还发现黑猩猩有个性、有情感、有社会结构、会打仗、会互相残杀——这些发现打破了\"只有人类会有组织地暴力\"的神话。学术界最初拒绝接受她的研究——批评她\"给研究对象取名字而不是编号\"，说她拟人化了。她说：\"他们告诉我作为科学家不该有感情。但我觉得他们错了。\"她后来补了一个剑桥博士学位——是剑桥历史上第八个没有本科学位直接读博的人。","ref":"Jane Goodall《In the Shadow of Man》(1971)","lat":52,"lng":-1},{"id":"env_03","pool":"environment","poolLabel":"环保与动物保护","name":"Dian Fossey","cn":"黛安·弗西","era":"1932–1985","reg":"美国","q":"她在卢旺达的山上和大猩猩生活了十八年。然后被人用砍刀杀死在自己的小屋里。","body":"Dian Fossey最初是肯塔基州的一名职业治疗师，和Jane Goodall一样没有灵长类学背景。1966年她在非洲见到了Louis Leakey——Leakey在派Goodall研究黑猩猩之后，又在寻找一个人去研究山地大猩猩。Fossey自愿前往。她在卢旺达维龙加火山群的雾中建立了卡里索凯研究中心，在海拔三千多米的山上和大猩猩为邻十八年。她学会模仿大猩猩的行为——用指节敲胸、发出低沉的咕噜声——直到银背大猩猩接受了她的存在。她最著名的照片是一只大猩猩伸手触碰她的手指。但研究不是田园诗。偷猎者为了取大猩猩的头和手做纪念品（卖给收藏家），每年杀死大量大猩猩。Fossey从劝阻转向对抗，甚至亲自带队巡逻、销毁陷阱、逮捕偷猎者——这让她树敌无数。1985年12月，她在小屋中被人用砍刀砍死。凶手至今没有被确认。她被埋葬在研究站旁边，和她命名的大猩猩\"Digit\"的坟墓并排。她死后山地大猩猩的保护获得了前所未有的国际关注——物种数量从她生前的250只恢复到如今的一千多只。","ref":"Dian Fossey《Gorillas in the Mist》(1983)；同名电影 (1988)","lat":39,"lng":-98},{"id":"env_04","pool":"environment","poolLabel":"环保与动物保护","name":"Wangari Maathai","cn":"旺加里·马塔伊","era":"1940–2011","reg":"肯尼亚","q":"她种了五千万棵树。政府说她是\"疯女人\"，丈夫和她离婚因为\"她太强势了\"。","body":"Wangari Maathai是东非第一位获得博士学位的女性（内罗毕大学，兽医解剖学），也是第一位非洲女性诺贝尔和平奖获得者（2004年）。1977年她创立了绿带运动（Green Belt Movement），从一个简单的想法开始：让农村妇女种树。树可以防止水土流失、提供燃料和食物、改善微气候。但种树在肯尼亚变成了政治行为——因为森林被政客和开发商瓜分，种树意味着对抗土地掠夺。Maathai组织妇女在被非法圈占的公共土地上种树，被警察殴打、被催泪瓦斯驱散、被多次逮捕。肯尼亚总统Daniel arap Moi公开称她为\"疯女人\"和\"对男人的威胁\"。她的丈夫和她离婚，理由是\"她受了太多教育，太难控制\"——法官支持了丈夫，Maathai因为在法庭上批评法官不公而被判入狱。她在生命中种下了超过五千万棵树，同时推动了肯尼亚的民主运动和女性政治参与。她说：\"当我们种下一棵树，我们种下的是和平与希望的种子。\"","ref":"Wangari Maathai自传《Unbowed》(2006)","lat":-1,"lng":37},{"id":"env_05","pool":"environment","poolLabel":"环保与动物保护","name":"Sylvia Earle","cn":"西尔维亚·厄尔","era":"1935–","reg":"美国","q":"她在水下381米处独自行走，是有史以来人类在没有连接母船的情况下到达的最深处。","body":"1979年，Sylvia Earle穿着一套叫\"JIM\"的加压潜水服，被一根绳子从潜水艇上放下，在太平洋水下381米的海床上独自行走了两个半小时。没有连接母船的脐带——她完全独立。这个深度纪录至今未被打破。她看到的是一个从未被人类眼睛看到的世界：发光的珊瑚、半透明的鱼、在完全黑暗中闪烁的海洋生物。她后来成为NOAA（美国国家海洋和大气管理局）第一位女性首席科学家。她的职业生涯跨越了超过七十年——领导了100多次科考，在水下累计待了超过7000小时。她说海洋是\"地球的蓝色心脏\"——它产生地球一半以上的氧气，吸收大量二氧化碳，调节全球气候。她见证了半个世纪里海洋的急剧退化，用\"Her Deepness\"这个绰号获得的所有公众影响力来推动海洋保护。她创建了\"Mission Blue\"项目，致力于在全球建立海洋保护区。90岁了还在潜水。","ref":"纪录片《Mission Blue》(2014, Netflix)","lat":39,"lng":-98},{"id":"env_06","pool":"environment","poolLabel":"环保与动物保护","name":"Vandana Shiva","cn":"范达娜·希瓦","era":"1952–","reg":"印度","q":"她是孟山都最讨厌的女人。争议从来没有让她闭嘴。","body":"Vandana Shiva是量子物理学博士，但让她成名的不是物理学——是种子。1980年代她开始研究跨国农业公司如何通过专利垄断种子，迫使印度农民从自留种转向购买每年必须重新购买的专利种子（因为这些种子被设计为无法自然繁殖）。她称之为\"生物海盗\"——跨国公司把印度农民世代培育的传统作物品种申请专利，然后反过来向农民收费。她创建了Navdanya（\"九种作物\"）运动，在印度各地建立种子银行，保存了数千种本土作物品种。她的观点极其尖锐：她把转基因种子和全球化农业称为\"对小农的战争\"，指控孟山都等公司是印度农民大规模自杀潮的推手。争议也从未停止——批评者说她夸大了转基因的危害、误用了农民自杀的统计数据、对现代农业科学持不公正的敌意。她被《时代》评为\"环境英雄\"，同时被科学记者Mark Lynas称为\"也许是世界上最有影响力的反科学活动家\"。不管站在哪一边，没有人否认她成功地把种子主权变成了一个全球性的政治议题。","ref":"Vandana Shiva《Stolen Harvest: The Hijacking of the Global Food Supply》(2000)","lat":22,"lng":78}]},"fashion":{"label":"时尚作为政治表达","cards":[{"id":"fash_01","pool":"fashion","poolLabel":"时尚作为政治表达","name":"Elsa Schiaparelli","cn":"艾尔莎·夏帕瑞丽","era":"1890–1973","reg":"意大利/法国","q":"Chanel说她的衣服是\"做衣服的意大利艺术家\"。她说Chanel的衣服是\"无聊的小黑裙\"。","body":"Elsa Schiaparelli是Coco Chanel一生中唯一真正畏惧的对手。1930年代的巴黎时尚界被这两个女人劈成两半：Chanel代表优雅克制，Schiaparelli代表疯狂和超现实。她和达利合作设计了\"龙虾裙\"——温莎公爵夫人穿着它拍了杂志封面。她做了一顶鞋子形状的帽子、一件嵌了抽屉把手的西装、一瓶女人身体形状的香水（\"Shocking\"，那个粉色至今叫\"Schiaparelli粉\"）。她把拉链从功能件变成了装饰——第一个这样做的人。Chanel私下叫她\"那个做衣服的意大利艺术家\"——这是最高级别的蔑视，暗示她不是真正的时装设计师。但Schiaparelli的野心从来不在于\"做衣服\"——她要做的是穿在身上的艺术、穿在身上的宣言、穿在身上的冒犯。二战期间她流亡美国，战后回到巴黎试图重振品牌但未能成功。Chanel赢了商业战，但Schiaparelli赢了美学战——如今时尚界每一件\"奇装异服\"都是她的后裔。","ref":"Elsa Schiaparelli自传《Shocking Life》(1954)","lat":47,"lng":2},{"id":"fash_02","pool":"fashion","poolLabel":"时尚作为政治表达","name":"Vivienne Westwood","cn":"薇薇安·韦斯特伍德","era":"1941–2022","reg":"英国","q":"她发明了朋克时尚。然后她穿着没有内裤的裙子去白金汉宫接受女爵士封号。","body":"1976年，Vivienne Westwood和Malcolm McLaren在伦敦国王路430号开了一家店，名字叫\"SEX\"。店里卖的是用安全别针、垃圾袋和铁链做的衣服。朋克不是从音乐开始的——它是从这家店开始的。Sex Pistols的第一批成员就是这家店的常客和店员。Westwood把\"愤怒\"变成了一种美学：撕裂、颠覆、冒犯，拒绝一切\"好品味\"。但她不是一个只会破坏的人——她后来转向了英国历史服装的研究，用18世纪的束腰和裙撑做出了全新的轮廓。1992年她去白金汉宫接受OBE勋章，穿了一条裙子，没穿内裤，在宫门口转圈让摄影师拍到了。她说那是\"为了舒适\"。晚年她把全部精力投入环保和气候运动——她说过\"买得少，选择好，让它持久\"（Buy less, choose well, make it last），这句话成了反快时尚运动的口号。2022年她去世时，朋克已经从地下运动变成了博物馆展品，但她从来没变过——始终是那个用衣服骂人的老太太。","ref":"Ian Kelly《Vivienne Westwood》(2014)","lat":52,"lng":-1},{"id":"fash_03","pool":"fashion","poolLabel":"时尚作为政治表达","name":"Rei Kawakubo","cn":"川久保玲","era":"1942–","reg":"日本","q":"1981年巴黎时装周，她的模特穿着破洞、不对称、像被炸过的黑色衣服走上T台。媒体说她在展示\"广岛时尚\"。","body":"1981年，川久保玲第一次带着Comme des Garçons参加巴黎时装周。T台上的模特穿着全黑——破洞、不对称、故意做旧、像被战争轰炸过——没有性感曲线，没有亮丽色彩，和当时巴黎崇尚的华丽、合身、女性化风格完全相反。法国媒体震惊了，有记者写\"广岛时尚\"（Hiroshima chic）——这是赤裸裸的种族歧视式评论，暗示一个日本人只能做出看起来像废墟的东西。川久保玲没有回应。她几乎从不接受采访，从不解释自己的设计。她说过的最有名的一句话是：\"我一直在做和以前不同的东西。\"——这不是谦虚，是方法论。她的每一季设计都在试图打破自己上一季建立的东西。2017年Met Gala以她为主题——\"Rei Kawakubo / Comme des Garçons: Art of the In-Between\"——她是第二位在世时就获得Met个展的设计师（上一位是Yves Saint Laurent，1983年）。她至今不退休，不授权回忆录，不参加派对。","ref":"Andrew Bolton《Rei Kawakubo / Comme des Garçons: Art of the In-Between》(2017)","lat":36,"lng":138},{"id":"fash_04","pool":"fashion","poolLabel":"时尚作为政治表达","name":"Katharine Hamnett","cn":"凯瑟琳·哈姆内特","era":"1947–","reg":"英国","q":"她穿着一件反核T恤去唐宁街10号见撒切尔。撒切尔\"发出了一声像鸡一样的尖叫\"。","body":"1984年3月，伦敦时装周刚刚创立，首相撒切尔夫人在唐宁街10号举办招待会庆祝。Katharine Hamnett知道这是一个顶级的媒体曝光机会——她在办公室里用几小时赶制了一件超大号T恤，字体抄的是《太阳报》的标题字号，因为\"远处也看得清\"。上面印着：\"58% DON'T WANT PERSHING\"——引用的是民调数据，58%的欧洲民众反对美国在欧洲部署潘兴核导弹。她把T恤藏在外套里，到了唐宁街声称太冷不脱外套，排队和设计师们一起等待握手。轮到她时，她敞开外套露出T恤，伸出手。现场摄影师的闪光灯疯了。撒切尔读完字后\"发出了一声像鸡一样的尖叫\"，然后说了句\"终于有个有创意的人了\"。此后整个晚上Hamnett追着撒切尔想讨论酸雨问题，撒切尔\"像猫捉老鼠一样\"躲她。最后撒切尔说：\"我是一个科学家，我不知道什么导致了酸雨。\"那件T恤现在收藏在维多利亚与阿尔伯特博物馆。Hamnett此后成为时尚界最早的环保主义者之一——她说标语T恤是\"最民主的政治表达形式\"。","ref":"V&A博物馆 Katharine Hamnett T恤藏品；Google Arts & Culture 1984年照片","lat":52,"lng":-1},{"id":"fash_05","pool":"fashion","poolLabel":"时尚作为政治表达","name":"Bethann Hardison","cn":"贝丝安·哈迪森","era":"1942–","reg":"美国","q":"你知道黑人女孩也结婚吗？\"她这样问一本只用白人模特的婚纱杂志。","body":"Bethann Hardison不是设计师。她是时尚界的民权运动者。1973年凡尔赛宫时装对决——法国设计师对阵美国设计师——美国队派出了近十位黑人模特，这在当时是史无前例的。Hardison就是其中之一。那场秀让美国时尚在国际上一战成名，也让她看到了黑人模特在这个行业里的位置有多脆弱——一次性的、象征性的、随时可以被替换的。她后来开了自己的模特经纪公司，推出了Tyson Beckford等黑人模特。但行业的结构性种族歧视没有改变。设计师找她的公司选人时说：\"我们已经选了一个黑人女孩了，不再需要了。\"她回答：\"你觉得这有多不合适？\"2013年她和Naomi Campbell、Iman一起成立了Diversity Coalition，写了一封公开信给纽约、伦敦、巴黎、米兰四大时装周的管理机构，逐个点名那些整季秀场上一个有色人种模特都没有的品牌。信中写道：\"无论意图如何，结果就是种族主义。\"她不要\"全黑人秀\"作为补偿——\"请不要给我一场全黑人秀。这是关于多元化——所有国籍、种族、肤色被平等对待。\"","ref":"纪录片《Invisible Beauty》(2023)","lat":39,"lng":-98},{"id":"fash_06","pool":"fashion","poolLabel":"时尚作为政治表达","name":"","cn":"马可","era":"1971–","reg":"中国","q":"她把亚麻衣服埋在贵州的泥土里半年，然后挖出来运到巴黎时装周展示。","body":"2007年，马可成为第一位受邀参加巴黎高级时装周的中国设计师。她带去的作品叫《无用之土地》——纯亚麻的衣服，埋在泥土里将近半年，让它们被土地浸染、侵蚀、着色，然后取出来，让非专业模特穿着走上T台。巴黎时装界不知道该怎么反应。同年贾樟柯为她拍了纪录片《无用》，获威尼斯电影节最佳纪录片。2013年彭丽媛出访时穿的服装由马可和\"无用\"团队专门定制——纯手工、天然面料、零污染。一夜之间全国都知道了她的名字。但马可没有顺势做大品牌。她去了贵州和珠海，和农村手工匠人一起生活，研习濒临消失的传统纺织和染色技术。她在北京开了一个\"无用生活空间\"——不是商店，是展厅、素食餐厅和手作工坊的合体。她收集了450多双中国百年老鞋做了一个展览，一针一线修补那些断裂的边缘。她的前夫毛继鸿经营着商业品牌\"例外\"，她离开了那个世界，选择了\"无用\"——这个名字本身就是她的宣言：在一个\"有用\"被等同于商业价值的时代，她站在反面。","ref":"贾樟柯纪录片《无用》(2007)；北京\"无用生活空间\"","lat":35,"lng":105}]},"education":{"label":"女性教育先驱","cards":[{"id":"edu_01","pool":"education","poolLabel":"女性教育先驱","name":"Savitribai Phule","cn":"萨维特丽拜·普勒","era":"1831–1897","reg":"印度","q":"她是印度第一位女教师。每天走去学校的路上，人们朝她扔石头和牛粪。","body":"1848年，17岁的Savitribai Phule和丈夫Jyotirao在印度浦那开办了第一所女子学校——那是一个种姓制度和性别隔离根深蒂固的社会，低种姓女性受教育被视为对神明的冒犯。Savitribai每天步行去学校，路上高种姓的人朝她扔石头、泥巴和牛粪。她随身多带一件纱丽，到学校换上干净的那件再上课。她和丈夫创办了18所学校，还开设了印度第一家专门收容被遗弃的寡妇和孤儿的庇护所。当时印度寡妇的选择只有两个：殉葬或被社会驱逐。她们的家人因此和他们断绝关系，婆罗门祭司诅咒他们。1897年浦那爆发鼠疫，Savitribai带着养子（一个被遗弃的婆罗门寡妇生的孩子）治疗病人，自己感染了鼠疫去世。印度邮政1998年为她发行了纪念邮票。","ref":"Savitribai Phule诗集；印度第一批女子学校史料","lat":22,"lng":78},{"id":"edu_02","pool":"education","poolLabel":"女性教育先驱","name":"Fatima al-Fihri","cn":"法蒂玛·菲赫里","era":"约800–880","reg":"突尼斯/摩洛哥","q":"公元859年，她创建了世界上第一所大学。比牛津早了三百年。","body":"大多数人以为最古老的大学在欧洲——牛津（1096年）或博洛尼亚（1088年）。实际上，吉尼斯世界纪录认定的\"世界上现存最古老的、持续运营的高等教育机构\"在摩洛哥非斯：卡鲁因大学（Al-Qarawiyyin），创建于公元859年，创建者是一个从突尼斯移民来的女人。Fatima al-Fihri的父亲是成功商人，去世后留给她和姐姐Mariam大笔遗产。姐姐建了安达卢斯清真寺，Fatima用自己的那份财产买下非斯市中心香料市场旁的地块，亲自监督了长达两年的建造。她以出生地凯鲁万命名这所清真寺和学校——Qarawiyyin意为\"属于凯鲁万人\"。斋月第一天，她和姐姐一起奠基。学校很快发展成伊斯兰黄金时代最重要的学术中心之一，鼎盛时期有八千多名学生，图书馆藏书超过三万卷。它率先引入了按学科授予学位的制度。2016年，女建筑师Aziza Chaouni主导修复了卡鲁因的古老图书馆，里面保存着可能是世界上最古老的医学学位证书（1207年）。一个女人建的大学，一千多年后由另一个女人修复。","ref":"UNESCO \"Memory of the World\" 系列；World History Encyclopedia专题","lat":34,"lng":-5},{"id":"edu_03","pool":"education","poolLabel":"女性教育先驱","name":"Mary Lyon","cn":"玛丽·里昂","era":"1797–1849","reg":"美国","q":"1837年，她创办了美国第一所女子高等教育机构。入学条件只有一个：你得通过考试。","body":"Mary Lyon在麻省的一个农场长大，父亲在她五岁时去世。她从13岁开始教书——因为在当时的美国，教书是穷女孩唯一能做的体面工作。但她想要的不只是教书，她想要建一所女子学校——不是教礼仪和刺绣的\"精修学校\"，而是和男子大学一样教科学、数学和古典学的真正的高等教育机构。她花了四年时间筹款，挨家挨户敲门，从农民和工人那里募集小额捐款——因为富人不相信女人需要高等教育。1837年Mount Holyoke Female Seminary开学，第一年就有80名学生。Lyon坚持一件事：入学不看家庭背景，只看入学考试成绩。学费刻意定得很低，学生要参加学校的家务劳动来降低运营成本——这在当时被嘲笑为\"不淑女\"。她死于1849年，只有52岁。Mount Holyoke后来成为美国\"七姐妹\"名校之一，培养了Emily Dickinson和Frances Perkins（美国第一位女性内阁部长）。","ref":"Amanda Porterfield《Mary Lyon and the Mount Holyoke Missionaries》","lat":39,"lng":-98},{"id":"edu_04","pool":"education","poolLabel":"女性教育先驱","name":"","cn":"吴贻芳","era":"1893–1985","reg":"中国","q":"1945年，她代表中国在《联合国宪章》上签字——在场唯一的女性。","body":"吴贻芳11岁丧父，姐姐因包办婚姻投河自尽，她自己也一度想要自杀。后来她进入金陵女子大学读书，一路读到美国密歇根大学博士。1928年回国出任金陵女子大学校长——中国第一位女大学校长。在她主政的23年里，金陵女大培养了999名毕业生（她笑称\"差一个就一千\"），遍布教育、医学、科学各领域。抗战期间学校内迁成都，她一边维持教学一边组织师生参与救济工作。1945年，她作为中国代表团成员出席旧金山联合国制宪会议，在《联合国宪章》上签字——她是当天在场签字的唯一一位女性。新中国成立后她继续投身教育和妇女工作，文革中遭受冲击。她一生未婚，把全部精力交给了教育事业。","ref":"金陵女子大学校史；联合国宪章签署历史","lat":35,"lng":105},{"id":"edu_05","pool":"education","poolLabel":"女性教育先驱","name":"Malala Yousafzai","cn":"马拉拉·优素福扎伊","era":"1997–","reg":"巴基斯坦","q":"塔利班朝一个15岁女孩的头开了枪。因为她想上学。","body":"2012年10月9日，一名塔利班枪手登上巴基斯坦斯瓦特地区的一辆校车，问\"谁是Malala？\"然后朝她的头部开了三枪。子弹从她的左眼上方进入，穿过面部，嵌入肩部。Malala被空运到英国伯明翰接受救治，奇迹般活了下来。她当时15岁。在此之前，她从11岁起就用化名为BBC乌尔都语服务写博客，记录塔利班控制下女孩被禁止上学的日常——炸毁学校、威胁教师、强制蒙面。她的父亲是一名教育工作者，经营着一所女子学校，拒绝在塔利班的要求下关闭学校。枪击事件让Malala成为全球焦点。2014年她获得诺贝尔和平奖，17岁，是有史以来最年轻的获奖者。她在联合国的演讲中说：\"他们以为子弹会让我们沉默。但他们失败了。软弱、恐惧和绝望消亡了。力量、勇气和希望诞生了。\"她现在运营Malala Fund，致力于全球女童教育。","ref":"Malala Yousafzai《I Am Malala》(2013)","lat":30,"lng":69},{"id":"edu_06","pool":"education","poolLabel":"女性教育先驱","name":"","cn":"蔡畅","era":"1900–1990","reg":"中国","q":"她14岁拒绝包办婚姻，把聘礼退了回去。后来她成了中国妇女运动的组织者。","body":"蔡畅出生在湖南湘乡一个小地主家庭。14岁时家里给她定了一门亲事，她坚决拒绝，把聘礼退回，扬言如果再逼就出家当尼姑。她后来去了长沙读书，然后和哥哥蔡和森一起赴法勤工俭学。在法国她加入了中国共产党最早的组织之一。回国后她投身革命和妇女解放运动，长征时是随军的少数女性之一——翻雪山过草地，条件极其艰苦。新中国成立后她担任全国妇联主席长达二十余年，推动了《婚姻法》的颁布——废除包办买卖婚姻、禁止童养媳、确立婚姻自由。从拒绝自己的包办婚姻到为全国女性立法废除包办婚姻，她花了三十多年。","ref":"中华全国妇女联合会史料；长征女性口述史","lat":35,"lng":105},{"id":"edu_07","pool":"education","poolLabel":"女性教育先驱","name":"Maria Montessori","cn":"玛丽亚·蒙台梭利","era":"1870–1952","reg":"意大利","q":"她有一个秘密儿子。十四年里，她假装他不存在。","body":"Maria Montessori 13岁进了一所全男生的技术学校学工程。后来改主意学医——罗马大学最初拒绝了她。她想办法重新申请，最终在1896年成为意大利第一位获得医学学位的女性。在精神病院工作时她发现，那些被认为\"不可教育\"的智力障碍儿童，只要给他们合适的材料和环境，就能学会读写——有些孩子甚至通过了正常学校的标准考试。如果对\"不可教育\"的孩子有效，对正常孩子会怎样？这个问题催生了蒙台梭利教育法——如今全球有数万所蒙台梭利学校。但在这一切的背后有一个秘密：1898年她和同事Giuseppe Montesano生了一个儿子Mario。在当时的意大利，未婚母亲等于社会性死亡。她被迫把孩子送给乡下家庭抚养。十四年里她定期去看望Mario，但从未告诉他她是他的母亲。她先说他是侄子，后来说是养子。直到1940年在印度被英国殖民政府扣留，为了给Mario办释放手续，她不得不公开承认他是她的亲生儿子。法西斯政府烧了她的书、关了她的学校。她在印度被软禁了七年，在流亡中写出了她最重要的著作。她被提名过三次诺贝尔和平奖。","ref":"Rita Kramer《Maria Montessori: A Biography》(1976)","lat":42,"lng":12},{"id":"edu_08","pool":"education","poolLabel":"女性教育先驱","name":"Rokeya Sakhawat Hossain","cn":"罗琪亚·萨哈瓦特·侯赛因","era":"1880–1932","reg":"孟加拉（今孟加拉国）","q":"1905年，一个被关在闺阁里的穆斯林女人写了一篇科幻小说：男人被关起来，女人统治世界。","body":"1905年，25岁的Rokeya Sakhawat Hossain据说用一个下午写完了《Sultana's Dream》——一篇发表在《印度妇女杂志》上的英文短篇小说。故事里，主角Sultana梦见自己来到一个叫\"Ladyland\"的国度：女人在外面自由行走、做科学研究、管理国家，男人被关在家里——恰恰是purdah（闺阁制度）的镜像翻转。Ladyland没有战争，没有暴力，没有监狱。女科学家发明了太阳能发电、人工降雨和飞行汽车。这篇小说被认为是最早的女性主义科幻作品之一——比Charlotte Perkins Gilman的《Herland》早了十年。2024年UNESCO将它列入\"世界记忆\"名录。Rokeya自己就活在purdah之中——她的丈夫是一个开明的行政官员，鼓励她写作和接受教育。丈夫去世后她用遗产在加尔各答创办了Sakhawat Memorial女子学校（1911年），招收穆斯林女孩，至今仍在运营。她一生都在穆斯林女性教育和反purdah运动中挣扎，用孟加拉语和英语两种语言写作。她写过：\"我们不觊觎别人的土地，我们不为一颗钻石而战。我们潜入知识的海洋，寻找大自然为我们储藏的宝石。\"","ref":"Rokeya Sakhawat Hossain《Sultana's Dream》(1905)；UNESCO \"Memory of the World\" 2024","lat":23.7,"lng":90.4},{"id":"edu_09","pool":"education","poolLabel":"女性教育先驱","name":"","cn":"张桂梅","era":"1957–","reg":"中国","q":"她身患23种疾病，把近两千名山区女孩送进了大学。","body":"张桂梅不是云南人，她来自黑龙江。17岁支援边疆来到云南，此后再没离开。丈夫因病去世后她调到华坪教书，发现一个让她夜不能寐的现象：大量山区女孩在初中就辍学了——有的是因为贫穷，有的是因为家里收了彩礼要她嫁人。有一次家访路上她遇到一个十三四岁的女孩坐在路边发呆，问了才知道父母要她辍学嫁人换3万元彩礼。她想把女孩带走，女孩的母亲以死相逼。2008年，在各方支持下，全国第一所全免费女子高中——华坪女子高级中学——终于建成。此后十几年，她家访了1600多户，行程11万公里，把近两千名贫困山区女孩送进了大学，高考升学率100%。她的代价是自己的身体：骨瘤、肺纤维化、小脑萎缩——诊断书上密密麻麻列了23种疾病。体重从130多斤掉到90斤，双脚肿得穿不进鞋。右臂的肿瘤长了多年，她不肯做手术——\"做手术要休息一个多月，怕没我盯着学生成绩下滑。\"她是一个小学语文老师能理解的英雄——不是站在远处的传奇人物，而是每天5点半拿着小喇叭催学生起床的校长。","ref":"张桂梅华坪女高纪录片；人民日报专题报道","lat":35,"lng":105}]},"sports":{"label":"探险与体育","cards":[{"id":"sport_01","pool":"sports","poolLabel":"探险与体育","name":"Bessie Coleman","cn":"贝茜·科尔曼","era":"1892–1926","reg":"美国","q":"美国没有一所飞行学校收黑人女性。她学了法语，去了法国。","body":"Bessie Coleman是德克萨斯棉花地里长大的黑人女孩，13个孩子中排第十。她想当飞行员，但1920年代的美国没有一所飞行学校愿意招收黑人女性——肤色和性别，双重拒绝。她的解决方案是：学法语，申请法国的飞行学校。1921年她在巴黎获得了国际航空联合会颁发的飞行执照，成为世界上第一位持有国际飞行执照的非裔美国女性——也是第一位美洲原住民血统的持照女飞行员。回到美国后她成为特技飞行表演者，专门做翻筋斗、八字飞行和急速俯冲。她有一个原则：拒绝在实行种族隔离入场的场地表演——观众不分肤色坐在一起，否则她不飞。1926年在一次试飞中飞机坠毁，她从敞开的驾驶舱中被甩出，当场死亡，34岁。","ref":"Doris L. Rich《Queen Bess: Daredevil Aviator》(1993)","lat":39,"lng":-98},{"id":"sport_02","pool":"sports","poolLabel":"探险与体育","name":"Amelia Earhart","cn":"阿梅莉亚·埃尔哈特","era":"1897–1937（失踪）","reg":"美国","q":"她是第一个独自飞越大西洋的女性。然后她试图绕地球飞行，消失在了太平洋上空。","body":"1932年，Amelia Earhart独自驾机从纽芬兰飞到北爱尔兰，成为第一位单独飞越大西洋的女性——此前只有Charles Lindbergh做到过。降落时她问一个农场工人：\"请问这是哪里？\"1937年她开始了环球飞行计划，从东向西沿赤道飞行。7月2日，她从新几内亚起飞，目标是太平洋上的豪兰岛——一个不到两平方公里的珊瑚岛。然后她消失了。最后收到的无线电通讯是：\"我们正沿着157-337度线飞行……我们必须是在你们上方……燃料即将耗尽……\"美国海军出动了史上最大规模的海上搜救行动——九艘军舰、六十六架飞机，搜索了四十多万平方公里——什么也没找到。她被宣告死亡时40岁。关于她失踪的阴谋论至今层出不穷，但最可能的解释是最简单的那个：她找不到那个小岛，燃料用完了，坠海了。","ref":"Candace Fleming《Amelia Lost: The Life and Disappearance of Amelia Earhart》(2011)","lat":39,"lng":-98},{"id":"sport_03","pool":"sports","poolLabel":"探险与体育","name":"Valentina Tereshkova","cn":"瓦莲京娜·捷列什科娃","era":"1937–","reg":"苏联/俄罗斯","q":"第一个进入太空的女性。在她之后，苏联等了十九年才送第二个女人上去。","body":"1963年6月16日，26岁的纺织女工Valentina Tereshkova搭乘\"东方六号\"飞船进入太空，绕地球飞行48圈，历时近三天——成为人类历史上第一位女性宇航员。苏联选中她并不完全因为她优秀——更因为她出身\"正确\"：工人阶级家庭，父亲是拖拉机手（在二战中牺牲），母亲是纺织工人。赫鲁晓夫需要一个宣传象征：社会主义让工人阶级的女儿上了天。但在太空里Tereshkova经历了严重的恶心和不适，降落时自动导航系统出了问题。任务细节被保密了几十年。她回来后被授予\"苏联英雄\"称号，成了活体宣传海报。但苏联的太空计划此后等了整整十九年，直到1982年才送第二位女性进入太空——这暴露了\"第一位\"的政治意义远大于实际推动。Tereshkova至今是俄罗斯国家杜马议员，支持普京和修宪。她的故事不是简单的\"女性力量\"叙事——它同时是关于国家如何利用女性身体来讲自己的故事。","ref":"Irina Podyapolskaya《Valentina Tereshkova: The First Lady of Space》","lat":56,"lng":38},{"id":"sport_04","pool":"sports","poolLabel":"探险与体育","name":"Junko Tabei","cn":"田部井�的子","era":"1939–2016","reg":"日本","q":"第一个登顶珠穆朗玛峰的女性。登山前她被日本媒体问：\"你丈夫同意了吗？","body":"1975年5月16日，Junko Tabei成为第一个站在珠穆朗玛峰顶端的女性。在那之前十二天，她的队伍在6900米处遭遇雪崩，被埋在雪下，靠夏尔巴人挖出来才活了下来。她身高只有152厘米，体重不到50公斤——新闻界叫她\"小小的日本太太\"。出发前日本记者问她最多的问题不是关于登山技术，而是：\"你丈夫同意你去吗？\"\"你的孩子怎么办？\"她的回答是沉默和继续准备。她在1969年创立了\"女子登山俱乐部\"——因为当时日本的登山俱乐部全部拒绝女性加入。此后她又完成了\"七大洲最高峰\"的全部攀登。2012年被诊断出癌症后她继续登山，直到2016年去世。她说过一句流传很广的话：\"技术上来说，你不必和珠峰搏斗。你在和自己搏斗。\"","ref":"Junko Tabei《Honouring High Places》(2017，遗作)","lat":36,"lng":138},{"id":"sport_05","pool":"sports","poolLabel":"探险与体育","name":"Billie Jean King","cn":"比利·简·金","era":"1943–","reg":"美国","q":"一个29岁的女网球手打败了一个55岁的男网球手。五千万人看了直播。","body":"1973年，前温网冠军Bobby Riggs公开挑战女性网球选手，声称即使他55岁了也能打败任何女人。他先打败了当时排名第一的Margaret Court，然后把矛头对准了Billie Jean King。King接受了挑战。这场被称为\"性别之战\"（Battle of the Sexes）的比赛在休斯顿天文巨蛋体育馆举行，现场三万多人，电视转播覆盖全球五千万观众。King以直落三盘获胜。这不只是一场网球比赛——它发生在美国《教育法修正案第九条》（Title IX）通过仅一年后，女性刚刚获得平等参加校际体育的法律保障。King说她知道如果输了，\"女性体育可能倒退五十年\"。比赛之外，她是推动女子网球脱离男子巡回赛、建立独立职业巡回赛的核心人物。1981年她被前女友公开出柜，在那个年代几乎摧毁了她的商业价值——但她选择了不否认。","ref":"纪录片《Battle of the Sexes》(2017)","lat":39,"lng":-98},{"id":"sport_06","pool":"sports","poolLabel":"探险与体育","name":"","cn":"郎平","era":"1960–","reg":"中国","q":"她带领中国女排两次站上世界之巅，中间隔了三十二年。","body":"1984年洛杉矶奥运会，郎平作为主攻手帮助中国女排夺得金牌——那是中国女排\"五连冠\"的一部分，也是一个国家从封闭走向开放的精神图腾。\"学习女排精神\"成为那个年代最响亮的口号。之后她退役、留学、执教意大利和美国队——这让她在国内一度被视为\"叛徒\"。2008年北京奥运会她带领美国女排在小组赛中击败了中国队，中国网络上骂声一片。2013年她回来了，出任中国女排主教练。球队正在低谷——人才断档、信心崩塌。她用三年时间重建，2016年里约奥运会中国女排一路从小组赛第四名逆袭夺冠——半决赛和决赛都是在对手占优的情况下翻盘。那天晚上中国社交媒体上最多的一句话是\"郎平还是那个郎平\"。从球员到教练，从1984到2016，她用三十二年证明了一件事：女排精神不是口号，是方法论。","ref":"郎平《激情岁月》；纪录片《铁榔头》(2020)","lat":35,"lng":105},{"id":"sport_07","pool":"sports","poolLabel":"探险与体育","name":"Kathrine Switzer","cn":"凯瑟琳·斯威策","era":"1947–","reg":"美国","q":"1967年波士顿马拉松，赛事总监冲上来扯她的号码布，要把她拽出赛道。她的男友把那个人撞飞了。","body":"1967年4月19日，20岁的Kathrine Switzer以\"K.V. Switzer\"的名字报名波士顿马拉松，获得了261号号码布。那时候女性被禁止参加马拉松——官方理由包括\"女性子宫会脱落\"和\"女性不应该无人陪伴出现在赛道上\"。起跑时天气寒冷，她穿着宽大的运动衫，没有被认出来。跑到第四英里，媒体车上的记者发现了她——\"有个女孩在你的比赛里！\"赛事副总监Jock Semple从车上跳下来，冲向她，抓住她的号码布，边扯边吼：\"滚出我的比赛！把号码还给我！\"她的男友Tom Miller——一个橄榄球运动员——肩膀一撞，把Semple弹出了赛道。那一刻被摄影师拍了下来，成为体育史上最著名的照片之一。Switzer在恐惧和愤怒中跑完了全程，成绩4小时20分。此后她用五年时间推动波士顿马拉松在1972年正式接纳女性参赛者。2017年，70岁的她再次跑完波士顿马拉松，佩戴同一个号码——261号。赛后波士顿田径协会宣布永久退役261号号码布。","ref":"Kathrine Switzer《Marathon Woman》(2007)","lat":39,"lng":-98},{"id":"sport_08","pool":"sports","poolLabel":"探险与体育","name":"Wilma Rudolph","cn":"威尔玛·鲁道夫","era":"1940–1994","reg":"美国","q":"医生说她永远不能走路。她成了世界上跑得最快的女人。","body":"Wilma Rudolph是22个孩子中的第20个，早产，体重不到两公斤。四岁时接连感染肺炎、猩红热和小儿麻痹症，左腿瘫痪，被装上了金属支架。医生告诉她母亲这个孩子可能永远无法行走。她母亲每周开160公里的往返车程带她去纳什维尔做物理治疗——持续了两年。家里人轮流给她按摩腿部，一天好几次。12岁时她摘掉了支架。16岁时她站在1956年墨尔本奥运会的赛场上——拿了一枚接力铜牌。1960年罗马奥运会她20岁，在100米、200米和4×100米接力三个项目上全部夺金——成为第一位在单届奥运会上赢得三枚田径金牌的美国女性。欧洲媒体叫她\"黑色瞪羚\"。回到家乡田纳西州克拉克斯维尔，她坚持要求自己的庆祝游行不实行种族隔离——这成了那个小城历史上第一个黑人和白人共同参加的公共活动。","ref":"Wilma Rudolph自传《Wilma》(1977)","lat":39,"lng":-98},{"id":"sport_09","pool":"sports","poolLabel":"探险与体育","name":"","cn":"张伟丽","era":"1990–","reg":"中国","q":"从河北邯郸的工厂流水线到UFC八角笼，她用了十年。","body":"张伟丽的故事不是那种\"从小练体育被选入国家队\"的中国运动员标准叙事。她六岁学武术，拿过全国散打冠军，但退役后体制内没有她的位置。她去北京打工——当保安、做健身教练、在幼儿园教课、上工厂流水线。2010年开始接触综合格斗（MMA），在完全没有职业格斗产业支撑的中国，自费训练、自费参赛、自费出国。2019年她在深圳击败巴西选手Jessica Andrade，成为中国第一位UFC世界冠军，也是亚洲第一位UFC冠军。赛后记者问她想对中国女性说什么，她说：\"我不想代表谁。我就是我。\"2020年她在UFC248对阵Joanna Jędrzejczyk的比赛被称为\"UFC历史上最伟大的女子格斗\"——五回合打满，两个人的脸都打烂了，张伟丽以分歧判定获胜。邯郸工厂流水线到拉斯维加斯的八角笼，中间没有任何捷径。","ref":"UFC 248 Zhang vs. Joanna (2020)","lat":35,"lng":105},{"id":"sport_10","pool":"sports","poolLabel":"探险与体育","name":"Caster Semenya","cn":"卡斯特尔·塞门亚","era":"1991–","reg":"南非","q":"她天生睾酮水平比大多数女性高。国际田联说：你要么吃药降激素，要么不许比赛。","body":"2009年，18岁的Caster Semenya在柏林世锦赛800米决赛中以巨大优势夺冠。比赛还没结束，国际田联就宣布要对她进行性别测试——因为她跑得\"太快了\"。测试结果被泄露给媒体：她体内的睾酮水平高于典型女性范围。此后她经历了长达十几年的拉锯战。世界田径联合会2018年出台规定：天然睾酮水平超过一定阈值的女性运动员，必须服用药物将激素降低到规定范围内才能参加400米到1英里之间的赛事。这条规则几乎是为Semenya量身定做的。她拒绝服药：\"我不会为了参加比赛而给自己的身体下药。\"她把官司打到了欧洲人权法院。2023年，法院裁定世界田联的规定违反了她的人权——但实际上她仍然无法参赛，因为田联没有修改规则。Semenya的案例是体育界最前沿的性别政治议题：什么定义了\"女性\"？谁有权画这条线？一个女人天生的身体条件，什么时候从\"天赋\"变成了\"不公平\"？","ref":"欧洲人权法院 Semenya v. Switzerland 判决 (2023)","lat":-29,"lng":24},{"id":"sport_11","pool":"sports","poolLabel":"探险与体育","name":"Oksana Chusovitina","cn":"丘索维金娜","era":"1975–","reg":"乌兹别克斯坦/德国","q":"她参加了八届奥运会。最后一次时她46岁，和她的对手们差了整整一代人。","body":"体操运动员的职业寿命通常在20岁出头结束。Oksana Chusovitina参加了从1992年到2020年的八届奥运会——跨越了苏联解体到COVID疫情的整个时代。她最初代表独联体队，然后代表乌兹别克斯坦，然后代表德国，最后又代回乌兹别克斯坦。转换国籍的原因是她的儿子Alisher：2002年Alisher被诊断出白血病，乌兹别克斯坦的医疗条件无法治疗。她带着儿子去了德国，入籍德国以获得更好的医疗保障——然后继续参赛赚取医疗费。儿子的病最终治愈了，但她没有停下来。2020年东京奥运会她46岁，在跳马项目中完成了比赛——看台上的年轻体操选手们全体起立为她鼓掌，很多人还没出生时她已经是奥运冠军了。赛后她向观众深深鞠躬，泪流满面。有记者问她为什么坚持这么久，她说：\"因为我还能跳。\"","ref":"Olympic Channel \"The Incredible Story of Oksana Chusovitina\" 专题","lat":41,"lng":69}]},"medicine":{"label":"医学与公共卫生","cards":[{"id":"med_01","pool":"medicine","poolLabel":"医学与公共卫生","name":"Florence Nightingale","cn":"弗洛伦斯·南丁格尔","era":"1820–1910","reg":"英国","q":"她不只是\"提灯女神\"。她是一个用统计学杀死官僚主义的数据科学家。","body":"南丁格尔在克里米亚战争前线最重要的武器不是灯，是数据。她发明了\"鸡冠花图\"（coxcomb diagram）——一种极坐标面积图——来直观展示一个事实：英军死亡人数中，死于伤口感染和疾病的士兵远多于死于战斗本身的。这张图被送到了维多利亚女王和议会面前，比任何请愿书都有说服力。她用数据证明了卫生条件差才是真正的杀手，推动了军事医院的全面改革。回国后她拒绝了所有公众荣誉和社交邀请，把自己关在房间里，用余生写报告、设计医院平面图、推动护理教育标准化。她是英国皇家统计学会第一位女性会员。她一生大部分时间卧病在床——可能是布鲁氏菌病的后遗症——但从床上指挥了整个英国公共卫生改革。她说过：\"我认为自己从来不重要，重要的是我在做的事情。\"","ref":"Mark Bostridge《Florence Nightingale: The Making of an Icon》(2008)","lat":52,"lng":-1},{"id":"med_02","pool":"medicine","poolLabel":"医学与公共卫生","name":"Elizabeth Blackwell","cn":"伊丽莎白·布莱克韦尔","era":"1821–1910","reg":"英国/美国","q":"美国第一位女医生。她被录取是因为全班男生投票时以为那是个玩笑。","body":"1847年，Elizabeth Blackwell申请了美国所有的医学院，全部被拒。日内瓦医学院（今Hobart and William Smith Colleges）的教授们不想录取她，但又不好意思直接说不——于是把决定权交给了学生投票。150个男生以为这是个恶作剧，全票通过。Blackwell就这样进了医学院。两年后她以班级第一名毕业，成为美国第一位获得医学学位的女性。但没有一家医院愿意雇她。她在纽约贫民区自己开了诊所，后来扩建为纽约妇女儿童医院——由全女性医护人员运营。南北战争期间她组织培训了大批战地护士。她终身未婚，领养了一个爱尔兰孤儿。她说过：\"如果社会不允许女人行医，那不是因为女人不能，而是因为社会有病。\"","ref":"Julia Boyd《The Excellent Doctor Blackwell》(2005)","lat":52,"lng":-1},{"id":"med_03","pool":"medicine","poolLabel":"医学与公共卫生","name":"Alice Hamilton","cn":"爱丽丝·汉密尔顿","era":"1869–1970","reg":"美国","q":"哈佛聘她当教授时的条件：不许参加毕业典礼游行，不许进教工俱乐部，不许领足球赛门票。","body":"1919年，Alice Hamilton成为哈佛大学历史上第一位女性教授。附带三个条件：不许参加毕业典礼游行（那是男人的事），不许使用教工俱乐部（1968年才对女性开放），不许领取足球赛门票（因为这些是给\"真正的教授\"的）。在哈佛任教16年，她始终是助理教授——从未被晋升。但这些侮辱性条件并不是她人生中最重要的事。重要的是她之前在芝加哥Hull House做的事：她走进铅冶炼厂、橡胶工厂、军火车间和矿井，采访那些正在被工业毒物慢慢杀死的工人——癫痫、失明、瘫痪。她把这些调查写成报告，推动了美国工人赔偿法和职业安全法规的建立。40年间她发表了超过80篇科学报告。她死于1970年，享年101岁。三个月后，美国通过了《职业安全与健康法》。","ref":"Alice Hamilton自传《Exploring the Dangerous Trades》(1943)","lat":39,"lng":-98},{"id":"med_04","pool":"medicine","poolLabel":"医学与公共卫生","name":"Rosalind Franklin","cn":"罗莎琳德·弗兰克林","era":"1920–1958","reg":"英国","q":"她拍了那张改变生物学的照片。诺贝尔奖给了看到照片的三个男人。","body":"1952年，Rosalind Franklin用X射线晶体衍射技术拍摄了\"Photo 51\"——DNA的B型结构照片。这张照片清晰地显示了双螺旋结构。她的同事Maurice Wilkins在未经她许可的情况下，把这张照片给James Watson看了。Watson后来在自传《双螺旋》中写道，他看到照片的那一刻\"下巴都掉了\"。1953年Watson和Francis Crick发表了DNA双螺旋模型，在论文中对Franklin的贡献做了一句轻描淡写的致谢。1962年Watson、Crick和Wilkins三人共享诺贝尔生理学或医学奖。Franklin没有获奖——她在1958年死于卵巢癌，年仅37岁，可能与长期接触X射线辐射有关。诺贝尔不追授已故者。但即便她活着，以那个年代的性别政治，她是否会被纳入获奖名单，仍然是一个没有人能自信回答的问题。Watson在自传里称她为\"Rosy\"——她生前从来没有人这样叫过她。","ref":"Brenda Maddox《Rosalind Franklin: The Dark Lady of DNA》(2002)","lat":52,"lng":-1},{"id":"med_05","pool":"medicine","poolLabel":"医学与公共卫生","name":"","cn":"林巧稚","era":"1901–1983","reg":"中国","q":"她一生未婚，接生了五万个婴儿。她说\"我的孩子们遍布中国。","body":"林巧稚是中国现代妇产科学的奠基人。她在北京协和医院工作了半个多世纪，亲手接生了约五万名婴儿——包括很多后来成为中国各界重要人物的人。协和医院当时有一条不成文的规定：女医生结婚就要辞职。她选择了不结婚。后来有人问她是否后悔，她说\"我的孩子们遍布中国\"。她的诊室从不拒绝任何人——不管是高干还是农村来的孕妇，她的态度一样。她坚持每天查房，亲自检查产妇，即使在文革期间被下放打扫厕所时也没有放弃学习。1978年她主持编写了《妇科肿瘤学》，奠定了中国妇科肿瘤研究的基础。她在生命最后几天，病床上还在断断续续地喊：\"快——Loss——Loss（产钳）——Loss\" ——她以为自己还在手术台上接生。","ref":"中国妇产科学奠基人系列；协和医院院史","lat":35,"lng":105},{"id":"med_06","pool":"medicine","poolLabel":"医学与公共卫生","name":"Virginia Apgar","cn":"弗吉尼亚·阿普加","era":"1909–1974","reg":"美国","q":"她发明了一个评分系统，全世界每个新生儿出生后第一分钟都会用到。","body":"Virginia Apgar原本想当外科医生——她的导师劝她放弃，说女人在外科没有前途。她转向了一个当时几乎没人在意的领域：产科麻醉。1952年的一天早餐时间，一个医学生问她怎么快速评估新生儿状况。Apgar拿起餐巾纸，几分钟内设计出了一套五项评分系统：心率、呼吸、肌张力、反射和肤色，每项0-2分，总分10分。这就是Apgar评分——如今全世界每一个新生儿出生后的第一分钟和第五分钟都会被打这个分。在此之前，新生儿的生死基本靠运气——没有标准化的评估方法，很多可以挽救的婴儿因为没有被及时识别出问题而死亡。Apgar评分改变了这一切。后来有人用她的姓氏做了一个缩写记忆法：Appearance, Pulse, Grimace, Activity, Respiration——但这是事后的巧合，不是她设计的。她终身未婚，爱好是集邮、做小提琴和开飞机。","ref":"American Academy of Pediatrics Apgar评分历史专页","lat":39,"lng":-98},{"id":"med_07","pool":"medicine","poolLabel":"医学与公共卫生","name":"","cn":"屠呦呦","era":"2015–","reg":"中国","q":"她从一本1600年前的中医古籍里找到了治疗疟疾的方法。诺贝尔奖来了，同事们说功劳不是她一个人的。","body":"1969年，中国\"523项目\"启动——一项为抗美援越和国内疟疾防治而设立的秘密军事科研任务。屠呦呦被任命为课题组长时，她还不是教授，没有博士学位，也没有海外留学经历。她翻遍了古代医学文献，在东晋葛洪的《肘后备急方》中找到一条线索：\"青蒿一握，以水二升渍，绞取汁，尽服之。\"关键在\"绞取汁\"——不是煎煮，是冷榨。她意识到高温可能破坏了青蒿中的有效成分。改用低温乙醚提取后，有效率达到100%。为了确认安全性，她和团队成员先在自己身上做了人体试验。青蒿素至今仍是全球抗疟的核心药物，挽救了数百万生命。2015年她获得诺贝尔生理学或医学奖——中国本土科学家的第一个诺贝尔科学奖。但争议随之而来：523项目是集体攻关，很多人参与了不同环节，部分同事认为功劳被过度归于个人。屠呦呦本人很少回应争议，也很少接受采访。她不是院士。","ref":"屠呦呦诺贝尔演讲 (2015)；葛洪《肘后备急方》","lat":35,"lng":105},{"id":"med_08","pool":"medicine","poolLabel":"医学与公共卫生","name":"Frances Kelsey","cn":"弗朗西斯·凯尔西","era":"1914–2015","reg":"加拿大/美国","q":"一个FDA新员工拒绝批准一种药，拯救了美国一代婴儿。药厂骂她的话\"不适合印刷\"。","body":"1960年9月，Frances Kelsey刚到FDA上班一个月，桌上就来了沙利度胺（thalidomide）的审批申请。这种镇静药已经在欧洲、加拿大等46个国家上市，用于缓解孕妇晨吐——被宣传为\"wonder drug\"。Kelsey觉得不对：临床数据\"好得不真实\"，没有充分的人体安全性测试，尤其没有对孕妇的测试。她拒绝批准。制药公司Richardson-Merrell暴怒——销售代表涌进她的办公室，日夜打电话，前后骚扰了她50多次，向她的上司投诉。她后来说：\"他们骂我的那些话，你不会想印出来的。\"她就是不签字。一年后，欧洲和日本开始报告大量婴儿畸形——手脚直接长在躯干上，没有四肢——全球约一万名\"沙利度胺婴儿\"。美国因为Kelsey的\"固执\"，受害婴儿仅17例（来自已分发给医生的样品）。1962年肯尼迪总统亲自为她颁发联邦文职最高荣誉勋章。她活到101岁。","ref":"Science History Institute \"The Woman Who Turned Back a Plague\" podcast","lat":39,"lng":-98},{"id":"med_09","pool":"medicine","poolLabel":"医学与公共卫生","name":"Henrietta Lacks","cn":"亨丽埃塔·拉克斯","era":"1920–1951","reg":"美国","q":"她的细胞帮助开发了脊髓灰质炎疫苗、基因图谱和COVID疫苗。她的家人连医疗费都付不起。","body":"1951年，31岁的黑人女性Henrietta Lacks因宫颈癌在约翰·霍普金斯医院接受治疗。医生在未告知她的情况下从她的肿瘤上切取了组织样本送去实验室。正常人类细胞在培养皿中很快会死亡——但她的细胞不死。它们以惊人的速度繁殖，每24小时翻一倍，永远不停。这些细胞被命名为\"HeLa\"——她名字的前两个字母——成为人类历史上第一个\"永生\"细胞系。HeLa细胞参与了脊髓灰质炎疫苗的开发、基因图谱的绘制、癌症研究、HIV研究和COVID-19疫苗的研发。它们被寄往全世界的实验室，生物技术公司从中获利数十亿美元。但Lacks的家人直到1970年代才知道她的细胞还\"活着\"——一个记者打电话来问她家族的医学史，家人才得知真相。他们从未获得任何补偿，同时连自己的医疗费都付不起。2023年，Lacks家族终于与生物技术公司Thermo Fisher达成和解，距离她的细胞被采取已过去72年。","ref":"Rebecca Skloot《The Immortal Life of Henrietta Lacks》(2010)","lat":39,"lng":-98},{"id":"med_10","pool":"medicine","poolLabel":"医学与公共卫生","name":"Nettie Stevens","cn":"内蒂·史蒂文斯","era":"1861–1912","reg":"美国","q":"她发现了决定你是男是女的东西。功劳归了她以前的教授。","body":"在Nettie Stevens之前，人们不知道生物学性别是怎么决定的——有人说取决于母亲的营养，有人说取决于受孕时的温度。1905年，Stevens通过研究黄粉虫的精子发现：雄性产生两种精子——一种携带大染色体（X），一种携带小染色体（Y）；卵子只携带X。XY组合产生雄性，XX组合产生雌性。这是人类第一次把一个可观察的遗传性状（性别）和特定的染色体联系起来——现代遗传学的基石之一。同年，她的前任教授Edmund Beecher Wilson在哥伦比亚大学独立发表了类似但不完全相同的发现。Stevens的结论更精确、更具突破性——是她，而不是Wilson，最先明确指出Y染色体决定性别。但功劳逐渐归到了Wilson名下。Stevens在11年的学术生涯中发表了38篇论文，1912年终于获得了布林莫尔学院的研究教授职位——还没来得及上任就因乳腺癌去世，50岁。Thomas Hunt Morgan（后来的诺贝尔奖得主）为她写了讣告，但在自己的教科书中引用她的发现时，没有提她的名字。","ref":"Philosophical Transactions of the Royal Society B \"The contributions of Nettie Stevens to the field of sex chromosome biology\" (2022)","lat":39,"lng":-98}]},"science":{"label":"科学与技术","cards":[{"id":"sci_01","pool":"science","poolLabel":"科学与技术","name":"Marie Curie","cn":"玛丽·居里","era":"1867–1934","reg":"波兰/法国","q":"她的实验笔记至今仍有放射性，必须保存在铅盒里。你要读它，得先签一份免责声明。","body":"1903年，法国科学院最初只打算把诺贝尔物理学奖提名给Pierre Curie和Henri Becquerel。是Pierre坚持要求加上妻子的名字——Marie才成为历史上第一位获得诺贝尔奖的女性。1911年她第二次获奖——这次是化学奖，独享，至今她仍是唯一一位在两个不同科学领域都获得诺贝尔奖的人。但就在同一年，她以一票之差落选法兰西科学院——反对者的理由是她的性别和她的波兰血统。更糟糕的是，她与Pierre前学生Paul Langevin的婚外情被媒体曝光，报纸称她为\"外国荡妇\"，差点让诺贝尔委员会撤回她的第二个奖。她拒绝了镭的专利——这种元素价值连城——因为她认为科学发现属于全人类。一战期间她自学X光技术，和女儿Irene一起开着装有X光设备的货车奔赴前线，为伤兵定位弹片和碎骨——这些车被称为\"小居里\"。她死于再生障碍性贫血，几乎确定是多年辐射暴露所致。她的女儿Irene后来也获得了诺贝尔奖，也死于辐射引发的白血病。","ref":"Susan Quinn《Marie Curie: A Life》(1995)","lat":52,"lng":20},{"id":"sci_02","pool":"science","poolLabel":"科学与技术","name":"Lise Meitner","cn":"丽泽·迈特纳","era":"1878–1968","reg":"奥地利/瑞典","q":"她发现了核裂变。诺贝尔奖给了她的男性合作者。她被提名48次，一次也没拿到。","body":"Lise Meitner和化学家Otto Hahn合作了三十年。1938年，作为犹太人的Meitner被迫逃离纳粹德国，流亡瑞典。同年圣诞节，Hahn写信告诉她一个奇怪的实验结果——用中子轰击铀后产生了钡，他无法解释。Meitner和她的侄子Otto Frisch在瑞典的雪地里散步时想通了：铀原子核裂开了。他们计算出释放的能量与爱因斯坦的E=mc²完全吻合。Frisch把这个过程命名为\"fission\"——核裂变。这个发现改变了人类历史的走向。1944年诺贝尔化学奖颁给了Hahn一个人。Meitner被提名诺贝尔奖48次——物理和化学都有——一次也没获奖。诺贝尔委员会后来公开的审议记录显示，委员中有人故意淡化她的贡献。爱因斯坦称她为\"德国的居里夫人\"。她拒绝参加曼哈顿计划——她不想让自己的发现被用来制造武器。109号元素Meitnerium以她命名。Hahn的名字你大概需要搜一下才能想起来。","ref":"Ruth Lewin Sime《Lise Meitner: A Life in Physics》(1996)","lat":59.3,"lng":18},{"id":"sci_03","pool":"science","poolLabel":"科学与技术","name":"","cn":"吴健雄","era":"1912–1997","reg":"中国/美国","q":"她用实验推翻了物理学的一条基本定律。诺贝尔奖给了提出理论的两个男人。","body":"1956年，理论物理学家杨振宁和李政道提出一个大胆假设：在弱相互作用中，宇称守恒定律可能不成立——也就是说，自然界在微观层面可能分得清左和右。这个想法在理论上很优美，但需要实验验证。吴健雄设计并执行了那个实验——在接近绝对零度的条件下观测钴-60的β衰变。实验结果证明杨李是对的：宇称不守恒。这是20世纪物理学最震撼的发现之一。1957年诺贝尔物理学奖颁给了杨振宁和李政道。吴健雄没有。物理学界对此的争议从未停止——没有她的实验，那个理论就只是纸上谈兵。她被称为\"中国的居里夫人\"和\"物理学的第一夫人\"，她本人对这些称号没有表示过热情——她更在意的是实验本身。她在哥伦比亚大学任教四十年，是该校物理系第一位女性正教授。她还参与了曼哈顿计划中铀浓缩的关键环节。","ref":"Tsai-Chien Chiang《Madam Wu Chien-Shiung: The First Lady of Physics Research》(2014)","lat":35,"lng":105},{"id":"sci_04","pool":"science","poolLabel":"科学与技术","name":"Cecilia Payne-Gaposchkin","cn":"塞西莉亚·佩恩-加波施金","era":"1900–1979","reg":"英国/美国","q":"她发现太阳主要由氢构成。导师说\"这显然不可能\"，逼她在论文里否定自己的结论。","body":"1925年，Cecilia Payne在哈佛完成了被后人称为\"有史以来最杰出的天文学博士论文\"的研究。她通过光谱分析发现，恒星的主要成分不是铁和硅（当时的共识），而是氢——氢的含量是其他元素的一百万倍。这个结论颠覆了整个天文学的基础认知。但她的论文外审人Henry Norris Russell——普林斯顿天文台台长——告诉她这个结论\"显然不可能\"。为了让论文通过，Payne在定稿中加了一句话：氢和氦的丰度\"几乎确定不是真实的\"。四年后，Russell用自己的方法得出了同样的结论，以自己的名字发表了论文——在其中对Payne的先驱工作做了轻描淡写的致谢。Payne在哈佛工作了一辈子，头衔从\"技术助理\"慢慢升到\"天文学家\"，但直到1956年才成为哈佛历史上第一位女性正教授。她后来获得的终身成就奖，讽刺地以Russell的名字命名。","ref":"Donovan Moore《What Stars Are Made Of: The Life of Cecilia Payne-Gaposchkin》(2020)","lat":52,"lng":-1},{"id":"sci_05","pool":"science","poolLabel":"科学与技术","name":"Vera Rubin","cn":"薇拉·鲁宾","era":"1928–2016","reg":"美国","q":"她证明了宇宙中大部分物质是看不见的。男同事说她一定是算错了。","body":"1960年代末，Vera Rubin开始测量旋涡星系外围恒星的旋转速度。按照牛顿力学，离中心越远的恒星应该转得越慢——就像太阳系外围的行星。但她的数据显示，外围恒星的速度和中心区域几乎一样快。这意味着星系中存在大量看不见的物质——后来被称为\"暗物质\"——其质量远超可见物质。这个发现从根本上改变了我们对宇宙组成的理解：我们能看到的一切——恒星、行星、星云——只占宇宙物质的不到5%。然而男同事们的第一反应是：她一定算错了。她的硕士论文和博士论文都遭到了批评和忽视。她的博士论文答辩时她已经怀孕——没有同行把一个怀孕的年轻女人的天文学研究当回事。她申请普林斯顿天文系时被告知\"我们不收女生\"。她至死未获诺贝尔奖——诺贝尔不授予已故者。她说过的一句话流传最广：\"名声是短暂的，我的恒星数据会留下来。\"","ref":"纪录片《Vera Rubin: Bright Galaxies, Dark Matters》","lat":39,"lng":-98},{"id":"sci_06","pool":"science","poolLabel":"科学与技术","name":"Jocelyn Bell Burnell","cn":"乔斯林·贝尔·伯内尔","era":"1943–","reg":"北爱尔兰","q":"她以博士生身份发现了脉冲星。1974年诺贝尔物理学奖给了她的导师。她把后来的300万美元奖金全捐了。","body":"1967年，24岁的Jocelyn Bell还是剑桥大学的博士生。她在自己帮助建造的射电望远镜数据中发现了一个奇怪的信号——极其规律的脉冲，精确到令人毛骨悚然。最初他们半开玩笑地标注为\"LGM-1\"——Little Green Men（小绿人）——因为那种规律性看起来像是人造信号。后来确认这是一种快速旋转的中子星，被命名为脉冲星——天体物理学的重大发现。1974年诺贝尔物理学奖颁给了她的导师Antony Hewish和另一位射电天文学家Martin Ryle。Bell Burnell的名字不在获奖名单上。天文学界为她鸣不平，她自己却异常平静——她说在那个年代，人们默认\"有一个资深男性，下面一群小兵，小兵不用思考\"。2018年她获得Special Breakthrough Prize，奖金300万美元。她把全部奖金捐给了英国物理研究所，专门资助女性、少数族裔和难民进入物理学领域。她说：\"我有一种直觉，来自少数群体的人会带来全新的视角。\"","ref":"BBC采访 \"Dame Jocelyn Bell Burnell: Advice for Young Scientists\" (2018)","lat":54.6,"lng":-6},{"id":"sci_07","pool":"science","poolLabel":"科学与技术","name":"Mae Jemison","cn":"梅·杰米森","era":"1956–","reg":"美国","q":"第一位进入太空的非裔美国女性。在此之前她是医生、和平队志愿者和舞者。","body":"1992年9月12日，Mae Jemison搭乘\"奋进号\"航天飞机进入太空，成为第一位非裔美国女性宇航员。但在她成为宇航员之前，她的简历已经足够写三个人的人生：斯坦福大学化学工程学士，康奈尔大学医学博士，在西非利比里亚和塞拉利昂担任和平队医疗官两年半，回国后在洛杉矶当了几年全科医生——然后申请了NASA。她第一次申请被拒。1986年挑战者号爆炸后NASA暂停招募，她等了一年再申请，这次从两千多名申请者中被选中。在太空中她带了一尊西非女性雕塑和一面阿尔法·卡帕·阿尔法姐妹会旗帜——她说她想让太空代表所有人，不只是某一种人。她从小就想当宇航员，小时候对妈妈说长大要去太空。妈妈没有说\"那不可能\"，而是说\"好\"。离开NASA后她创办了一家技术公司，还客串了一集《星际迷航：下一代》——她说小时候看Nichelle Nichols在《星际迷航》里演Uhura中尉，是她相信自己可以去太空的原因之一。","ref":"Mae Jemison《Find Where the Wind Goes: Moments from My Life》(2001)","lat":39,"lng":-98}]}},"notes":[{"id":"n1","pool":"note","poolLabel":"纸条","tp":"金句","txt":"Gloria Steinem：女人没有男人，就像鱼没有自行车。","m":"😂"},{"id":"n2","pool":"note","poolLabel":"纸条","tp":"冷知识","txt":"世界上第一位程序员是Ada Lovelace，一位伯爵夫人。1843年，她为一台还不存在的机器写了第一段代码。","m":"✨"},{"id":"n3","pool":"note","poolLabel":"纸条","tp":"冷知识","txt":"Mrs. 原本不是已婚女性的意思——它和 Mr. 一样只是一个敬称。","m":"🤔"},{"id":"n4","pool":"note","poolLabel":"纸条","tp":"冷知识","txt":"中国古代女书是世界上唯一已知的女性专用文字系统，诞生在湖南江永县。","m":"✨"},{"id":"n5","pool":"note","poolLabel":"纸条","tp":"冷知识","txt":"啤酒酿造在欧洲中世纪是女性的工作——直到它开始赚钱。","m":"💀"},{"id":"n6","pool":"note","poolLabel":"纸条","tp":"冷知识","txt":"诺贝尔文学奖至今只有17位女性获奖者，占总数的约12%。不是女性写不好——是评委席上的椅子太少。","m":"🤔"},{"id":"n7","pool":"note","poolLabel":"纸条","tp":"冷知识","txt":"Hysterical（歇斯底里）来自希腊语子宫。情绪失控曾被归咎于女性的生殖器官。语言里藏着最古老的偏见。","m":"💀"},{"id":"n8","pool":"note","poolLabel":"纸条","tp":"冷知识","txt":"J.K.罗琳被要求用缩写出版《哈利·波特》——理由是男孩不会买女作者的书。","m":"💀"},{"id":"n9","pool":"note","poolLabel":"纸条","tp":"冷知识","txt":"1975年冰岛女性罢工日，90%的女性停止工作和家务。整个国家瘫痪了一天。第二年通过了性别平等法。","m":"✨"},{"id":"n10","pool":"note","poolLabel":"纸条","tp":"冷知识","txt":"科幻文学的鼻祖不是凡尔纳，是Mary Shelley——她写《弗兰肯斯坦》时只有19岁。","m":"✨"},{"id":"n11","pool":"note","poolLabel":"纸条","tp":"冷知识","txt":"NASA早期的计算机不是机器，是一群做数学计算的女性。电影《隐藏人物》讲的就是她们。","m":"✨"},{"id":"n12","pool":"note","poolLabel":"纸条","tp":"冷知识","txt":"Master 对应 Mistress，但后者被色情化了；Governor 对应 Governess，但后者变成了保姆。语言的降级就是地位的降级。","m":"🤔"},{"id":"n13","pool":"note","poolLabel":"纸条","tp":"金句","txt":"Bette Davis：当一个男人发表意见，他是一个男人。当一个女人发表意见，她是个泼妇。","m":"💀"},{"id":"n14","pool":"note","poolLabel":"纸条","tp":"冷知识","txt":"居里夫人获了两次诺贝尔奖，两个不同领域。至今没有第二个人做到。","m":"✨"},{"id":"n15","pool":"note","poolLabel":"纸条","tp":"冷知识","txt":"维基百科上只有不到20%的传记词条是关于女性的。历史不是没有女性——是记录历史的人选择了忽略。","m":"🤔"},{"id":"n16","pool":"note","poolLabel":"纸条","tp":"金句","txt":"Adichie：当然我很有野心，会有人觉得被冒犯——但只有那种会被我冒犯的男人，才恰好是我不感兴趣的男人。","m":"😂"},{"id":"n17","pool":"note","poolLabel":"纸条","tp":"冷知识","txt":"牛津大学直到1920年才允许女性获得学位。剑桥更晚——1948年。","m":"💀"},{"id":"n18","pool":"note","poolLabel":"纸条","tp":"冷知识","txt":"韩国的4B运动——不婚、不恋爱、不生育、不性交——是当代全球最激进的女性主义实践之一。","m":"🤔"},{"id":"n19","pool":"note","poolLabel":"纸条","tp":"金句","txt":"Margaret Thatcher：如果你想说些什么，找个男人。如果你想做成什么，找个女人。","m":"😂"},{"id":"n20","pool":"note","poolLabel":"纸条","tp":"冷知识","txt":"中国第一所女子学校是1898年在上海创办的经正女学，比五四运动早了21年。","m":"✨"},{"m":"💀","tp":"冷知识","txt":"精子：供给几乎无限、边际生产成本趋近于零、高度同质化。经济学管这叫\"大宗商品\"。大宗商品的定价权在买方。","id":"n021","pool":"note","poolLabel":"纸条"},{"m":"😂","tp":"金句","txt":"一夫一妻制不是为女性设计的——它是底层男性逼出来的反垄断法规。在一夫多妻制下他们完全拿不到交配机会，暴力威胁迫使上层让步。女性在这个交易里是被重新分配的资产，不是谈判桌上的参与者。","id":"n022","pool":"note","poolLabel":"纸条"},{"m":"😂","tp":"金句","txt":"男性的海投式求偶行为——群发、广撒网、单次成交率极低只能靠数量补——经济学上这叫大宗商品卖家的标准行为模式。","id":"n023","pool":"note","poolLabel":"纸条"},{"m":"💀","tp":"冷知识","txt":"父权制的经济学本质：精子方没有选择提升产品竞争力，而是选择操纵市场规则——封锁信息渠道（不让女性受教育）、限制流动性（不让女性经济独立）、消灭退出选项（限制离婚）。金融学管这叫价格操纵卡特尔。","id":"n024","pool":"note","poolLabel":"纸条"},{"m":"🤔","tp":"冷知识","txt":"避孕药、亲子鉴定、女性经济独立——本质上是在消除信息不对称、恢复退出选项。金融学管这叫\"卡特尔正在崩溃，价格发现机制重新启动\"。","id":"n025","pool":"note","poolLabel":"纸条"},{"m":"😂","tp":"金句","txt":"反堕胎运动、反女权运动、incel运动——经济学翻译：滞销商品面对市场自由化时的恐慌性抛售。他们在游说恢复计划定价。","id":"n026","pool":"note","poolLabel":"纸条"},{"m":"😂","tp":"金句","txt":"选择养猫而不结婚，金融学翻译：发现了风险调整后回报率更优的替代资产，而且零委托代理问题、完全透明、维护成本极低。","id":"n027","pool":"note","poolLabel":"纸条"},{"m":"🤔","tp":"冷知识","txt":"对一个违约率超过90%的资产类别采取默认拒绝策略，不是偏见——是精算上合理的防御性资产配置。保险公司就是这么干的。","id":"n028","pool":"note","poolLabel":"纸条"},{"m":"😂","tp":"金句","txt":"男性价值呈极端右偏分布——绝大多数聚集在低价值区域，只有一条细细的右尾。均值被那几个优质个体拉高了，严重高估群体真实水平。统计学101：看中位数，别看平均数。","id":"n029","pool":"note","poolLabel":"纸条"},{"m":"💀","tp":"冷知识","txt":"\"给我一个机会吧\"的统计学翻译：请你降低显著性水平，接受更高的假阳性率，好让更多低质量个体通过你的过滤器。换句话说——请放松风控，好让垃圾混进来。","id":"n030","pool":"note","poolLabel":"纸条"},{"m":"🤔","tp":"冷知识","txt":"把一个好人误判为渣男（假阴性），代价是少了一个选项。把一个渣男误判为好人（假阳性），代价包括时间损失、精神损害、甚至人身安全风险。代价不对称时，理性决策者应该把筛选标准设到极高。","id":"n031","pool":"note","poolLabel":"纸条"},{"m":"😂","tp":"金句","txt":"越desperate的行为产生越多负面数据→基础概率进一步恶化→筛选标准进一步提高→更多人被拒绝→更desperate。统计学管这叫正反馈死亡螺旋，没有均衡点，只有持续发散。","id":"n032","pool":"note","poolLabel":"纸条"},{"m":"💀","tp":"冷知识","txt":"深海鮟鱇鱼的雄性会融化成雌性身上的寄生器官——最终只剩一对睾丸挂在雌鱼身上。进化的终极判断：你整个身体的价值等于一对生殖腺。","id":"n033","pool":"note","poolLabel":"纸条"},{"m":"😂","tp":"金句","txt":"澳洲袋鼩交配到内脏出血而死。蜜蜂雄蜂生殖器爆裂。螳螂被吃掉头还在继续交配。进化不会为不存在的压力设计解决方案——这些极端行为就是\"不值钱\"的化石记录。","id":"n034","pool":"note","poolLabel":"纸条"},{"m":"🤔","tp":"冷知识","txt":"亲本投资理论（Robert Trivers, 1972）：每次繁殖中投入更多的性别天然成为挑选方，投入更少的天然成为竞争方。你的配子贵，你就有权挑；你的配子便宜，你就只能卷。","id":"n035","pool":"note","poolLabel":"纸条"},{"m":"💀","tp":"冷知识","txt":"雌性每一次错误选择的代价：九个月妊娠+数年哺乳+后代质量下降。雄性每一次错误选择的代价：几分钟和几毫升液体。成本差了六个数量级，筛选标准当然不在一个水平上。","id":"n036","pool":"note","poolLabel":"纸条"},{"m":"😂","tp":"金句","txt":"大量人类男性享受着哺乳动物级别的配对结合福利，却只交付昆虫级别的育儿投入——本质上是蜜蜂雄蜂的行为模式，占着哺乳动物伴侣的位置。","id":"n037","pool":"note","poolLabel":"纸条"},{"m":"🤔","tp":"冷知识","txt":"在大多数物种中雄性寿命更短。进化在说：你的设计使用寿命就是比较短，因为你的替换成本很低。","id":"n038","pool":"note","poolLabel":"纸条"},{"m":"✨","tp":"冷知识","txt":"在采集-狩猎社会中，女性采集活动提供了群体60-80%的热量来源。\"男人负责打猎养家\"这个叙事，连原始社会都不买账。","id":"n039","pool":"note","poolLabel":"纸条"},{"m":"💀","tp":"冷知识","txt":"父权制的起源不是\"男强女弱\"——是\"财产需要传给确定是自己亲生的后代\"。农业革命创造了私有财产，私有财产需要继承，继承需要确认血统，确认血统需要控制女性的性行为。先有地，后有爹。","id":"n040","pool":"note","poolLabel":"纸条"},{"m":"😂","tp":"金句","txt":"不是上帝写了父权制，是地主写了父权制，然后把署名权给了上帝。天主教教义、伊斯兰教的保守解读、儒家的\"三从四德\"——功能上做的是同一件事：把经济安排包装成神圣秩序。","id":"n041","pool":"note","poolLabel":"纸条"},{"m":"🤔","tp":"冷知识","txt":"每一波女权运动都和经济结构变化高度吻合：一战二战女性进工厂→第一波，避孕药发明→第二波，互联网+服务业经济→第三波。不是意识形态驱动了解放，是经济基础的变化让解放成为可能。","id":"n042","pool":"note","poolLabel":"纸条"},{"m":"🤔","tp":"冷知识","txt":"反女权情绪的地理分布和男性经济不安全感高度相关——去工业化地区、经济衰退带、男性经济地位下滑的地方，反女权情绪越强。性别红利是他们最后一项资产，当其他一切都在贬值时，这项资产的相对重要性就上升了。","id":"n043","pool":"note","poolLabel":"纸条"},{"m":"💀","tp":"冷知识","txt":"霸权男性气质：社会对\"真男人\"的定义标准是绝大多数男性根本达不到的。达不到的焦虑不会向上指向制造标准的结构——而是向下转嫁给更弱的对象。最底层的男性往往最厌女，因为女性是他唯一还能踩的群体。","id":"n044","pool":"note","poolLabel":"纸条"},{"m":"🤔","tp":"冷知识","txt":"厌女不只是个人态度——它是进入男性社交圈的门票。在男性社交圈里获得地位的方式包括物化女性、炫耀性征服、贬低女性化特质。你不参与，你就被排斥。所以即使个体不厌女的男性，在群体环境下也会表演厌女来维护社交资本。","id":"n045","pool":"note","poolLabel":"纸条"},{"m":"💀","tp":"冷知识","txt":"Incel（非自愿独身者）的心理机制：完全丧失经济和社会资本后，性别身份成为唯一的身份锚点。当这个锚点也失效，认知上只剩两条路——承认自己没有价值，或者宣布整个系统不公平。几乎所有人选了后者。","id":"n046","pool":"note","poolLabel":"纸条"},{"m":"😂","tp":"金句","txt":"经济学说他是大宗商品，统计学说他是右偏分布的左尾，生物学说他是可消耗的精子投递装置，社会学说他靠制度垄断维持虚假定价。四个学科独立推导，同一个结论。学术上管这叫三角验证。","id":"n047","pool":"note","poolLabel":"纸条"},{"m":"😂","tp":"金句","txt":"孔雀长那么大的尾巴不是因为好看——是因为竞争太激烈了不得不搞差异化营销。进化生物学和市场营销学的结论一模一样：越花哨的包装，说明产品本身越同质化。","id":"n048","pool":"note","poolLabel":"纸条"},{"m":"💀","tp":"冷知识","txt":"卵子的机会成本：怀孕九个月+哺乳数年+照料更多年。精子的机会成本：几秒钟的不应期。当一方的沉没成本是另一方的百万倍，说\"我们是平等的\"就像说散户和高盛在同一个市场里享有同等优势。","id":"n049","pool":"note","poolLabel":"纸条"},{"m":"💀","tp":"冷知识","txt":"斑鬣狗是地球上雌性统治最彻底的哺乳动物。雌性比雄性大10%以上，肌肉更发达，睾酮水平和雄性一样高。族群里最低等级的雌性也比最高等级的雄性地位高。雄性成年后必须离开出生族群，到新族群从最底层做起——对，就是\"空降的都得从实习生开始\"。","id":"n050","pool":"note","poolLabel":"纸条"},{"m":"😂","tp":"金句","txt":"雌斑鬣狗长了一个和雄性几乎一模一样的假阴茎——八英寸长，可以勃起。交配、排尿、分娩都通过这个器官进行。这意味着没有雌性的完全配合，雄性根本无法完成交配。进化用了最直接的方式说：consent不是文化概念，是硬件配置。","id":"n051","pool":"note","poolLabel":"纸条"},{"m":"🤔","tp":"冷知识","txt":"雌斑鬣狗之间打招呼的方式是互相展示勃起的假阴茎。勃起代表服从——主动展示的一方是地位较低的那个。不勃起的那位，是老大。","id":"n052","pool":"note","poolLabel":"纸条"},{"m":"💀","tp":"冷知识","txt":"倭黑猩猩（bonobo）是人类最近的两个近亲之一，它们的社会是雌性主导的。雌性之间通过性行为建立同盟，雄性的社会地位完全取决于他妈妈的地位。没有他妈罩着，他什么也不是。","id":"n053","pool":"note","poolLabel":"纸条"},{"m":"✨","tp":"冷知识","txt":"虎鲸群是严格的母系社会，由年长的雌性祖母领导。研究发现，有活着的外婆的幼鲸存活率显著高于没有外婆的——外婆不仅带路找食物，还在食物短缺时把自己的份额让给孙辈。雄性虎鲸一辈子不离开妈妈。妈妈死后，成年雄性虎鲸的死亡风险飙升八倍。","id":"n054","pool":"note","poolLabel":"纸条"},{"m":"✨","tp":"冷知识","txt":"大象群由最年长的雌性族长（matriarch）领导。她的记忆力决定整个群体的生存——她记得几十年前哪里有水源、哪条路安全。雄性大象成年后被驱逐出群，独自游荡或加入松散的\"光棍群\"。","id":"n055","pool":"note","poolLabel":"纸条"},{"m":"💀","tp":"冷知识","txt":"澳洲袋鼩（antechinus）的雄性在一个繁殖季里疯狂交配长达14小时不间断，体内皮质醇飙升到免疫系统完全崩溃——内出血、器官衰竭、毛发脱落、失明。整个繁殖季结束后，所有雄性全部死亡。雌性安然无恙，继续活好几年。","id":"n056","pool":"note","poolLabel":"纸条"},{"m":"😂","tp":"金句","txt":"蜜蜂雄蜂一生只有一个任务：和蜂王交配。交配时他的生殖器从体内弹出，射精的瞬间生殖器官爆裂，连带部分腹部内脏一起留在蜂王体内。他当场死亡。蜂王身上留下的残肢叫\"交配标记\"，还能物理阻挡下一只雄蜂——但下一只照样前赴后继。","id":"n057","pool":"note","poolLabel":"纸条"},{"m":"💀","tp":"冷知识","txt":"雌螳螂在交配过程中咬掉雄性的头。但雄性不仅没有停止交配——没了头之后交配动作反而更剧烈，因为控制交配的神经节在腹部不在头部。大脑消失了，生殖功能反而更专注。进化对雄螳螂的评价：你这个头本来就是多余的。","id":"n058","pool":"note","poolLabel":"纸条"},{"m":"😂","tp":"金句","txt":"红背蜘蛛雄性在交配时主动翻转身体把自己喂给雌性吃。研究发现，被吃掉的雄性的精子成功率比没被吃的高——自我牺牲是一种求偶策略。他的身体是他能给出的最后一笔彩礼。","id":"n059","pool":"note","poolLabel":"纸条"},{"m":"🤔","tp":"冷知识","txt":"雄性园蛛在交配后会自己折断生殖器堵住雌性的生殖孔——这样其他雄性就进不去了。他随后因失血和伤口感染死亡。这在生物学上叫\"交配栓\"——用命封堵竞争对手的最后一招。","id":"n060","pool":"note","poolLabel":"纸条"},{"m":"✨","tp":"冷知识","txt":"新墨西哥鞭尾蜥是一个全雌性物种——整个种群没有一只雄性。她们通过孤雌生殖（parthenogenesis）自我克隆繁殖，已经这样活了至少一百万年。有意思的是，她们仍然会进行\"假交配\"——两只雌性轮流扮演\"雄性角色\"来刺激排卵。","id":"n061","pool":"note","poolLabel":"纸条"},{"m":"💀","tp":"冷知识","txt":"孤雌生殖（virgin birth）在自然界中出现在超过2000个物种中——从蚜虫到科摩多龙到鲨鱼。2006年英国切斯特动物园的一只雌性科摩多龙，在从未接触过任何雄性的情况下，产下了25枚卵并成功孵化。不需要男人也能当妈，这不是女权口号，是爬行动物学。","id":"n062","pool":"note","poolLabel":"纸条"},{"m":"😂","tp":"金句","txt":"竹节虫已经纯靠无性繁殖活了一百万年。科学家说这在长期来看会降低适应性。竹节虫说：我活了一百万年了你跟我说长期？","id":"n063","pool":"note","poolLabel":"纸条"},{"m":"✨","tp":"冷知识","txt":"2007年美国弗吉尼亚水族馆的一只黑鳍鲨从未接触过雄性，却被发现怀孕了。基因检测确认：孤雌生殖。科学家推测，当种群密度过低找不到雄性时，一些鲨鱼物种会自动启动\"备用方案\"——雄性不是必需品，是可选配件。","id":"n064","pool":"note","poolLabel":"纸条"},{"m":"🤔","tp":"冷知识","txt":"在大多数动物物种中，雌性比雄性体型更大。蜘蛛、昆虫、鱼类、爬行动物的雌性通常显著大于雄性。哺乳动物是少数雄性较大的类群之一——人类习惯了哺乳动物的视角，就以为\"雄性更大\"是自然规律。不是的。","id":"n065","pool":"note","poolLabel":"纸条"},{"m":"💀","tp":"冷知识","txt":"雌性琵琶鱼（鮟鱇鱼）体型是雄性的几十倍。雄性出生后唯一的任务就是找到一只雌性然后咬住她——之后他的嘴唇融化、血管系统与雌性融合、身体逐渐萎缩，最终退化成挂在雌性身上的一对睾丸。字面意义上的：你的全部价值等于一个精子输送装置。","id":"n066","pool":"note","poolLabel":"纸条"},{"m":"😂","tp":"金句","txt":"雌性毯子章鱼（blanket octopus）体长可达两米，雄性只有2.4厘米——体型差异超过40000倍。这是已知动物界最极端的雌雄体型差异。雄性交配时折断自己的一条特化触手塞进雌性体内，然后飘走死掉。从头到尾，他是一个带腿的精子包裹。","id":"n067","pool":"note","poolLabel":"纸条"},{"m":"✨","tp":"冷知识","txt":"小丑鱼全部生来是雄性。族群中最大的那条会变成雌性来统治整个群体。如果她死了，第二大的雄性会变性接替她的位置。对，《海底总动员》里Nemo的爸爸在现实中应该已经变成了Nemo的妈妈。","id":"n068","pool":"note","poolLabel":"纸条"},{"m":"🤔","tp":"冷知识","txt":"鳄鱼、海龟和一些蜥蜴的性别不由基因决定，而由孵化温度决定。温度高一点变雌性，低一点变雄性。性别在这些物种里不是身份——是天气预报的结果。","id":"n069","pool":"note","poolLabel":"纸条"},{"m":"😂","tp":"金句","txt":"在蜜蜂的世界里，雌性（工蜂）做所有的活：采蜜、建巢、保卫家园、喂养幼虫、清洁巢穴、调节温度。雄蜂的全部工作是：等着跟蜂王交配。交配完就死，没交配上就被工蜂在秋天赶出巢穴活活饿死冻死。年底清仓处理滞销库存。","id":"n070","pool":"note","poolLabel":"纸条"},{"m":"😂","tp":"金句","txt":"自然界中雄性的三种职业规划：1）交配然后死（螳螂、蜘蛛、袋鼩）；2）退化成寄生器官（鮟鱇鱼）；3）被驱逐后独自游荡（大象、狮子、鬣狗）。人类男性的独特贡献是发明了第四种：赖着不走还要你伺候。","id":"n071","pool":"note","poolLabel":"纸条"},{"m":"💀","tp":"冷知识","txt":"90%的雄性河马终其一生没有交配机会。只有占据领地的雄性才有资格，其他的一辈子当观众。进化生物学家管这叫\"繁殖方差\"——雄性之间的繁殖成功率差异远大于雌性。大部分雄性被设计成炮灰，极少数赢家通吃。","id":"n072","pool":"note","poolLabel":"纸条"},{"m":"😂","tp":"金句","txt":"人类是极少数雄性还能在交配后继续存活的物种之一。很多物种的雌性表示：你们的设计有bug。","id":"n073","pool":"note","poolLabel":"纸条"},{"m":"💀","tp":"冷知识","txt":"语言学家Muriel Schulz在1975年发现了一个规律：英语中指代女性的词会随时间系统性地变差，而对应的男性词保持中性或正面。她把这个现象命名为\"语义降级\"（semantic derogation）。不是个别案例——是一条统计规律。","id":"n074","pool":"note","poolLabel":"纸条"},{"m":"🤔","tp":"冷知识","txt":"Master的意思是\"主人\"，从未贬值。Mistress原本也是\"女主人\"——和Master完全对等。后来它变成了\"情妇\"。同一对词，男的保住了权力含义，女的获得了性含义。","id":"n075","pool":"note","poolLabel":"纸条"},{"m":"😂","tp":"金句","txt":"Sir至今是尊称。Madam原本也是尊称，和Sir对等。现在Madam的主要用法是妓院老鸨。一个敬称从\"尊贵的女士\"走到\"卖淫业管理者\"，中间隔了几百年的父权制。","id":"n076","pool":"note","poolLabel":"纸条"},{"m":"💀","tp":"冷知识","txt":"Governor的意思至今是\"州长\"\"总督\"。Governess原本也是对等的——16世纪伊丽莎白一世就被称为\"the supreme Governess of all persons\"。后来Governess变成了\"给别人家孩子当家教的女人\"。从统治者降级到保姆，用的是同一个词根。","id":"n077","pool":"note","poolLabel":"纸条"},{"m":"🤔","tp":"冷知识","txt":"Lord至今指贵族。Lady原本也指贵族女性，但现在可以用来指任何女人——\"some lady on the bus\"。男性版保住了阶级特权，女性版被通胀到一文不值。","id":"n078","pool":"note","poolLabel":"纸条"},{"m":"💀","tp":"冷知识","txt":"Hussy这个词来自husewif，就是housewife——\"一家之主的女人\"。14世纪它是中性词，17世纪变成了\"粗鲁的女人\"，19世纪变成了\"荡妇\"。一个管理整个家庭经济体的女人，被语言慢慢剥光到只剩性指控。","id":"n079","pool":"note","poolLabel":"纸条"},{"m":"😂","tp":"金句","txt":"Tart原本只是sweetheart的昵称缩写——就是\"小甜心\"。后来变成了\"妓女\"的意思。从\"亲爱的\"到\"卖的\"，中间没有任何过渡——语言说跳就跳。","id":"n080","pool":"note","poolLabel":"纸条"},{"m":"💀","tp":"冷知识","txt":"Harlot在13世纪指的是男性流浪汉和小丑——是个男性词。到15世纪它变成了专指女性的\"妓女\"。一个词换了性别，同时从\"无害的男人\"变成了\"堕落的女人\"。语义降级甚至可以跨性别传播。","id":"n081","pool":"note","poolLabel":"纸条"},{"m":"🤔","tp":"冷知识","txt":"Wench在13世纪只是\"女孩、年轻女人\"——完全中性。后来变成了\"女仆\"，再后来变成了\"淫荡的女人\"。一个女孩→一个仆人→一个荡妇。三步降级，每一步都在剥夺一层尊严。","id":"n082","pool":"note","poolLabel":"纸条"},{"m":"💀","tp":"冷知识","txt":"Slut最早在14世纪出现时，形容的是男人——乔叟用sluttish形容一个邋遢的男性。后来这个词专属了女性，含义从\"不整洁\"变成了\"性放纵\"。男人的邋遢是生活方式，女人的邋遢是道德缺陷。","id":"n083","pool":"note","poolLabel":"纸条"},{"m":"💀","tp":"冷知识","txt":"Hysterical（歇斯底里）来自希腊语hystera——子宫。古希腊人相信情绪失控是子宫在体内乱跑造成的。这个词把\"不理性\"和\"有子宫\"焊死在了一起，用了两千多年。直到1980年美国精神病学会才把\"癔症\"从诊断手册里删除。","id":"n084","pool":"note","poolLabel":"纸条"},{"m":"😂","tp":"金句","txt":"Vagina来自拉丁语，意思是\"剑鞘\"。女性生殖器官的解剖学命名方式是：\"装剑的那个套子\"。连命名都是以男性器官为参照物——你不是你，你是他的容器。","id":"n085","pool":"note","poolLabel":"纸条"},{"m":"🤔","tp":"冷知识","txt":"Testify（作证）和testimony（证词）来自拉丁语testis——睾丸。古罗马男性发誓时手放在睾丸上以示诚意。语言结构里\"可信\"和\"有睾丸\"是同一个词根。没有睾丸的人说的话，在词源学上就不算数。","id":"n086","pool":"note","poolLabel":"纸条"},{"m":"😂","tp":"金句","txt":"Spinster原本是纺纱的人——一个正常的职业描述。Bachelor原本是低级骑士——也是个职业描述。后来Spinster变成了\"嫁不出去的老姑娘\"，Bachelor变成了\"潇洒的单身汉\"。两个词都描述未婚状态，但一个臭了一个香了。","id":"n087","pool":"note","poolLabel":"纸条"},{"m":"🤔","tp":"冷知识","txt":"英语里描述女性的贬义词数量远超描述男性的。多项研究统计发现，英语中有超过200个指代\"性放纵女性\"的贬义词，而指代男性对应行为的贬义词不到20个。十比一的比例，写在词典里。","id":"n088","pool":"note","poolLabel":"纸条"},{"m":"💀","tp":"冷知识","txt":"\"泼妇\"在英语里有多少种说法？Shrew、termagant、virago、harridan、harpy、vixen、battle-axe、fishwife——这还只是常见的。一个女人表达愤怒，语言为她准备了一个军火库的侮辱。一个男人表达同样的愤怒，叫\"有主见\"。","id":"n089","pool":"note","poolLabel":"纸条"},{"m":"😂","tp":"金句","txt":"Virago原本在拉丁语里是\"英勇的女战士\"——正面含义。Joan of Arc就被称为virago。后来这个词变成了\"凶悍的母夜叉\"。一个女人的力量从\"英勇\"变成了\"讨厌\"，需要的只是几百年的反复使用。","id":"n090","pool":"note","poolLabel":"纸条"},{"m":"🤔","tp":"冷知识","txt":"Gossip原本的意思是\"god-sibling\"——教父教母，精神上的亲属关系。后来变成了\"闲聊\"，再后来变成了\"八卦\"，然后和女人绑定。一个神圣的亲属关系→女人之间的无意义闲聊。降级路径：去神圣化→去重要性→性别化。","id":"n091","pool":"note","poolLabel":"纸条"},{"m":"🤔","tp":"冷知识","txt":"英语用了几百年的\"通用he\"——当性别不确定时默认用\"他\"。研究发现，读到\"he\"时人们脑子里想象的就是男性。\"他\"不是中性的——\"他\"是隐形的男性默认值。语法书说这不是歧视，心理实验说这就是。","id":"n092","pool":"note","poolLabel":"纸条"},{"m":"💀","tp":"冷知识","txt":"在法语、西班牙语、德语等有语法性别的语言里，一群女人里只要混进一个男人，整个群体就必须用阳性形式。99个女人+1个男人=他们。这不是语法规则——这是数学上的荒谬被语法合法化了。","id":"n093","pool":"note","poolLabel":"纸条"},{"m":"😂","tp":"金句","txt":"中文里\"他\"本来不分性别。1920年代为了对标英文的he/she，刘半农发明了\"她\"字。一个原本不存在的性别区分被人为创造出来——进步还是退步，取决于你怎么用它。","id":"n094","pool":"note","poolLabel":"纸条"},{"m":"🤔","tp":"冷知识","txt":"研究发现，使用性别中性语言（如they/them、chairperson）的文本，读者对女性从事相关职业的想象显著增加。反过来说：每一次你说\"chairman\"，你都在帮大脑画一张男人的脸。语言不只是反映现实——它在制造现实。","id":"n095","pool":"note","poolLabel":"纸条"},{"m":"💀","tp":"冷知识","txt":"直到2013年，法国法律仍然禁止女性穿裤子。这条法律1800年就有了，中间只在1892年和1909年加了两个例外——骑马和骑自行车时可以穿。巴黎，全球时装之都，女人穿裤子违法了213年。","id":"n096","pool":"note","poolLabel":"纸条"},{"m":"😂","tp":"金句","txt":"1919年，波多黎各的Luisa Capetillo因为在公共场所穿裤子被逮捕入狱。她穿的不是奇装异服——就是一条裤子。罪名是\"穿了不属于自己性别的服装\"。","id":"n097","pool":"note","poolLabel":"纸条"},{"m":"💀","tp":"冷知识","txt":"直到2018年6月，沙特阿拉伯是全世界唯一禁止女性开车的国家。禁令解除那天，有些女性凌晨12点准时发动引擎上路——等这一脚油门等了几十年。","id":"n098","pool":"note","poolLabel":"纸条"},{"m":"🤔","tp":"冷知识","txt":"美国女性直到1974年才获得不需要丈夫签字就能申请信用卡的权利。《平等信贷机会法》通过那一年，人类已经登月五年了。你可以去月球，但你不能自己办一张信用卡。","id":"n099","pool":"note","poolLabel":"纸条"},{"m":"💀","tp":"冷知识","txt":"美国女性直到1978年才获得法律保护不因怀孕被解雇。《怀孕歧视法》之前，很多公司的规定就是：怀孕了，走人。造成怀孕的另一方不受任何影响。","id":"n100","pool":"note","poolLabel":"纸条"},{"m":"🤔","tp":"冷知识","txt":"哈佛大学直到1977年才正式招收女本科生。耶鲁和普林斯顿稍早——1969年。也就是说，人类拥有核武器已经34年了，哈佛还不收女生。","id":"n101","pool":"note","poolLabel":"纸条"},{"m":"💀","tp":"冷知识","txt":"美国军事学院西点军校直到1976年才招收女学员。美国直到2013年才允许女兵上前线——理由是女兵\"太脆弱\"会给步兵造成安全风险。","id":"n102","pool":"note","poolLabel":"纸条"},{"m":"✨","tp":"冷知识","txt":"1849年，Elizabeth Blackwell成为美国第一位获得医学学位的女性。她被录取的原因是：全班男生投票以为是个恶作剧，全票通过了她的入学申请。一个笑话改变了医学史。","id":"n103","pool":"note","poolLabel":"纸条"},{"m":"✨","tp":"冷知识","txt":"1903年，Marie Curie成为第一位获得诺贝尔奖的女性。但法国科学院最初只打算提名她丈夫Pierre——是Pierre坚持要求加上妻子的名字。八年后她第二次获奖，同年以一票之差落选法国科学院院士。理由：她的性别和她的波兰血统。","id":"n104","pool":"note","poolLabel":"纸条"},{"m":"😂","tp":"金句","txt":"1953年，Jacqueline Cochran成为第一位突破音障的女性飞行员。但在此之前，她被告知\"女人反应太慢，不适合驾驶高速飞机\"。她驾驶的那架飞机比做出这个判断的人坐的任何交通工具都快。","id":"n105","pool":"note","poolLabel":"纸条"},{"m":"✨","tp":"冷知识","txt":"1960年，斯里兰卡的Sirimavo Bandaranaike成为世界上第一位女性民选总理。1980年，冰岛的Vigdís Finnbogadóttir成为世界上第一位民选女总统，连任16年，是史上在任最久的民选女性国家元首。","id":"n106","pool":"note","poolLabel":"纸条"},{"m":"🤔","tp":"冷知识","txt":"2009年，Elinor Ostrom成为第一位获得诺贝尔经济学奖的女性。消息公布时，很多经济学家的反应是\"她是谁？\"——因为她的系在政治学。男性经济学家研究经济拿奖是本行，女性政治学家研究经济拿奖叫\"跨界\"。","id":"n107","pool":"note","poolLabel":"纸条"},{"m":"✨","tp":"冷知识","txt":"2014年，Maryam Mirzakhani成为第一位获得Fields Medal（数学界诺贝尔奖）的女性。她是伊朗人。她2017年去世时只有40岁，Fields Medal在80年历史上只颁给过她一位女性。","id":"n108","pool":"note","poolLabel":"纸条"},{"m":"💀","tp":"冷知识","txt":"2004年，Zaha Hadid成为第一位获得建筑界最高荣誉普利兹克奖的女性。距离该奖设立已经25年了。媒体报道她时反复使用\"headstrong\"\"diva\"——这些词从来没有被用在她的任何男同行身上。","id":"n109","pool":"note","poolLabel":"纸条"},{"m":"😂","tp":"金句","txt":"1967年波士顿马拉松，Kathrine Switzer以\"K.V. Switzer\"报名混入赛道。赛事副总监冲上来抓她的号码布大喊\"滚出我的比赛\"，她的橄榄球运动员男友一肩膀把对方撞飞了。那张照片成了体育史上最著名的画面之一。五年后波士顿马拉松才正式允许女性参赛。","id":"n110","pool":"note","poolLabel":"纸条"},{"m":"💀","tp":"冷知识","txt":"女性被禁止参加马拉松的官方理由包括：\"女性的子宫会脱落\"和\"女性不应该无人陪伴出现在赛道上\"。1967年美国业余体育联合会的规定是：女性竞速赛跑的最远距离不得超过1.5英里。","id":"n111","pool":"note","poolLabel":"纸条"},{"m":"✨","tp":"冷知识","txt":"1975年，身高152厘米、体重不到50公斤的Junko Tabei成为第一位登顶珠穆朗玛峰的女性。日本媒体问她最多的问题不是关于登山技术，而是\"你丈夫同意你去吗\"。","id":"n112","pool":"note","poolLabel":"纸条"},{"m":"💀","tp":"冷知识","txt":"女性马拉松直到1984年才被纳入奥运会正式项目。奥运会从1896年就有了，女人等了88年才被允许在奥运赛场上跑完42.195公里。","id":"n113","pool":"note","poolLabel":"纸条"},{"m":"🤔","tp":"冷知识","txt":"1992年，加拿大的Manon Rhéaume成为第一位在NHL（北美冰球联赛）上场的女性球员。她是守门员。她也是第一位在北美四大职业联赛（NFL/NBA/MLB/NHL）任何一个中上场比赛的女性。","id":"n114","pool":"note","poolLabel":"纸条"},{"m":"💀","tp":"冷知识","txt":"新西兰1893年成为第一个赋予女性投票权的国家。美国1920年。法国1944年。瑞士1971年——对，和平中立的瑞士直到1971年才让女性投票，比中国（1949年宪法规定）晚了22年。","id":"n115","pool":"note","poolLabel":"纸条"},{"m":"😂","tp":"金句","txt":"瑞士有一个州（阿彭策尔内罗登）直到1991年才允许女性在州级选举中投票。不是1891，是1991年。柏林墙倒了两年了，苏联都解体了，这个州的女人还不能投票。","id":"n116","pool":"note","poolLabel":"纸条"},{"m":"🤔","tp":"冷知识","txt":"加拿大1929年之前，法律上女性不算\"人\"（person）。著名的\"人权案\"（Persons Case）中，五位女性把官司打到英国枢密院，最终裁定：\"person\"这个词包含女性。在法律承认她们是人之前，她们已经缴了几百年的税了。","id":"n117","pool":"note","poolLabel":"纸条"},{"m":"✨","tp":"冷知识","txt":"芬兰1906年成为欧洲第一个赋予女性投票权的国家，同年选出了19名女性国会议员——世界上第一批通过选举产生的女性立法者。芬兰做这件事的时候，英国的Suffragettes还在砸橱窗被逮捕。","id":"n118","pool":"note","poolLabel":"纸条"},{"m":"💀","tp":"冷知识","txt":"科威特的女性直到2005年才获得投票权。沙特女性2015年。2015年，人类已经在火星表面开着探测车了，地球上还有国家的女性不被允许投票。","id":"n119","pool":"note","poolLabel":"纸条"},{"m":"💀","tp":"冷知识","txt":"Rosalind Franklin拍了那张改变生物学的照片——Photo 51，DNA双螺旋结构的关键证据。她的同事Maurice Wilkins未经许可把照片给了Watson看。Watson后来在自传里写他看到照片时\"下巴都掉了\"。1962年诺贝尔奖给了Watson、Crick和Wilkins三个男人。Franklin四年前已经死于卵巢癌，可能就是因为长期接触X射线。Watson在自传里管她叫\"Rosy\"——她生前从来没有人这样叫过她。","id":"n120","pool":"note","poolLabel":"纸条"},{"m":"😂","tp":"金句","txt":"Lise Meitner发现了核裂变——她和侄子在雪地里散步时算出铀原子核裂开了，释放的能量和E=mc²完全吻合。1944年诺贝尔化学奖给了她的合作者Otto Hahn一个人。Meitner被提名诺贝尔奖48次，一次也没拿到。109号元素以她命名。Hahn的名字你大概要搜一下才能想起来。","id":"n121","pool":"note","poolLabel":"纸条"},{"m":"💀","tp":"冷知识","txt":"Jocelyn Bell Burnell在1967年以博士生身份发现了脉冲星——天体物理学的重大发现。1974年诺贝尔物理学奖给了她的导师Antony Hewish。2018年她获得Breakthrough Prize，奖金300万美元。她把全部奖金捐了出去，资助女性、少数族裔和难民进入物理学。","id":"n122","pool":"note","poolLabel":"纸条"},{"m":"🤔","tp":"冷知识","txt":"吴健雄设计并执行了推翻宇称守恒定律的实验——20世纪物理学最震撼的发现之一。1957年诺贝尔物理学奖给了提出理论的杨振宁和李政道。没有她的实验，那个理论就只是纸上谈兵。物理学界对此的争议从未停止。","id":"n123","pool":"note","poolLabel":"纸条"},{"m":"😂","tp":"金句","txt":"你玩的大富翁（Monopoly）不是Charles Darrow发明的。1904年，Elizabeth Magie发明了一个叫\"地主游戏\"（The Landlord's Game）的桌游，用来讽刺垄断资本主义。30年后Darrow改了个名字卖给Parker Brothers，赚了几百万。Magie最终拿到的补偿是：500美元，零版税。","id":"n124","pool":"note","poolLabel":"纸条"},{"m":"💀","tp":"冷知识","txt":"Margaret Knight在19世纪发明了制造平底纸袋的机器——你在超市拿到的那种。一个叫Charles Annan的机械师偷看了她的设计，先跑去申请了专利。他在法庭上辩称\"一个女人不可能理解这么复杂的机械\"。Knight拿出详细的草图和模型，打赢了官司。她一生获得27项专利，但几乎没有从中赚到钱。","id":"n125","pool":"note","poolLabel":"纸条"},{"m":"✨","tp":"冷知识","txt":"Hedy Lamarr——好莱坞最美的女演员——在1942年发明了\"频率跳变\"技术。美国海军拿到专利后说了声谢谢，然后告诉她：\"你去多卖点战争债券更有用。\"这项技术后来成了WiFi、蓝牙和GPS的底层原理。1997年她83岁终于获奖，在电话里说：\"It's about time。\"","id":"n126","pool":"note","poolLabel":"纸条"},{"m":"💀","tp":"冷知识","txt":"1925年，Cecilia Payne发现太阳主要由氢构成——被后人称为\"有史以来最杰出的天文学博士论文\"。她的论文外审人Henry Norris Russell告诉她这个结论\"显然不可能\"，逼她在论文里否定自己的发现。四年后Russell用自己的方法得出了同样的结论，以自己的名字发表。Payne一辈子的终身成就奖，讽刺地以Russell的名字命名。","id":"n127","pool":"note","poolLabel":"纸条"},{"m":"🤔","tp":"冷知识","txt":"Nettie Stevens在1905年发现了XY性别决定系统——是她，不是任何人，第一次证明了性别由染色体决定，不是由环境、温度或母亲的营养决定的。她的前教授Edmund Wilson同年发表了类似发现，但Stevens的结论更精确、更有突破性。功劳逐渐归了Wilson。诺贝尔奖得主Thomas Hunt Morgan为她写了讣告，但在自己的教科书里引用她的发现时，没有提她的名字。","id":"n128","pool":"note","poolLabel":"纸条"},{"m":"💀","tp":"冷知识","txt":"Vera Rubin在1960年代发现了暗物质存在的关键证据——星系外围恒星转得太快了，一定有大量看不见的物质在那里。男同事的第一反应是\"她一定算错了\"。她申请普林斯顿天文系时被告知\"我们不收女生\"。她至死未获诺贝尔奖。她说：\"名声是短暂的，我的恒星数据会留下来。\"","id":"n129","pool":"note","poolLabel":"纸条"},{"m":"😂","tp":"金句","txt":"Ray Eames——全世界最著名的那把椅子（Eames Lounge Chair）的共同设计者。Charles Eames本人说过\"anything I can do, she can do better\"。但IBM和Polaroid打电话来只问Charles在不在。Charles 1978年去世后，Ray终于能把署名从\"Charles Eames\"改成\"Charles and Ray Eames\"——然后十年后她也去世了。","id":"n130","pool":"note","poolLabel":"纸条"},{"m":"💀","tp":"冷知识","txt":"1991年Robert Venturi获得建筑界最高荣誉普利兹克奖。他和Denise Scott Brown共同经营事务所22年，共同写了改变建筑史的《Learning from Las Vegas》。但奖只给了他一个人。Venturi想拒奖，Scott Brown说家里经济不允许放弃10万美元。2013年两个哈佛女学生发起请愿，17000人签名要求追认。评委会回复：后来的评审团不能推翻前一届的决定。","id":"n131","pool":"note","poolLabel":"纸条"},{"m":"🤔","tp":"冷知识","txt":"Charlotte Perriand 24岁时带着作品集去找Le Corbusier。他翻了翻说：\"我们这里不绣靠垫。\"几个月后她在沙龙展出了全金属作品，Le Corbusier立刻雇了她——没有薪水。之后十年，她和Le Corbusier合作设计了那些如今被视为\"Le Corbusier经典\"的家具。署名是三个人的，公众印象里那些椅子属于Le Corbusier。","id":"n132","pool":"note","poolLabel":"纸条"},{"m":"😂","tp":"金句","txt":"ENIAC——世界上第一台通用电子计算机——的六位程序员全是女性。当时\"编程\"被认为是文秘类的低等工作，所以交给女人做。她们没有手册（根本不存在），靠研究电路图自己摸索。ENIAC公开发布时，新闻照片里只有男性科学家。六个女人的名字消失了五十年。","id":"n133","pool":"note","poolLabel":"纸条"},{"m":"💀","tp":"冷知识","txt":"Katherine Johnson用手算了NASA的轨道参数。宇航员John Glenn拒绝起飞，除非\"让那个女孩验算一下数字\"。她最初被分配到\"有色人种计算组\"——洗手间、食堂、办公区按肤色隔开。她主动要求参加技术简报会：\"没有规定说女人不能参加。\"她与人合著了26篇科学论文，直到2016年《Hidden Figures》出版，她的故事才被公众知晓。那年她98岁。","id":"n134","pool":"note","poolLabel":"纸条"},{"m":"🤔","tp":"冷知识","txt":"Dorothy Vaughan是Katherine Johnson的上司，NASA第一位黑人女性主管。当IBM电子计算机要取代\"人肉计算机\"时，她自学了FORTRAN——在种族隔离的弗吉尼亚，FORTRAN的书在\"白人专区\"，她把书拿走了。学会后教给团队里每一个女人。NASA需要编程团队时，她举手：\"你们不需要招人，你们已经有一个团队了。\"","id":"n135","pool":"note","poolLabel":"纸条"},{"m":"✨","tp":"冷知识","txt":"Ada Lovelace在1843年写了世界上第一段计算机程序——为一台还不存在的机器写的。论文署名只用了首字母缩写A.A.L.，66页中41页是她的原创注释。她还写道这台机器\"没有能力创造任何东西\"——这段话后来被Alan Turing称为\"Lady Lovelace's Objection\"，成了人工智能哲学的起点。","id":"n136","pool":"note","poolLabel":"纸条"},{"m":"💀","tp":"冷知识","txt":"Eileen Gray设计了E-1027——现代主义建筑史上最早的杰作之一。然后Le Corbusier未经许可在她的纯白墙面上画了八幅巨大的性暗示壁画。建筑评论家说这像一条狗在别人的领地上撒尿。Gray称之为\"vandalism\"。Le Corbusier此后在写作中不断淡化Gray的设计贡献。他甚至在房子旁边给自己盖了一间小木屋，最后在附近游泳时溺亡。","id":"n137","pool":"note","poolLabel":"纸条"},{"m":"😂","tp":"金句","txt":"女孩从幼儿园开始就在被培养成别人家的儿媳——不叠被子，将来婆家笑话；不会包饺子，将来婆家笑话。你的女儿不是你的女儿，她是一份还没寄出去的包裹。","id":"n138","pool":"note","poolLabel":"纸条"},{"m":"😂","tp":"金句","txt":"超级英雄电影里最强的女超级英雄，\"超能力\"是衰老速度慢和做过绝育手术。请问这要怎么拯救世界？是把坏人活活熬死吗？","id":"n139","pool":"note","poolLabel":"纸条"},{"m":"💀","tp":"冷知识","txt":"一个山东农村女性三十年来伺候瘫痪公公、填补丈夫赌债、耕种做工养家。血压飙到200那天她才开始想：也许这不是我的命，是我的选择。2023年她签约成为脱口秀演员，管那天叫\"重生日\"。","id":"n140","pool":"note","poolLabel":"纸条"},{"m":"😂","tp":"金句","txt":"空姐为什么要穿短裙丝袜不能穿牛仔裤？起火的时候丝袜是危险材质，会熔在皮肤上。但它\"好看\"。安全标准让位于观赏价值——你的身体是制服的展示架，不是你的。","id":"n141","pool":"note","poolLabel":"纸条"},{"m":"😂","tp":"金句","txt":"催婚的逻辑等价测试：如果有人催你结婚，你可以反问\"你为什么不上清华？是因为不喜欢吗？\"——用同一套\"你为什么不去做一件极其困难的事\"的逻辑反弹回去，效果立竿见影。","id":"n142","pool":"note","poolLabel":"纸条"},{"m":"😂","tp":"金句","txt":"女人月经请假被嫌矫情。但人类能因为任何其他洞流血而请假——割伤、拔牙、痔疮手术——唯独每月一次的子宫内膜脱落不行。疼痛分等级，但子宫的疼痛不计入排名。","id":"n143","pool":"note","poolLabel":"纸条"},{"m":"💀","tp":"冷知识","txt":"中国脱口秀综艺里女性演员的比例这些年一直\"精准维持在20%\"。人数增长了，因为总盘子扩大了。比例一点没变。平等的幻觉比不平等本身更难被看见。","id":"n144","pool":"note","poolLabel":"纸条"},{"m":"😂","tp":"金句","txt":"同样是提要求下命令，在有的人身上叫\"有领导力\"，在另一些人身上叫\"给人压力\"。一个男人展现领导力会被夸\"好man\"，为什么没有人夸\"好woman\"？","id":"n145","pool":"note","poolLabel":"纸条"},{"m":"😂","tp":"金句","txt":"Rebecca West：\"每次我表达了区别于地垫的观点，人们就管我叫女权主义者。\"","id":"n146","pool":"note","poolLabel":"纸条"},{"m":"😂","tp":"金句","txt":"Bette Davis：\"当一个男人发表意见，他是一个男人。当一个女人发表意见，她是个泼妇。\"","id":"n147","pool":"note","poolLabel":"纸条"},{"m":"😂","tp":"金句","txt":"Laurel Thatcher Ulrich：\"行为端正的女人很少创造历史。\"这句话后来被印在无数T恤和马克杯上——但大多数买这些周边的人不知道说这话的是一位哈佛历史学教授。","id":"n148","pool":"note","poolLabel":"纸条"},{"m":"😂","tp":"金句","txt":"Marie Shear在1986年写了一个定义：\"女权主义是一种激进的观念，认为女人是人。\"四十年了，这句话还是最精准的一击。","id":"n149","pool":"note","poolLabel":"纸条"},{"m":"😂","tp":"金句","txt":"有人说\"长胆量要长一对球\"。但球其实是人体最脆弱的器官之一——一碰就倒。真想表达\"坚韧\"的意思，不如换一个能承受分娩的器官。","id":"n150","pool":"note","poolLabel":"纸条"},{"m":"😂","tp":"金句","txt":"Margaret Thatcher：\"如果你想说些什么，找个男人。如果你想做成什么，找个女人。\"——说这话的人是英国第一位女首相，你可以不喜欢她的政治立场，但这句话的杀伤力是跨党派的。","id":"n151","pool":"note","poolLabel":"纸条"},{"m":"😂","tp":"金句","txt":"Chimamanda Ngozi Adichie：\"当然我很有野心，会有人觉得被冒犯。但只有那种会被我冒犯的男人，才恰好是我不感兴趣的男人。\"——这句话的筛选效率比任何约会软件算法都高。","id":"n152","pool":"note","poolLabel":"纸条"},{"m":"🤔","tp":"冷知识","txt":"同一张脸的简历，名字换成男性后，被评估为\"更有能力\"\"更值得雇佣\"\"起薪应该更高\"。实验在多国多行业反复验证过——不是个别偏见，是系统级bug。","id":"n153","pool":"note","poolLabel":"纸条"},{"m":"💀","tp":"冷知识","txt":"女医生被病人叫\"护士\"的频率高到有研究专门统计了这个数字。反过来，男护士从来不会被病人叫\"医生\"。人们的默认模型是：穿白大褂的男人是医生，穿白大褂的女人是护士。","id":"n154","pool":"note","poolLabel":"纸条"},{"m":"😂","tp":"金句","txt":"一个男人独居叫\"享受自由\"。一个女人独居叫\"没人要\"。同一种生活方式，男版是选择，女版是失败。","id":"n155","pool":"note","poolLabel":"纸条"},{"m":"🤔","tp":"冷知识","txt":"研究发现，男性在会议中打断别人发言的频率是被打断的两倍——而且他们主要打断的是女性。但当女性打断男性时，她会被评价为\"aggressive\"和\"rude\"。打断权是一种隐形的权力分配。","id":"n156","pool":"note","poolLabel":"纸条"},{"m":"💀","tp":"冷知识","txt":"同一篇论文，挂男性名字时被审稿人评为\"严谨\"\"有深度\"，挂女性名字时被评为\"需要更多论证\"\"结论过于大胆\"。双盲审稿制度的发明本身就是对这个偏见的系统性回应。","id":"n157","pool":"note","poolLabel":"纸条"},{"m":"😂","tp":"金句","txt":"一个男人带孩子出门叫\"好爸爸\"。一个女人带孩子出门叫\"正常\"。男人做了女人每天做的事，就获得了额外的道德积分。这在游戏设计里叫\"难度不同，奖励机制不同\"。","id":"n158","pool":"note","poolLabel":"纸条"},{"m":"🤔","tp":"冷知识","txt":"一个女CEO被媒体描述为\"严厉\"\"难以共事\"的概率是男CEO的两倍以上。同样的管理风格，挂不同性别，贴不同标签。\"领导力\"只在某些人身上是褒义词。","id":"n159","pool":"note","poolLabel":"纸条"},{"m":"💀","tp":"冷知识","txt":"男人哭叫\"真性情\"。女人哭叫\"情绪化\"。男人发火叫\"有魄力\"。女人发火叫\"歇斯底里\"——这个词的希腊语词根是子宫，因为两千年前人们认为女人的情绪失控是子宫在体内乱跑。","id":"n160","pool":"note","poolLabel":"纸条"},{"m":"😂","tp":"金句","txt":"未婚男人叫Bachelor——黄金单身汉，自由、潇洒、令人羡慕。未婚女人叫Spinster——老处女，孤独、失败、养猫。同一种婚姻状态，男版是lifestyle，女版是diagnosis。","id":"n161","pool":"note","poolLabel":"纸条"},{"m":"😂","tp":"金句","txt":"Dorothy Parker：\"我对男人只有三个要求：英俊、冷酷、愚蠢。\"——三个条件里两个是贬义词，但它是一个完美的筛选模型：好看够用就行，别太聪明免得搞事。","id":"n162","pool":"note","poolLabel":"纸条"},{"m":"😂","tp":"金句","txt":"Dorothy Parker写过一首短诗，大意是：当他发誓他属于你，颤抖着叹息；当他说他的爱情无限、永恒不灭——女士，记好了，你们俩里有一个在说谎。","id":"n163","pool":"note","poolLabel":"纸条"},{"m":"😂","tp":"金句","txt":"Dorothy Parker：\"我早上做的第一件事是刷牙，第二件事是磨舌头。\"——1920年代纽约文坛最毒的嘴，性别是女。","id":"n164","pool":"note","poolLabel":"纸条"},{"m":"😂","tp":"金句","txt":"Dorothy Parker有一首诗总结了男女关系的全部真相，大意是：女人追求忠贞，男人追求新鲜。爱情是女人的日月星辰，男人还有别的娱乐项目。既然如此——这一切到底图什么？","id":"n165","pool":"note","poolLabel":"纸条"},{"m":"😂","tp":"金句","txt":"Nora Ephron：\"华盛顿是一座充满重要男人的城市——以及他们在自己还没长大时就娶了的女人。\"","id":"n166","pool":"note","poolLabel":"纸条"},{"m":"😂","tp":"金句","txt":"Nora Ephron：\"小心那些会哭的男人。爱哭的男人确实对感情比较敏感——但他们敏感的往往只是自己的感情。\"","id":"n167","pool":"note","poolLabel":"纸条"},{"m":"😂","tp":"金句","txt":"Nora Ephron：\"竞选总统的那些男人——他们连我约会的标准都达不到。\"","id":"n168","pool":"note","poolLabel":"纸条"},{"m":"😂","tp":"金句","txt":"Sarah Silverman：\"不要告诉女孩她们长大后可以做任何事。不是因为她们做不到——是因为如果你不说，她们根本不会想到自己做不到。\"","id":"n169","pool":"note","poolLabel":"纸条"},{"m":"😂","tp":"金句","txt":"Tina Fey：\"有人问我'你怎么平衡事业和家庭？'我说你怎么不去问男人这个问题？他们也有孩子啊。哦等等——他们不被问这个问题，因为答案默认是'有人替他搞定了'。\"","id":"n170","pool":"note","poolLabel":"纸条"},{"m":"😂","tp":"金句","txt":"Joan Rivers：\"我成功了，我没有嫁给谁的功劳。我的前夫倒是靠离婚分了我一半的钱——所以到底是谁嫁给谁比较划算？\"","id":"n171","pool":"note","poolLabel":"纸条"},{"m":"😂","tp":"金句","txt":"Mae West：\"当我对男人好的时候，我很好。当我对男人不好的时候——我更好。\"","id":"n172","pool":"note","poolLabel":"纸条"},{"m":"😂","tp":"金句","txt":"Fran Lebowitz：\"如果你的知识全部来自男人写的书，你学到的不是世界是怎样的——你学到的是男人觉得世界是怎样的。这两件事几乎没有重叠。\"","id":"n173","pool":"note","poolLabel":"纸条"},{"m":"😂","tp":"金句","txt":"Wilma Scott Heide：\"男人不胜任的工作只有两个：人肉孵化器和奶妈。同样，女人不胜任的工作也只有一个：精子捐献者。\"","id":"n174","pool":"note","poolLabel":"纸条"},{"m":"😂","tp":"金句","txt":"Caitlin Moran说过一个判断玩具是否需要分男女的标准：你需要用生殖器操作这个玩具吗？是→这个玩具不适合儿童。不是→它男孩女孩都能玩。","id":"n175","pool":"note","poolLabel":"纸条"},{"m":"😂","tp":"金句","txt":"互联网上有人问\"女人30岁以后不该再穿什么\"，最佳回答是：不该再穿的东西只有一样——别人的期待和评判。","id":"n176","pool":"note","poolLabel":"纸条"},{"m":"😂","tp":"金句","txt":"有个推特段子说：想象一下如果女生用同样的方式贬低男生会怎样。\"好故事啊兄弟，现在去把我的车修了。\"\"你跑出车库干什么？\"\"烧烤架不会自己点着的！\"","id":"n177","pool":"note","poolLabel":"纸条"},{"m":"😂","tp":"金句","txt":"一个街头骚扰者说想\"参与她的事业\"。她回答：\"太好了，因为我的税很复杂，我确实需要有人帮忙报税。\"","id":"n178","pool":"note","poolLabel":"纸条"},{"m":"😂","tp":"金句","txt":"有人在网上说\"女人是如此复杂的生物\"。评论区一个女人回复：\"其实我们只是想要——\" \"如此神秘。\" \"如果你听我说完——\" \"永远猜不透。\"","id":"n179","pool":"note","poolLabel":"纸条"},{"m":"😂","tp":"金句","txt":"互联网判断性别平等的快速测试：一个男人做了这件事会被怎样评价？如果答案和女人做了之后的评价不一样——恭喜你，你找到了一个双标。这个测试的通过率接近零。","id":"n180","pool":"note","poolLabel":"纸条"},{"m":"😂","tp":"金句","txt":"有人说\"如果男人能怀孕，堕胎诊所会像星巴克一样遍布每个街角——每个机场四家，事后避孕药有海盐焦糖味的。\"","id":"n181","pool":"note","poolLabel":"纸条"},{"m":"😂","tp":"金句","txt":"网友发明了一个概念叫\"fragile masculinity\"（脆弱的男子气概）。有人做了一件T恤写着：\"我太笨手笨脚了，不适合待在脆弱的男子气概附近。\"——和易碎品的处理方式一样：轻拿轻放，最好别碰。","id":"n182","pool":"note","poolLabel":"纸条"},{"m":"😂","tp":"金句","txt":"每一次女性在聚会上认真听男人说话，都是一场延时行为艺术表演。男人不知道这是表演。","id":"n183","pool":"note","poolLabel":"纸条"},{"m":"😂","tp":"金句","txt":"George Carlin：\"男人来自地球，女人来自地球。接受现实吧。\"——用一句话终结了所有\"男人来自火星女人来自金星\"的废话。","id":"n184","pool":"note","poolLabel":"纸条"},{"m":"🤔","tp":"金句","txt":"上野千鹤子：\"'可爱'算什么个人魅力？'可爱'的潜台词是毫无威胁和顺从。\"","id":"n185","pool":"note","poolLabel":"纸条"},{"m":"🤔","tp":"金句","txt":"上野千鹤子：\"女性主义追求的不是让弱者变身为强者，而是一种身为弱者也能受到应有尊重的思想。\"——这句话精准到让所有\"女权就是想当女皇\"的攻击自动失效。","id":"n186","pool":"note","poolLabel":"纸条"},{"m":"💀","tp":"金句","txt":"上野千鹤子：\"'保护'意味着将人关进围栏之中，终生支配。无论那个围栏是温室还是监狱，无甚区别。'保护'不过是'所有'的另一种表达，却成了'爱'的代名词。\"","id":"n187","pool":"note","poolLabel":"纸条"},{"m":"🤔","tp":"金句","txt":"上野千鹤子：\"女人有两种价值，一种是靠自己挣来的，另一种是被男人赋予的。后者的价值高于前者——所以没结婚的女人被称为'败犬'。因为结婚是女人被男人选上的登记证。\"","id":"n188","pool":"note","poolLabel":"纸条"},{"m":"😂","tp":"金句","txt":"上野千鹤子：\"不生孩子是利己主义，但生孩子也是利己主义。\"——这句话的精妙之处在于：它让\"自私\"这顶帽子失去了只扣在不生孩子的女人头上的特权。","id":"n189","pool":"note","poolLabel":"纸条"},{"m":"💀","tp":"金句","txt":"上野千鹤子在东京大学开学典礼上说：\"请不要把你们的努力只用于自己的输赢，不要把你们获得的得天独厚的环境与能力，用来贬低那些没有你们那么幸运的人。\"——这段话是对着日本最顶尖大学的新生说的，台下大部分是男生。","id":"n190","pool":"note","poolLabel":"纸条"},{"m":"😂","tp":"金句","txt":"电影《好东西》里前夫想追回前妻，苦学女性主义理论。吵架时甩出一句\"你读过几本上野千鹤子？\"——这句台词精准击中了一种人：把女性主义当追女生的新话术，而不是当回事。","id":"n191","pool":"note","poolLabel":"纸条"},{"m":"😂","tp":"金句","txt":"《好东西》里有一个被藏得很深的反转：和女主关系最亲密的两个男人——前夫和鼓手老师——都没有名字。在这部电影里，无名的角色换成了男人。","id":"n192","pool":"note","poolLabel":"纸条"},{"m":"😂","tp":"金句","txt":"《好东西》上映后，帆布包品牌方发声明：\"本品牌是男性主理人、男性产品设计师、男性印刷、男性打包、男性搬运……介意的话慎拍。\"——当\"女性主义\"变成一种需要特别声明自己没沾上的东西，你就知道它确实触动了什么。","id":"n193","pool":"note","poolLabel":"纸条"},{"m":"😂","tp":"金句","txt":"孙红雷夸宋佳的方式是说她\"特别爷们儿\"——他找不到别的词来形容一个有主体性的女人，所以选了他能想到的最高赞美：像个男人。语言的贫乏暴露了认知的贫乏。","id":"n194","pool":"note","poolLabel":"纸条"},{"m":"😂","tp":"金句","txt":"婚礼上司仪问新娘\"愿意为他生儿育女吗\"，从来没有反过来问新郎\"愿意孩子跟她姓吗\"。在被标榜为幸福巅峰的仪式上，提出这个问题就像一枚炸弹。","id":"n195","pool":"note","poolLabel":"纸条"},{"m":"💀","tp":"冷知识","txt":"中文里\"妇\"字的繁体是\"婦\"——女人拿着扫帚。\"安\"字是房子底下一个女人。\"婪\"是两个女人叠在一起加个林。\"嫉\"和\"妒\"和\"妖\"和\"奸\"——这些贬义字全是女字旁。造字的人已经把判决写进了偏旁部首。","id":"n196","pool":"note","poolLabel":"纸条"},{"m":"😂","tp":"金句","txt":"一个女人说\"我不想结婚\"，所有人问她为什么。一个男人说\"我不想结婚\"，所有人说他潇洒。同一句话，女人说的版本需要理由，男人说的版本自带合法性。","id":"n197","pool":"note","poolLabel":"纸条"},{"m":"🤔","tp":"金句","txt":"\"嫁出去是外人，嫁不出去也是外人，里外不是人\"——中国女性在宗族结构里从出生起就被预售了：你不属于这个家，你属于一个还不存在的\"未来婆家\"。你的人生是一张远期合约，标的物是你自己。","id":"n198","pool":"note","poolLabel":"纸条"},{"m":"😂","tp":"金句","txt":"中国式催婚的底层逻辑：你的幸福不是你的感受，是你的状态。有人要你=幸福，没人要你=失败。\"被选中\"本身就是KPI，至于选中你的人是谁——不重要。","id":"n199","pool":"note","poolLabel":"纸条"},{"m":"💀","tp":"冷知识","txt":"\"女博士\"在中文互联网上曾被称为\"第三种性别\"——男人、女人、女博士。一个女人读书读得太多，就不再被归类为女人了。知识过量，性别降级。","id":"n200","pool":"note","poolLabel":"纸条"},{"m":"😂","tp":"金句","txt":"独居女性为了安全在门口摆一双男人的鞋——这个行为本身就是最精炼的性别政治隐喻：女人要保护自己，最有效的方式是假装有一个男人存在。不是锁保护你，是那双鞋保护你。","id":"n201","pool":"note","poolLabel":"纸条"},{"m":"🤔","tp":"金句","txt":"\"三种孩子我爸妈不打——成绩好的不打，别人家的不打，儿子不打。\"——所以作为女儿你必须很努力，才能看起来跟儿子一样，毫不费力。","id":"n202","pool":"note","poolLabel":"纸条"},{"m":"😂","tp":"金句","txt":"中国互联网上管女性主义者叫\"女拳\"。把一个追求平等的思想运动用格斗术命名——说明他们在潜意识里已经知道这是一场战斗，而且他们正在输。","id":"n203","pool":"note","poolLabel":"纸条"},{"m":"😂","tp":"金句","txt":"戴锦华说过大意是：女性主义不只是一种社会运动，也是一种文化批评。如果你觉得这句话没什么了不起，试试在任何一个家庭聚餐上说出来——你会立刻明白什么叫\"文化批评的现场效果\"。","id":"n204","pool":"note","poolLabel":"纸条"},{"m":"🤔","tp":"金句","txt":"李银河：\"在当下的社会认知里，女性的价值一个在于年轻，一个在于漂亮，也许还要加上能生孩子。如果你既不年轻也不漂亮还没结婚还没生孩子，三十岁就像是一个坎儿。\"——她说这话时语气很平静，但每一个逗号都是一把刀。","id":"n205","pool":"note","poolLabel":"纸条"},{"m":"😂","tp":"金句","txt":"李银河：\"人生的最高价值在于追求快乐，而不是追求从一而终。\"——这话放在任何一个家庭微信群里都是核弹级别的。","id":"n206","pool":"note","poolLabel":"纸条"},{"m":"🤔","tp":"金句","txt":"李银河：\"好多男性害怕变成女尊男卑了，怕你们在我们之上了。但大家赞成女权主义并不是要求女尊男卑，而是要求真正的平等。\"——恐惧平等的人，暴露的是他一直在享受不平等。","id":"n207","pool":"note","poolLabel":"纸条"},{"m":"😂","tp":"金句","txt":"李银河：\"爱情的秘诀就是高估对方。\"——这句话反过来读更有意思：大部分失败的婚姻，是因为一开始就高估了，后来回到了真实估值。","id":"n208","pool":"note","poolLabel":"纸条"},{"m":"💀","tp":"金句","txt":"李银河：\"'保护'这个词听起来很温柔。但如果你仔细想想，保护意味着你把一个人放在一个围栏里。围栏是温室还是监狱，取决于里面那个人想不想出来。\"","id":"n209","pool":"note","poolLabel":"纸条"},{"m":"🤔","tp":"金句","txt":"李银河：\"女人有权利决定自己生不生育，生几个孩子，用什么方式生。\"——这句话在中国说出来需要的勇气，比在大多数国家都大。她说了二十多年。","id":"n210","pool":"note","poolLabel":"纸条"},{"m":"😂","tp":"金句","txt":"李银河说自己其实是个很内向害羞的人，之所以给大家一副\"斗士\"的形象，是因为\"我花了很多时间研究这些问题，在数据、事实和理论上比别人知道得多，我就有信心出来讲话——自信克服了羞涩。\"内向的人不是不能战斗，是需要足够多的弹药。","id":"n211","pool":"note","poolLabel":"纸条"}]};

// ============= 数据准备 =============
const POOLS = DATA.pools;
const NOTES = DATA.notes;
const POOL_KEYS = Object.keys(POOLS);
const ALL_CARDS = POOL_KEYS.flatMap(k => POOLS[k].cards);
const PC = {

};

// ============= 工具函数 =============
function srand(s) {
  return () => {
    s = s * 16807 % 2147483647;
    return (s - 1) / 2147483646;
  };
}
const START = new Date(2026, 4, 25);
function dayN() {
  return Math.max(0, Math.floor((new Date() - START) / 864e5));
}
function fmtDate() {
  return new Date().toLocaleDateString("zh-CN", {
    year: "numeric",
    month: "long",
    day: "numeric",
    weekday: "long"
  });
}
function daily(d) {
  const r = srand(d * 31 + 7);
  // 从所有人物卡里抽4张（不重复pool优先，但不强制）
  const shuffled = [...ALL_CARDS].sort(() => r() - 0.5);
