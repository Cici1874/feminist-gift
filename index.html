const DATA = {"F": [{"id": "f1", "name": "Mary Wollstonecraft", "cn": "玛丽·沃斯通克拉夫特", "era": "1759-1797", "reg": "英国", "sch": "自由主义女性主义", "q": "I do not wish women to have power over men, but over themselves.", "core": "女性受教育权是解放的基础。她在1792年写下《女权辩护》，第一次系统论证：女性的所谓弱点不是天性，而是教育缺失的结果。", "ref": "《A Vindication of the Rights of Woman》", "lat": 52.0, "lng": -1.0}, {"id": "f2", "name": "Betty Friedan", "cn": "贝蒂·弗里丹", "era": "1921-2006", "reg": "美国", "sch": "自由主义女性主义", "q": "The problem that has no name.", "core": "1963年《女性的奥秘》揭示了一个没有名字的问题——战后美国中产白人女性被困在幸福家庭主妇的神话里，精神正在枯萎。", "ref": "《The Feminine Mystique》", "lat": 39.0, "lng": -98.0}, {"id": "f3", "name": "Martha Nussbaum", "cn": "玛莎·努斯鲍姆", "era": "1947-", "reg": "美国", "sch": "自由主义女性主义", "q": "To be a good human being is to have a kind of openness to the world.", "core": "能力方法论：衡量一个社会是否正义，不看GDP，看每个人——尤其是女性——能不能活出有尊严的生活。", "ref": "《Women and Human Development》", "lat": 39.0, "lng": -98.0}, {"id": "f4", "name": "Mary Astell", "cn": "玛丽·阿斯特尔", "era": "1666-1731", "reg": "英国", "sch": "自由主义女性主义", "q": "If all men are born free, how is it that all women are born slaves?", "core": "比沃斯通克拉夫特早了近一个世纪，她就在追问：如果男人生来自由，女人为什么生来就是奴隶？被称为第一位英国女性主义者。", "ref": "《A Serious Proposal to the Ladies》", "lat": 52.0, "lng": -1.0}, {"id": "f5", "name": "Kate Millett", "cn": "凯特·米利特", "era": "1934-2017", "reg": "美国", "sch": "激进女性主义", "q": "Many women do not recognize themselves as discriminated against.", "core": "《性政治》：性关系从来不是私人的，它是最核心的政治权力关系。父权制不在法律条文里——它在卧室里、在语言里、在文学里。", "ref": "《Sexual Politics》", "lat": 39.0, "lng": -98.0}, {"id": "f6", "name": "Catharine MacKinnon", "cn": "凯瑟琳·麦金农", "era": "1946-", "reg": "美国", "sch": "激进女性主义", "q": "Sexuality is to feminism what work is to Marxism.", "core": "她让性骚扰从一个女性默默忍受的日常变成了一个法律概念。1986年美国最高法院裁定性骚扰构成性别歧视。法律，是她的武器。", "ref": "《Sexual Harassment of Working Women》", "lat": 39.0, "lng": -98.0}, {"id": "f7", "name": "Adrienne Rich", "cn": "阿德里安·里奇", "era": "1929-2012", "reg": "美国", "sch": "激进女性主义", "q": "When a woman tells the truth she is creating the possibility for more truth around her.", "core": "强制异性恋——异性恋不是自然选择，而是一套制度性的强制。她同时是诗人和理论家，用语言本身做反抗。", "ref": "《Compulsory Heterosexuality and Lesbian Existence》", "lat": 39.0, "lng": -98.0}, {"id": "f8", "name": "Silvia Federici", "cn": "西尔维娅·费德里奇", "era": "1942-", "reg": "意大利/美国", "sch": "社会主义女性主义", "q": "The body has been for women what the factory has been for male waged workers.", "core": "《卡利班与女巫》：资本主义不是从工厂开始的——它从猎杀女巫开始。家务劳动不被算作工作，恰恰是资本主义最成功的骗局。", "ref": "《Caliban and the Witch》", "lat": 42.0, "lng": 12.0}, {"id": "f9", "name": "Alexandra Kollontai", "cn": "亚历山德拉·柯伦泰", "era": "1872-1952", "reg": "俄国", "sch": "社会主义女性主义", "q": "The woman question is, at the same time, the question of labor.", "core": "苏维埃早期最激进的女性解放实践者：推动自由婚姻、公共育儿、女性经济独立。没有经济解放的女性解放是空谈。", "ref": "《The Social Basis of the Woman Question》", "lat": 56.0, "lng": 38.0}, {"id": "f10", "name": "Charlotte Perkins Gilman", "cn": "夏洛特·吉尔曼", "era": "1860-1935", "reg": "美国", "sch": "社会主义女性主义", "q": "There is no female mind. The brain is not an organ of sex.", "core": "她用小说《黄色壁纸》让全世界看到一个被关在家里的女人如何发疯。然后用理论著作论证：女性的经济依附是一切不平等的根源。", "ref": "《The Yellow Wallpaper》", "lat": 39.0, "lng": -98.0}, {"id": "f11", "name": "Simone de Beauvoir", "cn": "西蒙·德·波伏瓦", "era": "1908-1986", "reg": "法国", "sch": "存在主义女性主义", "q": "On ne naît pas femme, on le devient.", "core": "《第二性》：整个人类文明把女性建构为他者。女性的处境不是生物决定的——是历史、经济、文化合力制造的。女人不是天生的，而是后天成为的。", "ref": "《第二性》", "lat": 47.0, "lng": 2.0}, {"id": "f12", "name": "Sojourner Truth", "cn": "索杰纳·特鲁斯", "era": "1797-1883", "reg": "美国", "sch": "交叉性女性主义", "q": "Ain't I a Woman?", "core": "1851年，一位曾被奴役的黑人女性站在讲台上反问：难道我不是一个女人？当白人女性主义者谈论女性的脆弱时，她已经耕田、挨鞭、失去孩子。", "ref": "1851年俄亥俄州女权大会演讲", "lat": 39.0, "lng": -98.0}, {"id": "f13", "name": "bell hooks", "cn": "贝尔·胡克斯", "era": "1952-2021", "reg": "美国", "sch": "交叉性女性主义", "q": "Feminism is for everybody.", "core": "她用小写字母写自己的名字——因为重要的是思想，不是个人。女性主义不只是白人中产女性的事。如果你的女性主义不包括穷人、黑人、边缘人，它就什么都不是。", "ref": "《Feminism is for Everybody》", "lat": 39.0, "lng": -98.0}, {"id": "f14", "name": "Kimberlé Crenshaw", "cn": "金伯利·克伦肖", "era": "1959-", "reg": "美国", "sch": "交叉性女性主义", "q": "Various forms of discrimination come together in ways we rarely see.", "core": "她创造了交叉性（intersectionality）这个概念：一个黑人女性面临的不是种族歧视加性别歧视的简单加法，而是一种独特的、交叉的压迫经验。", "ref": "Demarginalizing the Intersection of Race and Sex (1989)", "lat": 39.0, "lng": -98.0}, {"id": "f15", "name": "Audre Lorde", "cn": "奥德丽·洛德", "era": "1934-1992", "reg": "美国", "sch": "交叉性女性主义", "q": "The master's tools will never dismantle the master's house.", "core": "她是黑人、女同性恋、母亲、诗人、战士——她拒绝只选一个身份。沉默不会保护你。差异不是用来分裂的，而是用来创造新可能的。", "ref": "《Sister Outsider》", "lat": 39.0, "lng": -98.0}, {"id": "f16", "name": "Angela Davis", "cn": "安杰拉·戴维斯", "era": "1944-", "reg": "美国", "sch": "交叉性女性主义", "q": "I am no longer accepting the things I cannot change.", "core": "《女性、种族与阶级》——种族主义和性别歧视是同一棵树的不同枝干。你不能砍了一根假装另一根不存在。", "ref": "《Women, Race & Class》", "lat": 39.0, "lng": -98.0}, {"id": "f17", "name": "Gayatri Spivak", "cn": "斯皮瓦克", "era": "1942-", "reg": "印度/美国", "sch": "后殖民女性主义", "q": "Can the subaltern speak?", "core": "她追问的不是底层人有没有声音——而是这个世界的知识结构允不允许他们被听见。第三世界女性被双重消音。", "ref": "Can the Subaltern Speak? (1988)", "lat": 22.0, "lng": 78.0}, {"id": "f18", "name": "Chimamanda Ngozi Adichie", "cn": "奇玛曼达·阿迪契", "era": "1977-", "reg": "尼日利亚", "sch": "后殖民女性主义", "q": "We should all be feminists.", "core": "她的TED演讲被碧昂丝采样，让女性主义从学术象牙塔走进了流行文化。如果你相信男女平等，你就已经是女性主义者了。", "ref": "《We Should All Be Feminists》", "lat": 9.0, "lng": 8.0}, {"id": "f19", "name": "Nawal El Saadawi", "cn": "纳瓦勒·萨达维", "era": "1931-2021", "reg": "埃及", "sch": "后殖民女性主义", "q": "The oppression of women is not only a question of religion.", "core": "她是医生，亲眼见过女性割礼的伤口。她把手术刀换成了笔。因此入狱、流亡、被列入暗杀名单——她从未停笔。", "ref": "《The Hidden Face of Eve》", "lat": 27.0, "lng": 31.0}, {"id": "f20", "name": "Judith Butler", "cn": "朱迪斯·巴特勒", "era": "1956-", "reg": "美国", "sch": "后现代女性主义", "q": "There is no gender identity behind the expressions of gender.", "core": "性别是表演（performativity）——你不是拥有一个性别，而是每天通过重复的行为做出一个性别。这个观点炸开了整个性别研究领域。", "ref": "《Gender Trouble》", "lat": 39.0, "lng": -98.0}, {"id": "f21", "name": "Hélène Cixous", "cn": "埃莱娜·西苏", "era": "1937-2025", "reg": "法国", "sch": "后现代女性主义", "q": "Write yourself. Your body must be heard.", "core": "阴性书写——女性需要用自己的身体、自己的节奏、自己的语言来写作。找到自己的声音，就是找到自由。", "ref": "《The Laugh of the Medusa》", "lat": 47.0, "lng": 2.0}, {"id": "f22", "name": "Donna Haraway", "cn": "唐娜·哈拉维", "era": "1944-", "reg": "美国", "sch": "后现代女性主义", "q": "I would rather be a cyborg than a goddess.", "core": "《赛博格宣言》——我宁愿做一个赛博格，也不做女神。打破人与动物、人与机器的二元对立。", "ref": "A Cyborg Manifesto (1985)", "lat": 39.0, "lng": -98.0}, {"id": "f23", "name": "Carol Gilligan", "cn": "卡罗尔·吉利根", "era": "1936-", "reg": "美国", "sch": "关怀伦理女性主义", "q": "In a different voice.", "core": "《不同的声音》：心理学一直用男性的标准衡量道德发展。女性用的是另一种语言：关系、责任、关怀。", "ref": "《In a Different Voice》", "lat": 39.0, "lng": -98.0}, {"id": "f24", "name": "Vandana Shiva", "cn": "范达娜·席瓦", "era": "1952-", "reg": "印度", "sch": "生态女性主义", "q": "It is good to remember that the planet is carrying you.", "core": "全球化农业和种子专利是对自然与女性的双重殖民。跨国公司控制种子，就是控制食物，就是控制生命。", "ref": "《Staying Alive》", "lat": 22.0, "lng": 78.0}, {"id": "f25", "name": "秋瑾", "cn": "秋瑾", "era": "1875-1907", "reg": "中国", "sch": "东亚女性主义", "q": "秋风秋雨愁煞人。", "core": "她是革命者，也是女性解放的先驱。留学日本，办报纸，练武术，穿男装。1907年就义，年仅32岁。女性解放与民族解放不可分割。", "ref": "《秋瑾集》", "lat": 35.0, "lng": 105.0}, {"id": "f26", "name": "何殷震", "cn": "何殷震", "era": "1884-1920?", "reg": "中国", "sch": "东亚女性主义", "q": "女子问题即劳动问题。", "core": "她比西方女性主义者更早将性别压迫与阶级、资本主义联系在一起。在晚清，她已经是一个真正的唯物主义女性主义者。", "ref": "《The Birth of Chinese Feminism》", "lat": 35.0, "lng": 105.0}, {"id": "f27", "name": "丁玲", "cn": "丁玲", "era": "1904-1986", "reg": "中国", "sch": "东亚女性主义", "q": "我总觉得我是一个人。", "core": "《莎菲女士的日记》——中国文学中第一次直面女性的欲望、孤独和主体性。", "ref": "《莎菲女士的日记》", "lat": 35.0, "lng": 105.0}, {"id": "f28", "name": "上野千鹤子", "cn": "上野千鹤子", "era": "1948-", "reg": "日本", "sch": "东亚女性主义", "q": "女性主义绝不是弱者试图变为强者的思想，而是追求弱者也能得到尊重的思想。", "core": "《厌女》《父权制与资本主义》——她在东亚语境下系统解构父权制，把无偿家务劳动这个隐形剥削拉到阳光下。", "ref": "《厌女》《始于极限》", "lat": 36.0, "lng": 138.0}, {"id": "f29", "name": "赵南柱", "cn": "赵南柱", "era": "1978-", "reg": "韩国", "sch": "东亚女性主义", "q": "金智英没有什么特别的，她就是每一个韩国女人。", "core": "《82年生的金智英》——一个普通韩国女性从出生到成为母亲，每一步都被性别歧视塑造。这本书卖了一百万册。", "ref": "《82年生的金智英》", "lat": 36.5, "lng": 127.5}, {"id": "f30", "name": "Emmeline Pankhurst", "cn": "潘克赫斯特", "era": "1858-1928", "reg": "英国", "sch": "行动派", "q": "Deeds, not words.", "core": "英国妇女参政权运动领袖。当请愿和游行都不管用时，她选择了打碎橱窗、纵火、绝食。我们不是来请求权利的，我们是来要求权利的。", "ref": "《My Own Story》", "lat": 52.0, "lng": -1.0}, {"id": "f31", "name": "Malala Yousafzai", "cn": "马拉拉", "era": "1997-", "reg": "巴基斯坦", "sch": "行动派", "q": "One child, one teacher, one book, one pen can change the world.", "core": "15岁被塔利班枪击头部——因为她坚持上学。她活了下来，成为最年轻的诺贝尔和平奖得主。", "ref": "《I Am Malala》", "lat": 30.0, "lng": 69.0}, {"id": "f32", "name": "Ruth Bader Ginsburg", "cn": "RBG 金斯伯格", "era": "1933-2020", "reg": "美国", "sch": "行动派", "q": "I dissent.", "core": "不是通过革命，而是通过法律——一个案子一个案子地推动性别平等。精妙如棋局。", "ref": "RBG最高法院异议意见书", "lat": 39.0, "lng": -98.0}, {"id": "f33", "name": "Gloria Steinem", "cn": "格洛丽亚·斯泰纳姆", "era": "1934-", "reg": "美国", "sch": "行动派", "q": "A woman without a man is like a fish without a bicycle.", "core": "《Ms.》杂志创办者。她把女性主义从学术圈带进千家万户。", "ref": "《My Life on the Road》", "lat": 39.0, "lng": -98.0}, {"id": "f34", "name": "Christine de Pizan", "cn": "克里斯蒂娜·德·皮桑", "era": "1364-1430", "reg": "法国", "sch": "早期先驱", "q": "If it were customary to send little girls to school, they would learn just as fully.", "core": "15世纪，她写了《妇女之城》——欧洲历史上第一次有女性系统地反驳厌女传统。在印刷术发明之前。", "ref": "《The Book of the City of Ladies》", "lat": 47.0, "lng": 2.0}, {"id": "f35", "name": "Olympe de Gouges", "cn": "奥兰普·德·古日", "era": "1748-1793", "reg": "法国", "sch": "早期先驱", "q": "Woman is born free and remains equal to man in rights.", "core": "法国大革命高喊自由平等博爱——但只给男人。她写了《女性与女公民权利宣言》反问：凭什么？两年后被送上断头台。", "ref": "《Declaration of the Rights of function srand(s){return()=>{s=(s*16807)%2147483647;return(s-1)/2147483646}}
const START=new Date(2026,4,25);
function dayN(){return Math.max(0,Math.floor((new Date()-START)/864e5))}
function fmtDate(){return new Date().toLocaleDateString("zh-CN",{year:"numeric",month:"long",day:"numeric",weekday:"long"})}
function daily(d){
  const r=srand(d*31+7),si=d%SCHOOLS.length;
  const p1=F.filter(c=>c.sch===SCHOOLS[si]),p2=F.filter(c=>c.sch===SCHOOLS[(si+1)%SCHOOLS.length]);
  const f1=p1[Math.floor(r()*p1.length)],f2=p2[Math.floor(r()*p2.length)];
  let i1=Math.floor(r()*L.length),i2=Math.floor(r()*L.length);
  while(i2===i1)i2=(i2+1)%L.length;
  return[{...f1,cType:"t"},{...L[i1],cType:"l"},{...f2,cType:"t"},{...L[i2],cType:"l"},{...N[Math.floor(r()*N.length)],cType:"n"}];
}
function proj(lat,lng,W,H){
  const x=(lng+180)/360*W;
  const r=lat*Math.PI/180;
  const y=(H/2)-(W*Math.log(Math.tan(Math.PI/4+r/2))/(2*Math.PI));
  return[x,Math.max(15,Math.min(H-15,y))];
}

          <p style={{marginBottom:16}}>每天为您准备了 <strong>5 张纸条</strong>：</p>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}><span style={{width:28,height:28,borderRadius:8,background:"#8B6914",color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,flexShrink:0}}>2</span><span><strong>思想卡</strong> —— 古今中外的女性主义思想家，按流派轮换</span></div>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}><span style={{width:28,height:28,borderRadius:8,background:"#5a7a5a",color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,flexShrink:0}}>2</span><span><strong>文学卡</strong> —— 女性诗人、作家、哲学家的作品与生平</span></div>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16}}><span style={{width:28,height:28,borderRadius:8,background:"#c4956a",color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,flexShrink:0}}>1</span><span><strong>今日纸条</strong> —— 女性主义冷知识、金句，或者一个小笑话</span></div>
          <div style={{borderTop:"1px solid rgba(180,160,140,.2)",paddingTop:16,marginTop:8}}>
            <p style={{marginBottom:8}}>📚 <strong>翻阅</strong> —— 按流派浏览，或在世界地图上探索</p>
            <p>📦 <strong>纸条盒</strong> —— 点 ♡ 收藏喜欢的内容，随时回看</p>
          </div>
        </div>
        <div style={{textAlign:"center",marginTop:24}}><button onClick={()=>setPage("main")} style={{background:"linear-gradient(135deg,#c4956a,#b8866a)",color:"#fff",border:"none",borderRadius:28,padding:"12px 40px",fontSize:14,letterSpacing:2,cursor:"pointer",boxShadow:"0 4px 20px rgba(180,130,90,.35)",fontFamily:"inherit"}}>开始</button></div>
      </div><style>{css}</style>
    </div>
  );

  const Name=({card})=>{const cn=card.cn||card.name,en=card.name,both=cn!==en;return <><span style={{fontSize:17,fontWeight:500,color:"#3a2a1a",fontFamily:ff}}>{cn}</span>{both&&<span style={{fontSize:12,color:"#a09080",marginLeft:6}}>{en}</span>}</>;};

  const CP=({card,idx})=>(
    <div onClick={()=>setOpen(card)} style={{background:card.cType==="n"?"linear-gradient(135deg,#fff9f0,#fef5e7)":"rgba(255,255,255,.7)",borderRadius:16,padding:20,cursor:"pointer",backdropFilter:"blur(10px)",border:card.cType==="n"?"1px dashed #d4b896":"1px solid rgba(180,160,140,.15)",boxShadow:"0 2px 12px rgba(100,80,60,.06)",animation:`fu .5s ease ${idx*.1}s both`,position:"relative"}}>
      <div style={{fontSize:10,color:"#b0a090",letterSpacing:2,marginBottom:10}}>{labels[idx]}</div>
      {card.cType==="t"&&<><div style={{display:"flex",alignItems:"baseline",gap:8,marginBottom:6,flexWrap:"wrap"}}><Name card={card}/><span style={{fontSize:10,color:"#fff",background:SC[card.sch]||"#888",padding:"2px 8px",borderRadius:8}}>{card.sch}</span></div><p style={{fontSize:12,color:"#9a8a7a",marginBottom:10}}>{card.era} · {card.reg}</p><p style={{fontSize:13,color:"#6a5a4a",fontStyle:"italic",lineHeight:1.7,borderLeft:"2px solid #c4956a",paddingLeft:12}}>{card.q}</p></>}
      {card.cType==="l"&&<><div style={{display:"flex",alignItems:"baseline",gap:8,marginBottom:6,flexWrap:"wrap"}}><Name card={card}/><span style={{fontSize:10,color:"#fff",background:"#5a7a5a",padding:"2px 8px",borderRadius:8}}>{card.tp}</span></div><p style={{fontSize:12,color:"#9a8a7a",marginBottom:10}}>{card.era} · {card.reg} · {card.work}</p><p style={{fontSize:13,color:"#6a5a4a",fontStyle:"italic",lineHeight:1.7,borderLeft:"2px solid #5a7a5a",paddingLeft:12}}>{card.q}</p></>}
      {card.cType==="n"&&<div style={{textAlign:"center",padding:"8px 0"}}><div style={{fontSize:28,marginBottom:12}}>{card.m}</div><p style={{fontSize:14,color:"#5a4a3a",lineHeight:1.9,textAlign:"left"}}>{card.txt&&card.txt.length>60?card.txt.slice(0,60)+"……":card.txt}</p><p style={{fontSize:11,color:"#c0b0a0",marginTop:12,letterSpacing:3}}>点击展开</p></div>}
      {iF(card.id)&&<div style={{position:"absolute",top:12,right:14,fontSize:14,color:"#c4956a"}}>{"♥"}</div>}
    </div>
  );

  const Modal=()=>{if(!open)return null;const c=open;
    return(<div style={{position:"fixed",inset:0,background:"rgba(40,30,20,.6)",backdropFilter:"blur(8px)",zIndex:100,display:"flex",alignItems:"center",justifyContent:"center",padding:16}} onClick={()=>setOpen(null)}>
      <div style={{background:"linear-gradient(170deg,#faf8f4,#f5f0e8)",borderRadius:20,padding:"32px 24px",maxWidth:420,width:"100%",maxHeight:"85vh",overflow:"auto",boxShadow:"0 20px 60px rgba(40,30,20,.3)",position:"relative"}} onClick={e=>e.stopPropagation()}>
        <button onClick={()=>setOpen(null)} style={{position:"absolute",top:16,right:16,background:"none",border:"none",fontSize:20,color:"#9a8a7a",cursor:"pointer"}}>✕</button>
        <button onClick={()=>tF(c.id)} style={{position:"absolute",top:16,left:16,background:"none",border:"none",fontSize:22,cursor:"pointer",color:iF(c.id)?"#c4956a":"#ccc"}}>{iF(c.id)?"♥":"♡"}</button>
        <div style={{paddingTop:24}}>
          {c.cType==="t"&&<><div style={{display:"inline-block",background:SC[c.sch]||"#666",color:"#fff",fontSize:11,padding:"3px 10px",borderRadius:12,marginBottom:16,letterSpacing:1}}>{c.sch}</div><h2 style={{fontSize:20,color:"#3a2a1a",fontWeight:500,marginBottom:4,fontFamily:ff}}>{c.cn}</h2><p style={{fontSize:13,color:"#9a8a7a",marginBottom:16}}>{c.cn!==c.name?c.name+" · ":""}{c.era} · {c.reg}</p><blockquote style={{borderLeft:"3px solid #c4956a",paddingLeft:16,margin:"0 0 20px",fontStyle:"italic",fontSize:14,color:"#6a5a4a",lineHeight:1.8}}>{c.q}</blockquote><p style={{fontSize:14,color:"#4a3a2a",lineHeight:2,marginBottom:20}}>{c.core}</p><p style={{fontSize:12,color:"#a09080",lineHeight:1.8}}>📖 延伸阅读：{c.ref}</p></>}
          {c.cType==="l"&&<><div style={{display:"inline-block",background:"#5a7a5a",color:"#fff",fontSize:11,padding:"3px 10px",borderRadius:12,marginBottom:16,letterSpacing:1}}>{c.tp}</div><h2 style={{fontSize:20,color:"#3a2a1a",fontWeight:500,marginBottom:4,fontFamily:ff}}>{c.cn}</h2><p style={{fontSize:13,color:"#9a8a7a",marginBottom:6}}>{c.cn!==c.name?c.name+" · ":""}{c.era} · {c.reg}</p><p style={{fontSize:13,color:"#7a6a5a",marginBottom:16}}>代表作：{c.work}</p><blockquote style={{borderLeft:"3px solid #5a7a5a",paddingLeft:16,margin:"0 0 20px",fontStyle:"italic",fontSize:14,color:"#6a5a4a",lineHeight:1.8}}>{c.q}</blockquote><p style={{fontSize:14,color:"#4a3a2a",lineHeight:2}}>{c.core}</p></>}
          {c.cType==="n"&&<div style={{textAlign:"center",paddingTop:8}}><div style={{fontSize:40,marginBottom:20}}>{c.m}</div><p style={{fontSize:15,color:"#4a3a2a",lineHeight:2,textAlign:"left",padding:"0 8px"}}>{c.txt}</p><div style={{marginTop:24,fontSize:11,color:"#b0a090",letterSpacing:2}}>—— 小时候的纸条</div></div>}
        </div>
      </div>
    </div>);
  };

  const MapView=()=>{
    const W=800,H=440;
    const groups=useMemo(()=>{
      const all=[...F.map(c=>({...c,cType:"t"})),...L.map(c=>({...c,cType:"l"}))];
      const g={};
      all.forEach(c=>{const k=`${c.lat},${c.lng}`;if(!g[k])g[k]={lat:c.lat,lng:c.lng,reg:c.reg,cards:[]};g[k].cards.push(c);});
      return Object.values(g);
    },[]);
    return(<div>
      <div style={{background:"rgba(255,255,255,.5)",borderRadius:16,padding:8,overflow:"auto",border:"1px solid rgba(180,160,140,.15)"}}>
        <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height:"auto",display:"block"}}>
          <rect x="0" y="0" width={W} height={H} fill="#f0ebe3" rx="8"/>
          {/* Ocean texture */}
          <rect x="0" y="0" width={W} height={H} fill="#e8e0d5" rx="8" opacity=".3"/>
          {/* Continent outlines */}
          {Object.entries(MAP_PATHS).map(([name,d])=>(
            <path key={name} d={d} fill="#ddd4c6" stroke="#c8bfb0" strokeWidth="1" opacity=".8"/>
          ))}
          {/* Region dots */}
          {groups.map((g,i)=>{
            const[x,y]=proj(g.lat,g.lng,W,H);
            const tC=g.cards.filter(c=>c.cType==="t").length;
            const lC=g.cards.filter(c=>c.cType==="l").length;
            const total=g.cards.length;
            const r=Math.min(20,9+total*1.5);
            const sel=mapSel===i;
            const hasBoth=tC>0&&lC>0;
            const mainColor=tC>=lC?"#c4956a":"#5a7a5a";
            return(<g key={i} onClick={e=>{e.stopPropagation();setMapSel(sel?null:i)}} style={{cursor:"pointer"}}>
              {sel&&<circle cx={x} cy={y} r={r+6} fill={mainColor} opacity=".15"/>}
              {hasBoth&&<circle cx={x} cy={y} r={r+3} fill="none" stroke={tC<lC?"#c4956a":"#5a7a5a"} strokeWidth="2" opacity=".5"/>}
              <circle cx={x} cy={y} r={r} fill={mainColor} opacity={sel?.95:.8} stroke={sel?"#3a2a1a":"#fff"} strokeWidth={sel?2:1}/>
              <text x={x} y={y+1} textAnchor="middle" dominantBaseline="middle" fill="#fff" fontSize={total>9?9:11} fontWeight="600">{total}</text>
              <text x={x} y={y+r+13} textAnchor="middle" fill="#7a6a5a" fontSize="9" fontFamily="'Noto Serif SC',serif">{g.reg.replace("/美国","")}</text>
            </g>);
          })}
          {/* Legend */}
          <g transform={`translate(15,${H-20})`}>
            <circle cx="0" cy="0" r="5" fill="#c4956a"/><text x="10" y="3" fill="#8a7a6a" fontSize="9" fontFamily="'Noto Serif SC',serif">思想家</text>
            <circle cx="65" cy="0" r="5" fill="#5a7a5a"/><text x="75" y="3" fill="#8a7a6a" fontSize="9" fontFamily="'Noto Serif SC',serif">文学家</text>
            <circle cx="130" cy="0" r="5" fill="#c4956a"/><circle cx="130" cy="0" r="8" fill="none" stroke="#5a7a5a" strokeWidth="1.5"/><text x="142" y="3" fill="#8a7a6a" fontSize="9" fontFamily="'Noto Serif SC',serif">两者皆有</text>
          </g>
        </svg>
      </div>
      {mapSel!==null&&groups[mapSel]&&(<div style={{marginTop:16,animation:"fu .3s ease"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <h3 style={{fontSize:15,color:"#4a3728",fontWeight:500,fontFamily:ff}}>{groups[mapSel].reg}</h3>
          <button onClick={()=>setMapSel(null)} style={{background:"none",border:"none",fontSize:12,color:"#b0a090",cursor:"pointer"}}>收起</button>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {groups[mapSel].cards.map(c=>(<div key={c.id} onClick={()=>setOpen(c)} style={{background:"rgba(255,255,255,.6)",borderRadius:12,padding:"12px 16px",cursor:"pointer",borderLeft:`3px solid ${c.cType==="t"?(SC[c.sch]||"#c4956a"):"#5a7a5a"}`}}>
            <div style={{display:"flex",alignItems:"baseline",gap:6,flexWrap:"wrap"}}><Name card={c}/><span style={{fontSize:9,color:"#fff",background:c.cType==="t"?(SC[c.sch]||"#888"):"#5a7a5a",padding:"1px 6px",borderRadius:6}}>{c.cType==="t"?"思想":"文学"}</span></div>
            <p style={{fontSize:11,color:"#9a8a7a",marginTop:3}}>{c.era}</p>
          </div>))}
        </div>
      </div>)}
    </div>);
  };

  const Browse=()=>{
    const all=bTp==="t"?F:bTp==="l"?L:null;
    let fil=all;
    if(bTp==="t"&&bSch)fil=all.filter(c=>c.sch===bSch);
    return(<div>
      <div style={{display:"flex",gap:6,marginBottom:16}}>
        {[["t","思想家"],["l","文学家"],["m","地图"]].map(([k,lb])=>(<button key={k} onClick={()=>{setBTp(k);setBSch(null);setMapSel(null)}} style={{flex:1,padding:"10px 0",borderRadius:12,border:"none",fontSize:14,fontFamily:ff,letterSpacing:2,cursor:"pointer",background:bTp===k?"linear-gradient(135deg,#c4956a,#b8866a)":"rgba(255,255,255,.5)",color:bTp===k?"#fff":"#8a7a6a"}}>{lb}</button>))}
      </div>
      {bTp==="m"&&<MapView/>}
      {bTp!=="m"&&<>
        {bTp==="t"&&<div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:20}}>
          <button onClick={()=>setBSch(null)} style={{padding:"5px 12px",borderRadius:16,border:"none",fontSize:11,cursor:"pointer",background:!bSch?"#4a3a2a":"rgba(255,255,255,.6)",color:!bSch?"#fff":"#8a7a6a"}}>全部</button>
          {SCHOOLS.map(s=><button key={s} onClick={()=>setBSch(s)} style={{padding:"5px 12px",borderRadius:16,border:"none",fontSize:11,cursor:"pointer",background:bSch===s?(SC[s]||"#666"):"rgba(255,255,255,.6)",color:bSch===s?"#fff":"#8a7a6a"}}>{s}</button>)}
        </div>}
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          {fil&&fil.map(c=>(<div key={c.id} onClick={()=>setOpen({...c,cType:bTp==="t"?"t":"l"})} style={{background:"rgba(255,255,255,.6)",borderRadius:14,padding:"16px 18px",cursor:"pointer",borderLeft:`3px solid ${bTp==="t"?(SC[c.sch]||"#888"):"#5a7a5a"}`}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><div style={{display:"flex",alignItems:"baseline",gap:6,flexWrap:"wrap"}}><Name card={c}/></div>{iF(c.id)&&<span style={{color:"#c4956a",fontSize:14}}>♥</span>}</div>
            <p style={{fontSize:12,color:"#9a8a7a",marginTop:4}}>{c.era} · {c.reg}{bTp==="t"?` · ${c.sch}`:` · ${c.tp}`}</p>
          </div>))}
        </div>
      </>}
    </div>);
  };

  const Favs=()=>{
    const all=[...F.map(c=>({...c,cType:"t"})),...L.map(c=>({...c,cType:"l"})),...N.map(c=>({...c,cType:"n"}))];
    const fav=all.filter(c=>favs[c.id]).sort((a,b)=>new Date(favs[b.id])-new Date(favs[a.id]));
    if(!fav.length)return(<div style={{textAlign:"center",padding:"60px 20px",color:"#b0a090"}}><div style={{fontSize:48,marginBottom:16}}>📦</div><p style={{fontSize:14,lineHeight:1.8}}>纸条盒还是空的</p><p style={{fontSize:13,marginTop:8}}>翻开卡片，点 ♡ 收藏喜欢的内容</p></div>);
    return(<div style={{display:"flex",flexDirection:"column",gap:12}}>
      <p style={{fontSize:12,color:"#b0a090",letterSpacing:2,marginBottom:4}}>已收藏 {fav.length} 张纸条</p>
      {fav.map((c,i)=>(<div key={c.id}><div style={{fontSize:10,color:"#c0b0a0",marginBottom:4,paddingLeft:4}}>收藏于 {new Date(favs[c.id]).toLocaleDateString("zh-CN",{month:"long",day:"numeric"})}</div><CP card={c} idx={Math.min(i,4)}/></div>))}
    </div>);
  };

  return(<div style={{minHeight:"100vh",background:bg,fontFamily:ff,paddingBottom:80}}>
    <div style={{padding:"24px 20px 16px",textAlign:"center"}}>
      <h1 style={{fontSize:18,fontWeight:400,color:"#4a3728",letterSpacing:4,margin:0}}>{tab==="today"?"今日纸条":tab==="browse"?"自由翻阅":"纸条盒"}</h1>
      {tab==="today"&&<><p style={{fontSize:12,color:"#b0a090",marginTop:6,letterSpacing:1}}>{fmtDate()}</p><p style={{fontSize:11,color:"#c4956a",marginTop:4}}>第 {dn+1} 天</p></>}
    </div>
    <div style={{padding:"0 16px"}}>
      {tab==="today"&&<div style={{display:"flex",flexDirection:"column",gap:14}}>{cards.map((c,i)=><CP key={c.id+i} card={c} idx={i}/>)}</div>}
      {tab==="browse"&&<Browse/>}
      {tab==="favorites"&&<Favs/>}
    </div>
    <div style={{position:"fixed",bottom:0,left:0,right:0,background:"rgba(250,246,240,.95)",backdropFilter:"blur(20px)",borderTop:"1px solid rgba(180,160,140,.15)",display:"flex",justifyContent:"space-around",padding:"10px 0",zIndex:50}}>
      {[["today","📜","今日"],["browse","📚","翻阅"],["favorites","📦","纸条盒"]].map(([k,ic,lb])=>(<button key={k} onClick={()=>setTab(k)} style={{background:"none",border:"none",display:"flex",flexDirection:"column",alignItems:"center",gap:2,cursor:"pointer",padding:"4px 16px",opacity:tab===k?1:.45}}><span style={{fontSize:20}}>{ic}</span><span style={{fontSize:10,color:"#5a4a3a",letterSpacing:1,fontFamily:ff}}>{lb}</span></button>))}
    </div>
    <Modal/><style>{css}</style>
  </div>);
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
