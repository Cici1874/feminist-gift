<script>
const DATA = {"pools":{"feminist":{"label":"思想家","cards":[{"id":"f1","pool":"feminist","poolLabel":"思想家","name":"Mary Wollstonecraft","cn":"玛丽·沃斯通克拉夫特","era":"1759-1797","reg":"英国","sch":"自由主义女性主义","q":"I do not wish women to have power over men, but over themselves.","body":"女性受教育权是解放的基础。她在1792年写下《女权辩护》，第一次系统论证：女性的所谓弱点不是天性，而是教育缺失的结果。","ref":"《A Vindication of the Rights of Woman》","lat":52.0,"lng":-1.0},{"id":"f2","pool":"feminist","poolLabel":"思想家","name":"Betty Friedan","cn":"贝蒂·弗里丹","era":"1921-2006","reg":"美国","sch":"自由主义女性主义","q":"The problem that has no name.","body":"1963年《女性的奥秘》揭示了一个没有名字的问题——战后美国中产白人女性被困在幸福家庭主妇的神话里，精神正在枯萎。","ref":"《The Feminine Mystique》","lat":39.0,"lng":-98.0},{"id":"f3","pool":"feminist","poolLabel":"思想家","name":"Martha Nussbaum","cn":"玛莎·努斯鲍姆","era":"1947-","reg":"美国","sch":"自由主义女性主义","q":"To be a good human being is to have a kind of openness to the world.","body":"能力方法论：衡量一个社会是否正义，不看GDP，看每个人——尤其是女性——能不能活出有尊严的生活。","ref":"《Women and Human Development》","lat":39.0,"lng":-98.0},{"id":"f4","pool":"feminist","poolLabel":"思想家","name":"Mary Astell","cn":"玛丽·阿斯特尔","era":"1666-1731","reg":"英国","sch":"自由主义女性主义","q":"If all men are born free, how is it that all women are born slaves?","body":"比沃斯通克拉夫特早了近一个世纪，她就在追问：如果男人生来自由，女人为什么生来就是奴隶？被称为第一位英国女性主义者。","ref":"《A Serious Proposal to the Ladies》","lat":52.0,"lng":-1.0},{"id":"f5","pool":"feminist","poolLabel":"思想家","name":"Kate Millett","cn":"凯特·米利特","era":"1934-2017","reg":"美国","sch":"激进女性主义","q":"Many women do not recognize themselves as discriminated against.","body":"《性政治》：性关系从来不是私人的，它是最核心的政治权力关系。父权制不在法律条文里——它在卧室里、在语言里、在文学里。","ref":"《Sexual Politics》","lat":39.0,"lng":-98.0},{"id":"f6","pool":"feminist","poolLabel":"思想家","name":"Catharine MacKinnon","cn":"凯瑟琳·麦金农","era":"1946-","reg":"美国","sch":"激进女性主义","q":"Sexuality is to feminism what work is to Marxism.","body":"她让性骚扰从一个女性默默忍受的日常变成了一个法律概念。1986年美国最高法院裁定性骚扰构成性别歧视。法律，是她的武器。","ref":"《Sexual Harassment of Working Women》","lat":39.0,"lng":-98.0},{"id":"f7","pool":"feminist","poolLabel":"思想家","name":"Adrienne Rich","cn":"阿德里安·里奇","era":"1929-2012","reg":"美国","sch":"激进女性主义","q":"When a woman tells the truth she is creating the possibility for more truth around her.","body":"强制异性恋——异性恋不是自然选择，而是一套制度性的强制。她同时是诗人和理论家，用语言本身做反抗。","ref":"《Compulsory Heterosexuality and Lesbian Existence》","lat":39.0,"lng":-98.0},{"id":"f8","pool":"feminist","poolLabel":"思想家","name":"Silvia Federici","cn":"西尔维娅·费德里奇","era":"1942-","reg":"意大利/美国","sch":"社会主义女性主义","q":"The body has been for women what the factory has been for male waged workers.","body":"《卡利班与女巫》：资本主义不是从工厂开始的——它从猎杀女巫开始。家务劳动不被算作工作，恰恰是资本主义最成功的骗局。","ref":"《Caliban and the Witch》","lat":42.0,"lng":12.0},{"id":"f9","pool":"feminist","poolLabel":"思想家","name":"Alexandra Kollontai","cn":"亚历山德拉·柯伦泰","era":"1872-1952","reg":"俄国","sch":"社会主义女性主义","q":"The woman question is, at the same time, the question of labor.","body":"苏维埃早期最激进的女性解放实践者：推动自由婚姻、公共育儿、女性经济独立。没有经济解放的女性解放是空谈。","ref":"《The Social Basis of the Woman Question》","lat":56.0,"lng":38.0},{"id":"f10","pool":"feminist","poolLabel":"思想家","name":"Charlotte Perkins Gilman","cn":"夏洛特·吉尔曼","era":"1860-1935","reg":"美国","sch":"社会主义女性主义","q":"There is no female mind. The brain is not an organ of sex.","body":"她用小说《黄色壁纸》让全世界看到一个被关在家里的女人如何发疯。然后用理论著作论证：女性的经济依附是一切不平等的根源。","ref":"《The Yellow Wallpaper》","lat":39.0,"lng":-98.0},{"id":"f11","pool":"feminist","poolLabel":"思想家","name":"Simone de Beauvoir","cn":"西蒙·德·波伏瓦","era":"1908-1986","reg":"法国","sch":"存在主义女性主义","q":"On ne naît pas femme, on le devient.","body":"《第二性》：整个人类文明把女性建构为他者。女性的处境不是生物决定的——是历史、经济、文化合力制造的。女人不是天生的，而是后天成为的。","ref":"《第二性》","lat":47.0,"lng":2.0},{"id":"f12","pool":"feminist","poolLabel":"思想家","name":"Sojourner Truth","cn":"索杰纳·特鲁斯","era":"1797-1883","reg":"美国","sch":"交叉性女性主义","q":"Ain't I a Woman?","body":"1851年，一位曾被奴役的黑人女性站在讲台上反问：难道我不是一个女人？当白人女性主义者谈论女性的脆弱时，她已经耕田、挨鞭、失去孩子。","ref":"1851年俄亥俄州女权大会演讲","lat":39.0,"lng":-98.0},{"id":"f13","pool":"feminist","poolLabel":"思想家","name":"bell hooks","cn":"贝尔·胡克斯","era":"1952-2021","reg":"美国","sch":"交叉性女性主义","q":"Feminism is for everybody.","body":"她用小写字母写自己的名字——因为重要的是思想，不是个人。女性主义不只是白人中产女性的事。如果你的女性主义不包括穷人、黑人、边缘人，它就什么都不是。","ref":"《Feminism is for Everybody》","lat":39.0,"lng":-98.0},{"id":"f14","pool":"feminist","poolLabel":"思想家","name":"Kimberlé Crenshaw","cn":"金伯利·克伦肖","era":"1959-","reg":"美国","sch":"交叉性女性主义","q":"Various forms of discrimination come together in ways we rarely see.","body":"她创造了交叉性（intersectionality）这个概念：一个黑人女性面临的不是种族歧视加性别歧视的简单加法，而是一种独特的、交叉的压迫经验。","ref":"Demarginalizing the Intersection of Race and Sex (1989)","lat":39.0,"lng":-98.0},{"id":"f15","pool":"feminist","poolLabel":"思想家","name":"Audre Lorde","cn":"奥德丽·洛德","era":"1934-1992","reg":"美国","sch":"交叉性女性主义","q":"The master's tools will never dismantle the master's house.","body":"她是黑人、女同性恋、母亲、诗人、战士——她拒绝只选一个身份。沉默不会保护你。差异不是用来分裂的，而是用来创造新可能的。","ref":"《Sister Outsider》","lat":39.0,"lng":-98.0},{"id":"f16","pool":"feminist","poolLabel":"思想家","name":"Angela Davis","cn":"安杰拉·戴维斯","era":"1944-","reg":"美国","sch":"交叉性女性主义","q":"I am no longer accepting the things I cannot change.","body":"《女性、种族与阶级》——种族主义和性别歧视是同一棵树的不同枝干。你不能砍了一根假装另一根不存在。","ref":"《Women, Race & Class》","lat":39.0,"lng":-98.0},{"id":"f17","pool":"feminist","poolLabel":"思想家","name":"Gayatri Spivak","cn":"斯皮瓦克","era":"1942-","reg":"印度/美国","sch":"后殖民女性主义","q":"Can the subaltern speak?","body":"她追问的不是底层人有没有声音——而是这个世界的知识结构允不允许他们被听见。第三世界女性被双重消音。","ref":"Can the Subaltern Speak? (1988)","lat":22.0,"lng":78.0},{"id":"f18","pool":"feminist","poolLabel":"思想家","name":"Chimamanda Ngozi Adichie","cn":"奇玛曼达·阿迪契","era":"1977-","reg":"尼日利亚","sch":"后殖民女性主义","q":"We should all be feminists.","body":"她的TED演讲被碧昂丝采样，让女性主义从学术象牙塔走进了流行文化。如果你相信男女平等，你就已经是女性主义者了。","ref":"《We Should All Be Feminists》","lat":9.0,"lng":8.0},{"id":"f19","pool":"feminist","poolLabel":"思想家","name":"Nawal El Saadawi","cn":"纳瓦勒·萨达维","era":"1931-2021","reg":"埃及","sch":"后殖民女性主义","q":"The oppression of women is not only a question of religion.","body":"她是医生，亲眼见过女性割礼的伤口。她把手术刀换成了笔。因此入狱、流亡、被列入暗杀名单——她从未停笔。","ref":"《The Hidden Face of Eve》","lat":27.0,"lng":31.0},{"id":"f20","pool":"feminist","poolLabel":"思想家","name":"Judith Butler","cn":"朱迪斯·巴特勒","era":"1956-","reg":"美国","sch":"后现代女性主义","q":"There is no gender identity behind the expressions of gender.","body":"性别是表演（performativity）——你不是拥有一个性别，而是每天通过重复的行为做出一个性别。这个观点炸开了整个性别研究领域。","ref":"《Gender Trouble》","lat":39.0,"lng":-98.0},{"id":"f21","pool":"feminist","poolLabel":"思想家","name":"Hélène Cixous","cn":"埃莱娜·西苏","era":"1937-2025","reg":"法国","sch":"后现代女性主义","q":"Write yourself. Your body must be heard.","body":"阴性书写——女性需要用自己的身体、自己的节奏、自己的语言来写作。找到自己的声音，就是找到自由。","ref":"《The Laugh of the Medusa》","lat":47.0,"lng":2.0},{"id":"f22","pool":"feminist","poolLabel":"思想家","name":"Donna Haraway","cn":"唐娜·哈拉维","era":"1944-","reg":"美国","sch":"后现代女性主义","q":"I would rather be a cyborg than a goddess.","body":"《赛博格宣言》——我宁愿做一个赛博格，也不做女神。打破人与动物、人与机器的二元对立。","ref":"A Cyborg Manifesto (1985)","lat":39.0,"lng":-98.0},{"id":"f23","pool":"feminist","poolLabel":"思想家","name":"Carol Gilligan","cn":"卡罗尔·吉利根","era":"1936-","reg":"美国","sch":"关怀伦理女性主义","q":"In a different voice.","body":"《不同的声音》：心理学一直用男性的标准衡量道德发展。女性用的是另一种语言：关系、责任、关怀。","ref":"《In a Different Voice》","lat":39.0,"lng":-98.0},{"id":"f24","pool":"feminist","poolLabel":"思想家","name":"Vandana Shiva","cn":"范达娜·席瓦","era":"1952-","reg":"印度","sch":"生态女性主义","q":"It is good to remember that the planet is carrying you.","body":"全球化农业和种子专利是对自然与女性的双重殖民。跨国公司控制种子，就是控制食物，就是控制生命。","ref":"《Staying Alive》","lat":22.0,"lng":78.0},{"id":"f25","pool":"feminist","poolLabel":"思想家","name":"秋瑾","cn":"秋瑾","era":"1875-1907","reg":"中国","sch":"东亚女性主义","q":"秋风秋雨愁煞人。","body":"她是革命者，也是女性解放的先驱。留学日本，办报纸，练武术，穿男装。1907年就义，年仅32岁。女性解放与民族解放不可分割。","ref":"《秋瑾集》","lat":35.0,"lng":105.0},{"id":"f26","pool":"feminist","poolLabel":"思想家","name":"何殷震","cn":"何殷震","era":"1884-1920?","reg":"中国","sch":"东亚女性主义","q":"女子问题即劳动问题。","body":"她比西方女性主义者更早将性别压迫与阶级、资本主义联系在一起。在晚清，她已经是一个真正的唯物主义女性主义者。","ref":"《The Birth of Chinese Feminism》","lat":35.0,"lng":105.0},{"id":"f27","pool":"feminist","poolLabel":"思想家","name":"丁玲","cn":"丁玲","era":"1904-1986","reg":"中国","sch":"东亚女性主义","q":"我总觉得我是一个人。","body":"《莎菲女士的日记》——中国文学中第一次直面女性的欲望、孤独和主体性。","ref":"《莎菲女士的日记》","lat":35.0,"lng":105.0},{"id":"f28","pool":"feminist","poolLabel":"思想家","name":"上野千鹤子","cn":"上野千鹤子","era":"1948-","reg":"日本","sch":"东亚女性主义","q":"女性主义绝不是弱者试图变为强者的思想，而是追求弱者也能得到尊重的思想。","body":"《厌女》《父权制与资本主义》——她在东亚语境下系统解构父权制，把无偿家务劳动这个隐形剥削拉到阳光下。","ref":"《厌女》《始于极限》","lat":36.0,"lng":138.0},{"id":"f29","pool":"feminist","poolLabel":"思想家","name":"赵南柱","cn":"赵南柱","era":"1978-","reg":"韩国","sch":"东亚女性主义","q":"金智英没有什么特别的，她就是每一个韩国女人。","body":"《82年生的金智英》——一个普通韩国女性从出生到成为母亲，每一步都被性别歧视塑造。这本书卖了一百万册。","ref":"《82年生的金智英》","lat":36.5,"lng":127.5},{"id":"f30","pool":"feminist","poolLabel":"思想家","name":"Emmeline Pankhurst","cn":"潘克赫斯特","era":"1858-1928","reg":"英国","sch":"行动派","q":"Deeds, not words.","body":"英国妇女参政权运动领袖。当请愿和游行都不管用时，她选择了打碎橱窗、纵火、绝食。我们不是来请求权利的，我们是来要求权利的。","ref":"《My Own Story》","lat":52.0,"lng":-1.0},{"id":"f31","pool":"feminist","poolLabel":"思想家","name":"Malala Yousafzai","cn":"马拉拉","era":"1997-","reg":"巴基斯坦","sch":"行动派","q":"One child, one teacher, one book, one pen can change the world.","body":"15岁被塔利班枪击头部——因为她坚持上学。她活了下来，成为最年轻的诺贝尔和平奖得主。","ref":"《I Am Malala》","lat":30.0,"lng":69.0},{"id":"f32","pool":"feminist","poolLabel":"思想家","name":"Ruth Bader Ginsburg","cn":"RBG 金斯伯格","era":"1933-2020","reg":"美国","sch":"行动派","q":"I dissent.","body":"不是通过革命，而是通过法律——一个案子一个案子地推动性别平等。精妙如棋局。","ref":"RBG最高法院异议意见书","lat":39.0,"lng":-98.0},{"id":"f33","pool":"feminist","poolLabel":"思想家","name":"Gloria Steinem","cn":"格洛丽亚·斯泰纳姆","era":"1934-","reg":"美国","sch":"行动派","q":"A woman without a man is like a fish without a bicycle.","body":"《Ms.》杂志创办者。她把女性主义从学术圈带进千家万户。","ref":"《My Life on the Road》","lat":39.0,"lng":-98.0},{"id":"f34","pool":"feminist","poolLabel":"思想家","name":"Christine de Pizan","cn":"克里斯蒂娜·德·皮桑","era":"1364-1430","reg":"法国","sch":"早期先驱","q":"If it were customary to send little girls to school, they would learn just as fully.","body":"15世纪，她写了《妇女之城》——欧洲历史上第一次有女性系统地反驳厌女传统。在印刷术发明之前。","ref":"《The Book of the City of Ladies》","lat":47.0,"lng":2.0},{"id":"f35","pool":"feminist","poolLabel":"思想家","name":"Olympe de Gouges","cn":"奥兰普·德·古日","era":"1748-1793","reg":"法国","sch":"早期先驱","q":"Woman is born free and remains equal to man in rights.","body":"法国大革命高喊自由平等博爱——但只给男人。她写了《女性与女公民权利宣言》反问：凭什么？两年后被送上断头台。","ref":"《Declaration of the Rights of Woman》","lat":47.0,"lng":2.0}]},"literary":{"label":"文学家","cards":[{"id":"l1","pool":"literary","poolLabel":"文学家","name":"庄姜","cn":"庄姜","era":"春秋","reg":"中国","tp":"诗人","work":"《诗经·燕燕》","q":"燕燕于飞，差池其羽。","body":"《诗经》中最早有记载的女诗人。两千五百年后读来，那种不舍仍然穿透纸页。","ref":"","lat":35,"lng":105},{"id":"l2","pool":"literary","poolLabel":"文学家","name":"卓文君","cn":"卓文君","era":"西汉","reg":"中国","tp":"诗人","work":"《白头吟》","q":"愿得一心人，白头不相离。","body":"富商之女，听司马相如弹琴便私奔。后来他想纳妾，她写下《白头吟》——一首诗救回了一段婚姻。","ref":"","lat":35,"lng":105},{"id":"l3","pool":"literary","poolLabel":"文学家","name":"蔡文姬","cn":"蔡文姬","era":"东汉末","reg":"中国","tp":"诗人","work":"《悲愤诗》《胡笳十八拍》","q":"悲愤诗","body":"战乱中被掳至匈奴十二年。后被曹操赎回，被迫离开孩子。写尽了一个女性在战争中被撕裂的一生。","ref":"","lat":35,"lng":105},{"id":"l4","pool":"literary","poolLabel":"文学家","name":"李清照","cn":"李清照","era":"宋","reg":"中国","tp":"词人","work":"《如梦令》《声声慢》","q":"知否，知否？应是绿肥红瘦。","body":"千古第一才女。前半生写闺中闲情；靖康之变后词风转为苍凉。寻寻觅觅，冷冷清清——中国文学史上最著名的开头之一。","ref":"","lat":35,"lng":105},{"id":"l5","pool":"literary","poolLabel":"文学家","name":"薛涛","cn":"薛涛","era":"唐","reg":"中国","tp":"诗人","work":"《送友人》","q":"谁言千里自今夕，离梦杳如关塞长。","body":"唐代四大女诗人之一。她不只写情诗——她写边塞、写战士、写社会。她创制的薛涛笺成了一种文化符号。","ref":"","lat":35,"lng":105},{"id":"l6","pool":"literary","poolLabel":"文学家","name":"鱼玄机","cn":"鱼玄机","era":"唐","reg":"中国","tp":"诗人","work":"《赠邻女》","q":"易求无价宝，难得有心郎。","body":"唐代最大胆的女诗人。她的诗是中国文学中最早的女性欲望书写——在一千多年前。一生如烈焰。","ref":"","lat":35,"lng":105},{"id":"l7","pool":"literary","poolLabel":"文学家","name":"萧红","cn":"萧红","era":"1911-1942","reg":"中国","tp":"作家","work":"《生死场》《呼兰河传》","q":"我不能选择怎么生，怎么死，但我能决定怎么爱，怎么活。","body":"31岁病死香港。她用女性的视角书写东北的苦难。鲁迅称她是中国最有前途的女作家。","ref":"","lat":35,"lng":105},{"id":"l8","pool":"literary","poolLabel":"文学家","name":"张爱玲","cn":"张爱玲","era":"1920-1995","reg":"中国","tp":"作家","work":"《金锁记》《倾城之恋》","q":"生命是一袭华美的袍，爬满了虱子。","body":"她解剖中国家庭的手术刀比任何人都冷。张爱玲写的不是爱情故事——她写的是权力、欲望和幽闭恐惧。","ref":"","lat":35,"lng":105},{"id":"l9","pool":"literary","poolLabel":"文学家","name":"三毛","cn":"三毛","era":"1943-1991","reg":"中国","tp":"作家","work":"《撒哈拉的故事》","q":"如果有来生，要做一棵树。","body":"华人女性流浪文学的开创者。在大多数中国女性被困在家庭里的年代，她让人看到：女人可以去远方。","ref":"","lat":35,"lng":105},{"id":"l10","pool":"literary","poolLabel":"文学家","name":"余秀华","cn":"余秀华","era":"1976-","reg":"中国","tp":"诗人","work":"《月光落在左手上》","q":"穿过大半个中国去睡你。","body":"脑瘫，农村，底层——所有标签都挡不住她的诗。她的语言野蛮、直接、充满欲望和尊严。","ref":"","lat":35,"lng":105},{"id":"l11","pool":"literary","poolLabel":"文学家","name":"Sappho 萨福","cn":"萨福","era":"前630-570","reg":"古希腊","tp":"诗人","work":"《萨福残篇》","q":"月亮已落下，昴星也已沉没，我独自躺卧。","body":"西方文学史上最早的女诗人，柏拉图称她为第十位缪斯。大部分作品已失传，每一个残篇都是一颗星辰。","ref":"","lat":38,"lng":23.5},{"id":"l12","pool":"literary","poolLabel":"文学家","name":"Jane Austen","cn":"简·奥斯汀","era":"1775-1817","reg":"英国","tp":"作家","work":"《傲慢与偏见》","q":"It is a truth universally acknowledged...","body":"她用婚姻市场做切口，解剖阶级与性别。在女性不能拥有财产的时代，婚姻就是唯一的职业选择。","ref":"","lat":52,"lng":-1},{"id":"l13","pool":"literary","poolLabel":"文学家","name":"Charlotte Brontë","cn":"夏洛蒂·勃朗特","era":"1816-1855","reg":"英国","tp":"作家","work":"《简·爱》","q":"你以为我穷、低微、不美、矮小，就没有灵魂吗？","body":"简·爱说出那段话的时刻，不是爱情场景——它是一个阶级宣言，一个性别宣言。这是1847年。","ref":"","lat":52,"lng":-1},{"id":"l14","pool":"literary","poolLabel":"文学家","name":"Emily Dickinson","cn":"艾米莉·狄金森","era":"1830-1886","reg":"美国","tp":"诗人","work":"1775首诗","q":"Hope is the thing with feathers that perches in the soul.","body":"几乎足不出户，终生未嫁，死后发现了1775首诗。沉默的人往往在纸上发出最大的声音。","ref":"","lat":39,"lng":-98},{"id":"l15","pool":"literary","poolLabel":"文学家","name":"Virginia Woolf","cn":"弗吉尼亚·伍尔夫","era":"1882-1941","reg":"英国","tp":"作家","work":"《一间自己的房间》","q":"A woman must have money and a room of her own.","body":"一间自己的房间——五百英镑年收入和一把带锁的门。她说的不是物质条件，而是精神独立的最低门槛。","ref":"","lat":52,"lng":-1},{"id":"l16","pool":"literary","poolLabel":"文学家","name":"Toni Morrison","cn":"托尼·莫里森","era":"1931-2019","reg":"美国","tp":"作家","work":"《宠儿》","q":"If there is a book you want to read, but it hasn't been written yet, then you must write it.","body":"诺贝尔文学奖得主。如果你想读的书还没有人写，那就自己写。关于奴隶制的幽灵，关于历史如何住在身体里。","ref":"","lat":39,"lng":-98},{"id":"l17","pool":"literary","poolLabel":"文学家","name":"Margaret Atwood","cn":"玛格丽特·阿特伍德","era":"1939-","reg":"加拿大","tp":"作家","work":"《使女的故事》","q":"Nolite te bastardes carborundorum.","body":"《使女的故事》不是科幻——书里的每一件事都在历史上真实发生过。她不是在预言，她是在提醒。","ref":"","lat":56,"lng":-106},{"id":"l18","pool":"literary","poolLabel":"文学家","name":"Mary Shelley","cn":"玛丽·雪莱","era":"1797-1851","reg":"英国","tp":"作家","work":"《弗兰肯斯坦》","q":"Beware; for I am fearless, and therefore powerful.","body":"科幻文学的鼻祖——是一个19岁的女人。如果人类可以创造生命，谁来负责？","ref":"","lat":52,"lng":-1},{"id":"l19","pool":"literary","poolLabel":"文学家","name":"辛波斯卡","cn":"辛波斯卡","era":"1923-2012","reg":"波兰","tp":"诗人","work":"《万物静默如谜》","q":"在诗歌的语言中，每一个词都被掂量过。","body":"诺贝尔奖得主，诗的莫扎特。她的诗精确、反讽、看似轻盈实则深邃。诗歌不需要沉重才能深刻。","ref":"","lat":52,"lng":20},{"id":"l20","pool":"literary","poolLabel":"文学家","name":"安娜·阿赫玛托娃","cn":"安娜·阿赫玛托娃","era":"1889-1966","reg":"俄国","tp":"诗人","work":"《安魂曲》","q":"我和我的人民在一起。","body":"斯大林时代，她的儿子被关进古拉格。一个女人认出她，低声问：你能描述这一切吗？她说：我能。然后写了《安魂曲》。","ref":"","lat":56,"lng":38},{"id":"l21","pool":"literary","poolLabel":"文学家","name":"紫式部","cn":"紫式部","era":"约978-1014","reg":"日本","tp":"作家","work":"《源氏物语》","q":"世间万事，皆如梦幻。","body":"世界文学史上最早的长篇小说——出自一位日本宫廷女性之手。一千年前，她已经在探索人类情感的全部复杂性。","ref":"","lat":36,"lng":138},{"id":"l22","pool":"literary","poolLabel":"文学家","name":"清少纳言","cn":"清少纳言","era":"约966-1025","reg":"日本","tp":"随笔作家","work":"《枕草子》","q":"春曙为最。","body":"日本随笔文学的鼻祖。她敏锐、毒舌、审美极高。一千年前的一个女人，用清单发明了一种文体。","ref":"","lat":36,"lng":138},{"id":"l23","pool":"literary","poolLabel":"文学家","name":"韩江","cn":"韩江","era":"1970-","reg":"韩国","tp":"作家","work":"《素食者》","q":"我不再想吃肉了。","body":"2024年诺贝尔文学奖得主。拒绝吃肉——这是用身体对暴力世界的全面抵抗。安静的反抗，有时比呐喊更震耳。","ref":"","lat":36.5,"lng":127.5},{"id":"l24","pool":"literary","poolLabel":"文学家","name":"Gabriela Mistral","cn":"加夫列拉·米斯特拉尔","era":"1889-1957","reg":"智利","tp":"诗人/教育家","work":"诗集及教育著作","q":"Many things we need can wait. The child cannot.","body":"拉丁美洲第一位诺贝尔文学奖得主——一位乡村女教师。很多事情可以等，孩子不能等。","ref":"","lat":-33,"lng":-71},{"id":"l25","pool":"literary","poolLabel":"文学家","name":"Hannah Arendt","cn":"汉娜·阿伦特","era":"1906-1975","reg":"德国/美国","tp":"哲学家","work":"《艾希曼在耶路撒冷》","q":"Most evil is done by people who never make up their minds to be good or evil.","body":"平庸之恶——邪恶最可怕的形式不是恶魔，而是一个不思考的普通人。她的思想是理解一切权力结构的钥匙。","ref":"","lat":51,"lng":10},{"id":"l26","pool":"literary","poolLabel":"文学家","name":"Susan Sontag","cn":"苏珊·桑塔格","era":"1933-2004","reg":"美国","tp":"评论家","work":"《关于他人的痛苦》","q":"The only interesting answers are those which destroy the questions.","body":"她拒绝被定义为女性知识分子——她就是知识分子。公共知识分子这个头衔在她之后再也没有合适的继承人。","ref":"","lat":39,"lng":-98}]},"comedian":{"label":"脱口秀","cards":[{"id":"com_01","pool":"comedian","poolLabel":"脱口秀","name":"Joan Rivers","cn":"琼·里弗斯","era":"1933–2014","reg":"美国","q":"她在一个不允许女人搞笑的年代站上了舞台，然后站了五十年。","body":"七次试镜 Tonight Show 被拒，经纪人说她\"过了三十岁就不可能成功了\"。是 Lenny Bruce 在看完她的演出后留了一张纸条：\"你是对的，他们是错的。\" 1965年终于登上 Tonight Show，一夜成名。1986年成为美国历史上第一个主持深夜脱口秀的女性。丈夫自杀、被整个行业封杀、事业跌到谷底——她全部扛过来了，然后继续讲了三十年。她拒绝自称女权主义者，说\"那样我能看到票房飞出窗外\"，但她做的每一件事都在为后来的女喜剧人开路。","ref":"纪录片 *Joan Rivers: A Piece of Work* (2010)","lat":39,"lng":-98},{"id":"com_02","pool":"comedian","poolLabel":"脱口秀","name":"Phyllis Diller","cn":"菲利丝·迪勒","era":"1917–2012","reg":"美国","q":"37岁，五个孩子的妈，丈夫长期失业。她走上舞台是因为家里需要钱。","body":"在1950年代，没有女人做单口喜剧。一个都没有。Diller 发明了一整套生存策略：爆炸头假发、浮夸的亮片裙、虚构的废柴丈夫\"Fang\"——把自己变成一个\"不具威胁性的怪人\"，因为那个年代的男观众不能接受一个正常女人比他们好笑。她说\"家务活不会杀死你，但何必冒这个险？\"——用自嘲包裹了整整一代家庭主妇说不出口的愤怒。她上台前十年，全程都在发抖。","ref":"PBS 纪录片 *Pioneers of Television: Phyllis Diller*","lat":39,"lng":-98},{"id":"com_03","pool":"comedian","poolLabel":"脱口秀","name":"Moms Mabley","cn":"\"妈妈\"梅布利","era":"1894–1975","reg":"美国","q":"14岁时已经生了两个孩子，都是被强暴的结果。后来她把愤怒变成了笑声。","body":"本名 Loretta Mary Aiken，出生在北卡罗来纳一个有16个孩子的家庭。父亲死于消防车事故，母亲被车撞死。她14岁逃到克利夫兰，加入黑人巡回演出。1939年成为第一个在阿波罗剧院独立登台的女喜剧人，此后在那里演出的次数超过历史上任何其他表演者。她是黑人、女性、同性恋——在1920年代。她穿着邋遢的家庭主妇装，扮成一个无害的老太太，然后在笑声的掩护下谈种族歧视、谈性别歧视、谈政治。1962年成为第一个在卡内基音乐厅演出的黑人女喜剧人。","ref":"纪录片 *Whoopi Goldberg Presents Moms Mabley* (2013)","lat":39,"lng":-98},{"id":"com_04","pool":"comedian","poolLabel":"脱口秀","name":"Margaret Cho","cn":"赵牡丹","era":"1968–","reg":"美国（韩裔）","q":"14岁赢了喜剧比赛，奖品是给 Jerry Seinfeld 做开场。然后好莱坞用了十年教她：亚裔女人不该这么大声。","body":"1994年，她主演了 *All-American Girl*——美国电视史上第一部以亚裔家庭为中心的情景喜剧。ABC 因为她是不走寻常路的韩裔女性才签了她，然后要求她\"收着点\"。制片人嫌她太胖，她两周减了30磅，住进了医院。节目一季后被砍。她崩溃了，酗酒，不知道自己是谁。然后她站起来，自己写了独角戏 *I'm the One That I Want*，自己出资拍成电影。Ali Wong 说：没有赵牡丹，就没有后来所有亚裔女喜剧人的路。","ref":"独角戏录像 *I'm the One That I Want* (2000)","lat":39,"lng":-98},{"id":"com_05","pool":"comedian","poolLabel":"脱口秀","name":"Ali Wong","cn":"黄阿丽","era":"1982–","reg":"美国（越南裔+华裔）","q":"挺着七个半月的孕肚站在台上，讲的全是别人觉得孕妇不该说的话。","body":"大学学亚裔美国研究，23岁在旧金山一家洗衣店兼咖啡馆开始说脱口秀。搬到纽约后和六个人挤一间阁楼，每晚连赶九个场子，从晚七演到凌晨两点。2016年 Netflix 特辑 *Baby Cobra* 让她一夜爆红——她用一个孕妇的身体，把母职、婚姻、性和亚裔女性的刻板印象全部炸开。2024年凭 *Beef* 成为第一个获得艾美奖最佳女主角的亚裔美国女性。她证明了母亲身份和粗口幽默不矛盾——事实上，它们是同一种力量。","ref":"*Ali Wong: Baby Cobra* (Netflix, 2016)；回忆录 *Dear Girls* (2019)","lat":39,"lng":-98},{"id":"com_06","pool":"comedian","poolLabel":"脱口秀","name":"Hannah Gadsby","cn":"汉娜·盖茨比","era":"1978–","reg":"澳大利亚","q":"被打之后住在帐篷里摘西兰花。朋友帮她报了个喜剧比赛。她赢了。","body":"在塔斯马尼亚长大——那里直到1997年同性恋还是犯罪。大学第一年在公交车站被暴打。之后辍学、流浪、在农场当临时工、住帐篷。朋友帮她报名参加 Raw Comedy 新人赛，她想\"反正我什么都失败过，再多一个也无所谓\"。她赢了。十年后的2018年，Netflix特辑 *Nanette* 彻底改写了脱口秀的规则：她先用笑话讲自己被打的经历，然后把笑话拆开，告诉观众\"你们刚才笑的那个故事，真实版本是这样的\"——把自嘲的安全阀拧掉，让观众直面创伤本身。后来她才被诊断出自闭症和ADHD。","ref":"*Hannah Gadsby: Nanette* (Netflix, 2018)；回忆录 *Ten Steps to Nanette* (2022)","lat":-25,"lng":134},{"id":"com_07","pool":"comedian","poolLabel":"脱口秀","name":"Tig Notaro","cn":"蒂格·诺塔罗","era":"1971–","reg":"美国","q":"大家好，晚上好。我得了癌症。你们好吗？","body":"确诊双侧乳腺癌的那天，她原本有一场演出。她上台了。开场白是那句话。在那之前的四个月里，她因为致命的肠道感染住院，母亲在一场意外中去世，和女友分手。她把这一切全部搬上了舞台。同行 Louis C.K. 当晚在场，发推说\"做了27年喜剧，真正伟大的演出我只见过几次，昨晚 Tig 在 Largo 是其中之一。\" 双侧乳房切除术后，她在纽约喜剧节脱掉上衣，露出手术疤痕，继续讲完了整场。那不是勇气表演——那是一个人在用她唯一会的方式活下去。","ref":"*Tig Notaro: Live* (专辑, 2012)；纪录片 *Tig* (Netflix, 2015)","lat":39,"lng":-98},{"id":"com_10","pool":"comedian","poolLabel":"脱口秀","name":"","cn":"鸟鸟","era":"生年不详","reg":"中国","q":"北大中文系硕士，社恐，容貌焦虑。她把痛苦变成段子，然后用最平静的语气讲出来。","body":"本科学工科，不开心；考研到北大中文系学创意写作，想当作家。毕业后做自由编剧，在出租房里埋头写剧本，焦虑到崩溃。回到呼和浩特进了事业单位，朝九晚五。然后她在一个小场地试着说了一次脱口秀——\"我感受到一种非常强烈的吸引\"。辞掉稳定工作去上海，父母以为她去搞传销。她开创了\"社恐式脱口秀\"——台下捧腹大笑，她面无表情地旁观一切。那段关于容貌焦虑的段子让她登上热搜，因为她说出了那些每天照镜子时\"想把自己藏起来\"的人说不出口的话。","ref":"《脱口秀大会》第四季 (2021)","lat":35,"lng":105},{"id":"com_11","pool":"comedian","poolLabel":"脱口秀","name":"","cn":"思文","era":"1987–","reg":"中国","q":"第一届《脱口秀大会》14个人里唯一的女性。她站在那里的时候，\"脱口秀女王\"不是封号，是事实。","body":"2017年《脱口秀大会》第一季，14位演员，女性只有她一个。第二季21人里有6个女性了，但决赛里进去的还是只有她。她以已婚女性的视角讲段子——婚姻、家庭、两性关系——在\"女脱口秀演员要么单身要么扮丑\"的潜规则里，她是少数以真实身份站着的人。后来因为个人原因退赛，但正是她在舞台上独自撑着的那几年，为杨笠、颜怡颜悦、鸟鸟的出现养好了土壤。","ref":"《脱口秀大会》第一至三季 (2017–2020)","lat":35,"lng":105},{"id":"com_12","pool":"comedian","poolLabel":"脱口秀","name":"","cn":"赵晓卉","era":"生年不详","reg":"中国","q":"白天在车间当工程师，晚上说脱口秀。她的段子里有流水线的节奏。","body":"在汽车工厂当工程师，白天穿工装裤上班，晚上去开放麦。她的喜剧素材来自一个大多数脱口秀演员不会触碰的世界：工厂车间、加班文化、蓝领女性的日常。她不是从\"女性议题\"出发在讲——她就是一个在工厂上班的女人，讲的是她真实看到的东西。那种来自劳动现场的观察力，是坐在咖啡馆写段子写不出来的。","ref":"《脱口秀大会》第三至四季 (2020–2021)","lat":35,"lng":105},{"id":"com_13","pool":"comedian","poolLabel":"脱口秀","name":"Maria Bamford","cn":"玛丽亚·班福德","era":"1970–","reg":"美国","q":"她把自己的精神疾病搬上舞台——不是为了博同情，是因为那就是她的生活。","body":"被诊断有双相情感障碍和强迫症。在大多数喜剧人还在拿\"我前女友好疯\"开玩笑的年代，她直接讲自己住院的经历、吃药的副作用、脑子里那些停不下来的声音。她的表演风格完全不像传统脱口秀——她模仿自己脑子里的不同声音，在各种人格之间跳切，像一个人演了一出关于精神健康的独角戏。Netflix特辑 *Lady Dynamite* 基于她的真实经历改编。她证明了\"疯\"不是一个笑料，但关于\"疯\"的诚实可以非常好笑。","ref":"*Maria Bamford: Old Baby* (Netflix, 2017)；剧集 *Lady Dynamite* (2016–2017)","lat":39,"lng":-98},{"id":"com_14","pool":"comedian","poolLabel":"脱口秀","name":"Wanda Sykes","cn":"旺达·塞克斯","era":"1964–","reg":"美国","q":"在 NSA 当了五年公务员，然后辞职去说脱口秀。45岁那年在台上公开出柜。","body":"大学毕业后进了美国国家安全局（NSA）工作，做了五年采购官。那五年里，她一边处理政府合同一边在华盛顿特区的喜剧俱乐部练段子。终于辞职全职做喜剧。2008年，在加州反同性婚姻的 Prop 8 公投通过后，她在一场集会上公开出柜——那年她45岁，已经是知名喜剧人了。她说她\"受够了别人投票决定她的权利\"。她的喜剧风格是政治讽刺，锋利、直接、不留情面。","ref":"*Wanda Sykes: I'ma Be Me* (HBO, 2009)","lat":39,"lng":-98},{"id":"com_15","pool":"comedian","poolLabel":"脱口秀","name":"Sarah Silverman","cn":"莎拉·西尔弗曼","era":"1970–","reg":"美国","q":"她用小女孩的天真语气说出最尖锐的话——你笑完才反应过来她刚才说了什么。","body":"被 Saturday Night Live 开除后差点放弃喜剧。她发展出一种独特的表演风格：用一种甜美的、仿佛不知道自己在说什么的语气，讲种族、性别、政治中最敏感的话题。那种反差是她的武器——等观众笑完了回过味来，才发现自己刚才笑的东西其实一点都不好笑。她是最早在脱口秀舞台上系统性触碰禁忌话题的女性之一，为后来的女喜剧人拓宽了\"什么可以说\"的边界。","ref":"*Jesus Is Magic* (2005)；*Sarah Silverman: A Speck of Dust* (Netflix, 2017)","lat":39,"lng":-98},{"id":"com_16","pool":"comedian","poolLabel":"脱口秀","name":"Celeste Barber","cn":"赛莱斯特·巴伯","era":"1982–","reg":"澳大利亚","q":"她用自己的身体模仿超模的 Instagram 照片。全世界笑了，然后开始想：为什么我们觉得这很好笑？","body":"一个澳大利亚喜剧演员，用\"普通人翻拍名人照片\"的 Instagram 系列走红全球。但她做的不只是搞笑——每一张对比图都在拆解审美霸权：为什么同样的姿势放在一个\"标准身材\"上是性感，放在一个普通女人身上就是笑话？2020年澳大利亚山火期间，她在 Facebook 上发起募捐，48小时筹到5100万美元，创下 Facebook 募捐纪录。从模仿照片到舞台脱口秀到全球巡演，她证明了\"数字原生\"的喜剧人可以有真实的影响力。","ref":"*Celeste Barber: Challenge Accepted!* (Netflix, 2019)","lat":-25,"lng":134},{"id":"com_17","pool":"comedian","poolLabel":"脱口秀","name":"Yumi Nagashima","cn":"永嶋由美","era":"生年不详","reg":"日本","q":"东京出生，用英语说脱口秀，专门讲日本和西方之间那些让两边都社死的文化差异。","body":"从日本来到北美做英语脱口秀，YouTube 观看量超过3300万。她的表演不是\"外国人讲英语好搞笑\"——她精准地抓住两种文化碰撞时产生的荒谬感：日本人的礼貌强迫症遇到美国人的\"直接表达\"，两边都觉得对方疯了。她出现在蒙特利尔 Just for Laughs、温尼伯喜剧节、Comedy Central Asia 等国际舞台上，是当代亚洲女喜剧人走向世界的代表之一。","ref":"YouTube 频道 *Yumi Nagashima*；专辑 *My Name is Yumi* (2019)","lat":36,"lng":138},{"id":"com_18","pool":"comedian","poolLabel":"脱口秀","name":"Yuriko Kotani","cn":"小谷百合子","era":"生年不详","reg":"日本/英国","q":"24岁跟着男朋友从日本搬到英国。十年后她成了 BBC 新喜剧奖的第一个日本人得主。","body":"爱知县出身，2005年跟着当时的男友搬到英格兰。在伦敦用英语做脱口秀，讲日本和英国之间的文化鸿沟。2015年成为第一个获得 BBC Radio New Comedy Award 的日本人。她的喜剧风格温和但精准——不靠刻板印象搞笑，而是找到两种文化各自\"理所当然\"的东西放在一起，让荒谬自己显现。","ref":"Edinburgh Fringe 独角戏 *Somosomo* (2019)","lat":36,"lng":138},{"id":"com_19","pool":"comedian","poolLabel":"脱口秀","name":"Sharul Channa","cn":"","era":"生年不详","reg":"新加坡","q":"新加坡的\"No.1 女喜剧人\"——在一个没有脱口秀传统的国家，这个头衔她是自己创造出来的。","body":"新加坡英语脱口秀的先驱女性。在一个喜剧产业几乎不存在的东南亚市场，她从零开始建立自己的职业生涯。她的段子涉及种族、性别、新加坡的多元文化社会——在一个以\"和谐\"为核心价值的国家，公开在台上聊这些需要真正的勇气。她参加过 Comedy Central Asia、亚洲各国的喜剧巡演，是\"Queens of Asia\"全女性喜剧巡演的核心成员。 *共计 22 张卡片。待确认后批量写入程序数据池。*","ref":"\"Queens of Asia\" 喜剧巡演","lat":1.35,"lng":103.8},{"id":"com_21","pool":"comedian","poolLabel":"脱口秀","name":"帕孜力亚尔·帕尔哈提","cn":"小帕","era":"生年不详","reg":"中国（维吾尔族）","q":"抑郁：我好想上吊。狂躁：嘻，可以买绳子了。","body":"全名帕孜力亚尔·帕尔哈提，维吾尔族，意思是\"品德高尚的人\"。父亲结了六次婚，她从小就想逃离那个充满高压和暴力的家庭。大学期间患上抑郁症，后来发展为双相情感障碍。毕业后在天津、北京做过留学中介和互联网运营，2020年被裁员后受邀参加商演，第一次开放麦拿到了自己靠脱口秀赚的第一笔钱：五分钟两百块。这五年里她靠脱口秀交房租、看病，用段子剖开那些腐朽沉痛的过去。她穿着小丑戏服站在台上讲双相——撕碎了\"双相等于天才病\"的浪漫想象。精神性脱发，她就戴帽子上台讲。她说\"只要我还有愤怒，就会有旺盛的表达欲\"，也说\"活下去才有一切可能\"。","ref":"《脱口秀和Ta的朋友们2》(2025)；播客《岩中花述》小帕专期","lat":35,"lng":105},{"id":"com_22","pool":"comedian","poolLabel":"脱口秀","name":"","cn":"王越","era":"1996–","reg":"中国","q":"穷到坐不起公交车的时候，她喝醉了拉着朋友讲自己小时候的故事。\"每讲一次，它们就从我身体里少一遍。","body":"学历低，进入社会早。春熙路服装店店员、写字楼电话销售，什么都干过。最贫穷的那段时间连一顿饭都吃不起。她喝酒后拉着朋友讲童年的事——父亲的暴力、那些痛苦的细节——讲着讲着发现\"每讲一次就少一点\"。2022年真的站上了舞台。2024年参加《喜剧之王单口季》，讲痛经——\"就像被人抬着腿撞树\"——打开了男性和月经疼痛之间那堵无法共鸣的墙。2025年第二季获得季军。她的专场《请回答1米58》巡演后出海。每次演完都有一个安可环节跟观众聊天，会问\"今天的内容是不是太沉重了？\"她的微信签名是：多想想落魄的时候是怎么过来的。","ref":"个人专场《请回答1米58》；《喜剧之王单口季》第一、二季 (2024–2025)","lat":35,"lng":105},{"id":"coms_01","pool":"comedian","poolLabel":"脱口秀","name":"","cn":"王小利","era":"约1980年–","reg":"中国","q":"爸问她对这个家有什么贡献。她说：\"我是这个家的长女，我存在，就是对这个家的贡献。","body":"45岁，未婚，不生育，不焦虑，全职啃老——主打一个心安理得。闺蜜们在群里抱怨老公孩子，她中午12点丢出一句\"刚醒\"。闺蜜找她倾诉烦恼，她说\"我没有烦恼\"。爸爸质问她对家有什么贡献，她说自己1980年代出生本身就给了父母\"名分\"——那个年代没孩子的夫妻要被指指点点。所以她存在就是贡献。收场词是\"反正无论我做什么，都是榜样\"。鲁豫说听完她的段子\"觉得更有底气了\"。她不是在说一种生活方式好不好，她是在说：你以为只有一种活法，但不是的。","ref":"《脱口秀和Ta的朋友们2》(2025)","lat":35,"lng":105},{"id":"coms_03","pool":"comedian","poolLabel":"脱口秀","name":"Echo","cn":"冉榕","era":"生年不详","reg":"中国（土家族）","q":"三种孩子我爸妈不打——成绩好的不打，别人家的不打，儿子不打。所以我们一定要很努力，才能看起来跟儿子一样，毫不费力。","body":"重庆大山里的土家族家庭，六口人：大姐、二姐、她、弟弟和父母。从小就知道在这个家庭里生存的规则：作为女儿，只有成绩好才能免遭暴力。二姐是那个决定出走的人——14岁离开家，再也没有回来。Echo考上211大学走出大山，一度以为自己是姐姐们命运里的\"例外\"。长大后才发现自己跟姐姐们殊途同归——\"女性从来都是一个命运共同体，身上永远背负着那些最原始、封建得不得了的东西，跟你学不学习、读不读书，一点关系都没有。\"节目第三赛段她讲了二姐的故事，被淘汰了，但私信涌入无数\"二姐\"，一字一句写下自己出走的故事。2025年她又回来了，讲\"人类能因任何洞流血请假，唯独月经不行\"。2019年起在成都线下演出，是真正从开放麦一步步走上来的。","ref":"《脱口秀和Ta的朋友们》第一、二季 (2024–2025)；《人物》2025女性力量演讲","lat":30,"lng":109},{"id":"coms_04","pool":"comedian","poolLabel":"脱口秀","name":"","cn":"唐香玉","era":"生年不详","reg":"中国","q":"村里第一个全日制女硕士。家族特许她给祖宗上香，但进祖坟——绝无可能。","body":"从小成绩好，念硕士，进大厂，上综艺——被村里破例写进了家谱。但不结婚就依然\"没有价值\"。她的段子看似都在讲催婚，其实在讲一个更深的东西：\"女孩从小就被预设了一个婆家——不叠被子，婆家笑话；不会包饺子，婆家笑话。你的女儿不是你的女儿，从幼儿园开始就在培养她成为别人家的儿媳。\"\"嫁出去是外人，嫁不出去也是外人，里外不是人\"——女性没有家。前男友说她没方向感不适合学车，说\"以后老公拉着你\"，她偷偷报名驾校抢先拿了驾照——\"别人谈恋爱问爱不爱，我谈恋爱问服不服。\"被观众叫\"反糟粕的姐\"。2022年初登综艺讲这些，评委说\"审美疲劳\"——但她讲的从来不是催婚，她讲的是女性在中国农村宗族结构里从出生起就被预售的命运。","ref":"《喜剧之王单口季》第一、二季 (2024–2025)","lat":35,"lng":105},{"id":"coms_05","pool":"comedian","poolLabel":"脱口秀","name":"","cn":"步惊云","era":"生年不详","reg":"中国","q":"比起参加《再见对的人》，我更想参加民营企业家峰会。","body":"女创业者，脱口秀俱乐部主理人。早期段子围着老公打转，后来核心变成了她自己——妻子、母亲、创业者三重身份之间的撕扯。她不是在抱怨，是在拆解：为什么社会默认女人做了母亲就该以家庭为重，做了创业者就该像男人一样\"拼\"，两头都要满分但规则从来不一样。她说\"女人慕强不如变强\"，说完调侃离婚恋综后紧接着亮出自己的野心——不要爱情剧本，要商业版图。从讲段子到开俱乐部到当主理人，她用自己的职业路径回答了\"女脱口秀演员的出路是什么\"。","ref":"《脱口秀和Ta的朋友们》(2024)","lat":35,"lng":105},{"id":"coms_06","pool":"comedian","poolLabel":"脱口秀","name":"","cn":"张慧","era":"生年不详","reg":"中国","q":"不要跟我说什么'撒娇女人最好命'，我们强势女人不要命。","body":"性格强势，段子也强势。她质疑的是最隐蔽的那种性别偏见——不是明面上的歧视，是语言里的双标：\"同样是提要求下命令，为什么在有的人身上叫有领导力，她做同样的事就叫给人压力？男人展现领导力会被夸好man，为什么没有人夸好woman？\"这个问题没有人在脱口秀舞台上问过。大多数女演员讲的是女性被欺负的困境，她讲的是女性强起来之后遇到的另一种困境——你强了，但你强的方式不对，你应该温柔地强，优雅地强，最好强得不像在强。","ref":"《脱口秀和Ta的朋友们》(2024)","lat":35,"lng":105},{"id":"coms_07","pool":"comedian","poolLabel":"脱口秀","name":"","cn":"大国手","era":"生年不详","reg":"中国","q":"公司面临危机的时候老板问我怎么办，我说，凡是现存的，都会走向灭亡的。","body":"2023年3月才开始说脱口秀，哲学硕士。入行一年出头就登上综艺舞台，文本精巧得让老演员侧目——她把哲学塞进日常生活，不是掉书袋，是真的用哲学思维拆解职场和两性关系里的荒谬。被网友骂\"恋爱脑\"后她反击：旧的规训要求女性矜持，新的规训又说要掌握主动，主动了又说不能谈恋爱——\"旧的规训还没打破，新的规训就迅速建立了。\"这句话精准得像一把手术刀。她证明了脱口秀不一定需要\"苦出身\"当素材，智识本身就是武器。","ref":"《脱口秀和Ta的朋友们》(2024)","lat":35,"lng":105},{"id":"coms_08","pool":"comedian","poolLabel":"脱口秀","name":"","cn":"菜菜","era":"生年不详","reg":"中国","q":"女性经期不能上坟——祖先他也不阳间。","body":"2024年脱口秀舞台上最敢碰禁忌的新人之一。她讲了一个跑腿小哥帮她买卫生巾的故事——充满各种误会，小哥最后还想用黑色垃圾袋遮遮掩掩，整个过程充满\"偷感\"。她在台上说\"拒绝月经羞耻\"，说自己来讲脱口秀就是来赚\"经费\"的。月经这个话题在中国公共讨论里长期是禁区——不是不能说，是说了别人不舒服，而让别人不舒服是女人的错。菜菜把这个\"不舒服\"搬上舞台，让观众笑完之后想一想：一个正常的生理现象，为什么需要用黑色垃圾袋藏起来？","ref":"《脱口秀和Ta的朋友们》(2024)","lat":35,"lng":105},{"id":"comsplit_01","pool":"comedian","poolLabel":"脱口秀","name":"","cn":"杨笠","era":"1992–","reg":"中国","q":"你为什么不上清华呀？是因为不喜欢吗？","body":"弟弟催她结婚，她回了这句话。2019年《脱口秀大会》第二季，四场录制中两场倒数第一。那一季她试着讲催婚、讲家庭分工——\"在家里，我爸只需要做一件事，那就是做自己\"——讲女友减肥不是为了取悦男友，是为了换男友。路人对她最深的印象只剩清华那句。但那不只是一个金句——她在一个全是男演员的舞台上，第一次用女性视角拆解了催婚逻辑：你们拿\"正常\"标准要求我，那我也用你们的\"正常\"标准反问你们，不觉得荒谬吗？","ref":"《脱口秀大会》第二季 (2019)","lat":35,"lng":105},{"id":"comsplit_02","pool":"comedian","poolLabel":"脱口秀","name":"","cn":"杨笠","era":"1992–","reg":"中国","q":"黑寡妇的超能力是\"衰老速度慢\"和\"做过绝育手术\"。\"请问这个超能力是要怎么拯救世界？是把坏人活活熬死吗？","body":"2020年第三季，她炸了。不只是\"普通却自信\"那句——整季她在做一件更野心勃勃的事：把女脱口秀演员太少、黑寡妇的\"超能力\"、女性用\"敲门\"换取成功的荒谬，串成一条完整的关于女性困境的主线。她不再只讲催婚，开始讲结构性的东西——为什么这个舞台上女人这么少？为什么银幕上最强的女超级英雄的\"超能力\"本质上是男性凝视下的两个指标？界面新闻评价她的段子\"有了深度\"，\"有她个人经历的投射和观察\"。她说：\"我的烦恼就来自于我是一个女性，这不是我选的，是横在我面前不得不面对的事情。\"","ref":"《脱口秀大会》第三季 (2020)","lat":35,"lng":105},{"id":"comsplit_03","pool":"comedian","poolLabel":"脱口秀","name":"","cn":"杨笠","era":"1992–","reg":"中国","q":"自从我说了脱口秀以后，冬天出门再也不觉得冷了，因为我头上扣的全是帽子。","body":"\"普通却自信\"让她一夜出圈，也让她成了中国互联网最大的靶子之一。举报、抵制、人身威胁。品牌代言一个接一个被迫撤回——喜临门、小鹏、奔驰、海澜之家、舍得酒业，2024年连京东都因为和她合作引发\"挤兑\"传言而紧急道歉切割。线下演出因为安全威胁大幅缩减。她被扣了\"女拳\"\"挑起性别对立\"的帽子。第二年她回来了，更勇了：\"不要轻易调侃男性，如果非要调侃只调侃成功的部分。\"2025年她清空了抖音和微博，罗永浩透露她可能将告别专场舞台——但巡演排期已延至2026年，广州站售罄、北京站候补排队两千人。她没有停止表达，只是选择了更安全的方式。","ref":"个人专场巡演 (2024–2026)","lat":35,"lng":105},{"id":"comsplit_04","pool":"comedian","poolLabel":"脱口秀","name":"","cn":"颜怡 & 颜悦","era":"1995–","reg":"中国","q":"我是一个双胞胎。\"——两个人的自我介绍，用的是单数。","body":"双胞胎，两个人说一个人的脱口秀。颜怡比颜悦早出生5分钟，从头到脚尺码都小一点。她们的写作方式本身就是一种行为艺术：共享一个大脑、互相接话、在两个身体之间传递同一个逻辑链条。2019年第一次参加《脱口秀大会》海选，没被选上。第二季上台两期，排名倒数第一。2020年第三季，杀进全国十强。从倒数到十强只用了一年——但那一年里她们每天都在写，在开放麦反复试，把每个段子打磨到两个人的节奏完全咬合。2020年获 GQ 年度人物。","ref":"《脱口秀大会》第二至三季 (2019–2020)","lat":35,"lng":105},{"id":"comsplit_05","pool":"comedian","poolLabel":"脱口秀","name":"","cn":"颜怡 & 颜悦","era":"1995–","reg":"中国","q":"这一组十二个演员，只有我们俩是女的。感觉就像一场行业大会，请了一群男演员来抱怨职场有多难，也让我们进来了——因为他们缺两个礼仪。","body":"被问到\"女演员是不是只能聊女性话题\"，她们回答：如果这个社会是女权社会，男性是弱势，她们也会站在男性视角写。她们的段子总是从女性日常出发——催婚、容貌焦虑、职场歧视——但落点从来不是\"我好惨\"，而是用逻辑拆解荒谬。2024年她们做了第一个双人专场，主题是\"关系\"：丘比特射箭的爱情神话里，那个被射中的女人，变成了一棵树。到了2025年，她们发现了一个精确的数字：女性脱口秀演员的人数确实增长了——但比例精准维持在20%，一点没变。她们说：\"我们同情弱者，因为我们就是弱者。\"","ref":"《脱口秀和Ta的朋友们》(2024)；双人专场巡演 (2024)","lat":35,"lng":105},{"id":"comsplit_06","pool":"comedian","poolLabel":"脱口秀","name":"","cn":"嘻哈","era":"生年不详","reg":"中国","q":"国家二级运动员，定向越野冠军，后来去当了空姐。她辞职来讲脱口秀，是为了替还在里面的人发声。","body":"四川资阳长大。前半段人生是体育生——国家二级运动员、定向越野大赛冠军。后来转行做了空姐。2025年站上《喜剧之王单口季2》的舞台，两天后发微博宣布辞去空姐工作：\"我辞职来讲脱口秀的原因是想去帮还在里面的人发声，让大家看到她们的困境，我要保护她们。\"她说\"如果非要背着阳光踩着自己的影子，那就劈开一条新路。\"个人专场《茁壮》豆瓣评分9.5。","ref":"个人专场《茁壮》(2024)","lat":35,"lng":105},{"id":"comsplit_07","pool":"comedian","poolLabel":"脱口秀","name":"","cn":"嘻哈","era":"生年不详","reg":"中国","q":"起火的时候丝袜是危险材质，但牛仔裤可以把火一屁股坐灭。","body":"为什么空姐要穿短裙丝袜、不能穿牛仔裤？这个问题在她之前没有人在脱口秀舞台上问过。她以接近满票战胜付航，全场炸裂。她的段子不是在抱怨制服不好看——她在拆解一个行业对女性身体的规训：你的着装标准不是为了安全，不是为了效率，是为了让乘客\"赏心悦目\"。那条丝袜在紧急情况下会熔在皮肤上，但它\"好看\"。最终获得《喜剧之王单口季2》亚军。","ref":"《喜剧之王单口季2》(2025)","lat":35,"lng":105},{"id":"comsplit_08","pool":"comedian","poolLabel":"脱口秀","name":"","cn":"房主任","era":"约1975–","reg":"中国","q":"她妈妈给她选了个身高一米五五、体重九十五斤的丈夫，理由是大姐被家暴是因为老公太高太壮——\"这个小玩意好，我闺女跟他吃不了亏。","body":"本名樊春丽，山东临沂沂蒙山区农村女性。去看脱口秀演出时被递上话筒互动，观众觉得\"她比演员好笑\"。结果结婚不到一个月就被那个\"小玩意\"打。婆家因为胎儿性别三次强拽她去流产，最晚一次腹中女婴已经八个月。她跟父母说想离婚，父亲说\"男人家暴不丢人，女人离婚丢人\"。三十年里她伺候瘫痪公公、填补丈夫赌债、耕种做工养家。血压飙到200那天，她想起婆婆就是在争吵中猝死的。杨天真在节目现场泪洒，庞博说她\"代表了我们的姐姐、母亲、外婆\"。","ref":"《喜剧之王单口季2》(2025)","lat":35,"lng":105},{"id":"comsplit_09","pool":"comedian","poolLabel":"脱口秀","name":"","cn":"房主任","era":"约1975–","reg":"中国","q":"2023年4月8号，我签约成为脱口秀演员。2024年4月8号，我带着俩女儿净身出户。2025年4月8号，什么都没发生，我过了一个平静而又幸福的一天。","body":"艺名\"房主任\"——村里的\"信息中心主任\"，传播八卦的带头人。2023年签约脱口秀演员，她说这天是自己的\"重生日\"。离婚后前夫偶尔还发微信骂她，她回：\"大哥，离婚一年多了，离婚证不是给结婚证做的年审。\"这三个4月8号——签约、净身出户、平静幸福——是一个山东农村女人用三十年换来的三句话。第一句是开始，第二句是代价，第三句是自由。\"什么都没发生\"是她人生中最好的事情。 *4组拆分完成。原30张 + 净增5张 = 脱口秀pool共35张。*","ref":"《喜剧之王单口季2》(2025)","lat":35,"lng":105}]},"philosopher":{"label":"哲学家","cards":[{"id":"phil_01","pool":"philosopher","poolLabel":"哲学家","name":"Gargi Vachaknavi","cn":"嘉吉·瓦恰克纳薇","era":"约公元前700年","reg":"古印度","q":"国王悬赏一千头牛角系金的母牛。她是全场唯一敢质问圣人的女人——而且质问了两次。","body":"毗提诃国王迦纳卡举办哲学辩论大会，八位学者挑战圣人耶若瓦尔基亚，七男一女。嘉吉用\"织布\"做比喻一层层追问现实的基底——水是万物的经纬，那水又编织在什么之上？她是唯一质问了两次的人。第二次辩论结束后，她转身对在场的男性哲学家们说：\"你们能全身而退就算走运了，你们谁都辩不过他。\"——她不是在认输，是在告诉那些骄傲的男人：她比他们更早看清了胜负。两千七百年前的女性，在满座男人中间站起来发言，本身就是一种哲学立场。","ref":"《广林奥义书》(Brihadaranyaka Upanishad) 第三、第八梵书","lat":25,"lng":80},{"id":"phil_02","pool":"philosopher","poolLabel":"哲学家","name":"Maitreyi","cn":"弥勒衣","era":"约公元前700年","reg":"古印度","q":"丈夫要把全部财产分给她。她问：这些财产能让我永生吗？不能？那我不要。","body":"圣人耶若瓦尔基亚要出家修行前，准备把财产平分给两位妻子。另一位妻子迦多耶妮接受了。弥勒衣拒绝了，追问道：如果财富不能让我获得不朽的知识，我要它做什么？这个问题引发了奥义书中最深刻的对话之一——关于自我（阿特曼）的本质。她不是\"圣人的妻子\"，她是一个选择了知识而不是财产的人。在一个女性被定义为财产的年代，她把财产推了回去。","ref":"《广林奥义书》第二、第四梵书","lat":25,"lng":80},{"id":"phil_03","pool":"philosopher","poolLabel":"哲学家","name":"Aspasia","cn":"阿斯帕西娅","era":"约公元前470–400年","reg":"古希腊（米利都/雅典）","q":"苏格拉底说他的修辞术是跟她学的。但历史书上只记了她是伯里克利的情人。","body":"从米利都来到雅典，作为外邦人没有公民权。她开了一所学校，教男人和女人修辞学。柏拉图在《梅内克塞努斯》中让苏格拉底说\"我的修辞老师可不一般\"——那个老师就是阿斯帕西娅。她被认为帮伯里克利写了著名的葬礼演说。但古代史料对她的描述永远绕不开\"妓女\"这个标签：当男人称赞她的才华时，被后世注释者解读为\"讽刺\"；当男人侮辱她时，则被当作\"事实\"。苏格拉底教了柏拉图，柏拉图教了亚里士多德——但谁教了苏格拉底？","ref":"柏拉图《梅内克塞努斯》(Menexenus)；色诺芬《回忆苏格拉底》","lat":38,"lng":23.5},{"id":"phil_04","pool":"philosopher","poolLabel":"哲学家","name":"Hipparchia","cn":"希帕基亚","era":"约公元前350–280年","reg":"古希腊（马罗尼亚/雅典）","q":"父母给她介绍了无数富家子弟。她说：要么让我嫁给那个住在大街上的哲学家，要么我去死。","body":"出身富裕家庭，爱上了犬儒派哲学家克拉底斯。父母拒绝，她以自杀相威胁。克拉底斯脱掉衣服站在她面前说\"这就是你的未来丈夫，这就是他的全部财产\"，她同意了。她放弃了财富、名声和一切\"体面女人\"应有的生活，穿着粗布跟丈夫一起睡在雅典的街头。在一次宴会上，有人挑衅她说女人应该待在织布机前，她用一个逻辑论证把对方堵了回去：\"如果某件事对某人做不算错，那对我做也不算错。\"她是古代82位哲学家传记合集《名哲言行录》中唯一拥有独立词条的女性。","ref":"第欧根尼·拉尔修《名哲言行录》卷六","lat":38,"lng":23.5},{"id":"phil_05","pool":"philosopher","poolLabel":"哲学家","name":"Hypatia","cn":"希帕提娅","era":"约公元355–415年","reg":"罗马帝国（亚历山大港）","q":"她是亚历山大港最后的伟大学者。基督教暴民把她从马车上拖下来，用贝壳刮去了她的皮肤。","body":"数学家、天文学家、哲学家。她的父亲是亚历山大港图书馆最后一批学者之一，她继承并超越了他。她教授新柏拉图主义哲学，学生来自各种宗教背景。在基督教与异教的政治冲突中，她成为了替罪羊——415年，一群基督教狂热分子在街上拦住她的马车，把她拖进教堂，用牡蛎壳（或屋瓦碎片）活活剥了她的皮。她的死标志着古典世界学术自由的终结。一千六百年后，她的名字成了女性在科学中被暴力消除的象征。","ref":"Maria Dzielska《Hypatia of Alexandria》(1995)","lat":31.2,"lng":29.9},{"id":"phil_06","pool":"philosopher","poolLabel":"哲学家","name":"Hildegard von Bingen","cn":"希尔德加德·冯·宾根","era":"1098–1179","reg":"神圣罗马帝国（德国）","q":"8岁被送进修道院。她说她从小就能看到\"活的光\"。教皇和皇帝都来请教她。","body":"从小经历异象（visions），但直到42岁才敢把它们写下来——之前她一直害怕被当成疯子。一旦开始写，就再也没有停过：神学、自然史、医学、音乐、宇宙论。她创造了一整套自然哲学体系，将人体视为宇宙的微缩模型。她写了77首圣歌，创造了一门人工语言（Lingua Ignota），还写了中世纪最详细的草药学著作之一。在女性没有受教育权的年代，她通过\"神的启示\"这个框架获得了发言权——你无法让一个声称在传达上帝话语的人闭嘴。","ref":"Hildegard von Bingen《Scivias》(1151)","lat":50,"lng":10},{"id":"phil_07","pool":"philosopher","poolLabel":"哲学家","name":"Christine de Pizan","cn":"克里斯蒂娜·德·皮赞","era":"1364–约1430","reg":"法国（意大利裔）","q":"中世纪欧洲第一个以写作为职业养活自己的女人。","body":"丈夫去世时她25岁，带着三个孩子、一个母亲和一个侄女。没有遗产，没有收入。她开始写作——不是因为热爱文学，是因为需要钱。1405年写了《女性之城》(The Book of the City of Ladies)，系统性地反驳了当时流行的\"女性天生低劣\"的论述：她虚构了一座由历史上杰出女性建造的城市，用事实堆砌城墙。这本书比Mary Wollstonecraft的《女权辩护》早了将近四百年。她是欧洲有记录以来最早的职业女性作家。","ref":"《女性之城》(The Book of the City of Ladies, 1405)","lat":47,"lng":2},{"id":"phil_08","pool":"philosopher","poolLabel":"哲学家","name":"Mary Astell","cn":"玛丽·阿斯特尔","era":"1666–1731","reg":"英国","q":"如果所有男人生而自由，为什么所有女人生而为奴？","body":"被称为\"第一个英国女权主义者\"。出身没落中产家庭，没有上过大学（当时女性不允许），靠叔叔教她哲学。她在1694年出版《认真建议女士们》，主张建立女性学术社区——一个女性可以学习哲学和科学的地方，不用为了生存而嫁人。她用洛克的理性主义来反驳洛克：你说人人有理性、人人生而自由——那女人呢？这个问题后来成为所有自由主义女权主义的起点。","ref":"《认真建议女士们》(A Serious Proposal to the Ladies, 1694)","lat":52,"lng":-1},{"id":"phil_09","pool":"philosopher","poolLabel":"哲学家","name":"Sor Juana Inés de la Cruz","cn":"胡安娜修女","era":"1648–1695","reg":"新西班牙（墨西哥）","q":"她选择当修女不是因为信仰，是因为那是17世纪墨西哥女人唯一能读书的方式。","body":"三岁自学认字，八岁请求父母让她女扮男装去上大学（被拒绝）。她进了修道院，因为那是唯一能让她远离婚姻、专心读书的地方。她的修道院书房藏书四千册，是当时新大陆最大的私人图书馆之一。1691年她写了《回复菲洛忒阿修女书》，为女性的求知权辩护——这封信被认为是拉丁美洲最早的女权主义文献。教会施压要求她放弃学术，她最终签署了一份以血书写的忏悔书，卖掉了全部藏书。两年后在照顾瘟疫患者时去世。","ref":"《回复菲洛忒阿修女书》(Respuesta a Sor Filotea, 1691)","lat":19.4,"lng":-99.1},{"id":"phil_10","pool":"philosopher","poolLabel":"哲学家","name":"Elisabeth of Bohemia","cn":"波希米亚的伊丽莎白","era":"1618–1680","reg":"波希米亚/荷兰","q":"她给笛卡尔写了一封信，问了一个笛卡尔回答不了的问题。这个问题到今天也没人回答得了。","body":"波希米亚公主，流亡荷兰。1643年她给笛卡尔写信：\"如果灵魂只是一个思考的东西，它怎么能让身体动起来？\"这个问题——\"心身交互问题\"——直接刺穿了笛卡尔二元论的核心弱点。笛卡尔在回信中承认这是他体系中最难解释的部分，但给出的答案连他自己都不满意。他们的通信持续了七年直到笛卡尔去世。笛卡尔把《哲学原理》献给了她。但在此后几百年的哲学史教科书里，\"心身问题\"被归功于男性哲学家们的\"发现\"，她的信被省略了。","ref":"Lisa Shapiro 编《The Correspondence between Princess Elisabeth of Bohemia and René Descartes》","lat":50,"lng":14.4},{"id":"phil_11","pool":"philosopher","poolLabel":"哲学家","name":"Margaret Cavendish","cn":"玛格丽特·卡文迪什","era":"1623–1673","reg":"英国","q":"她写了欧洲最早的科幻小说之一。当时的人叫她\"疯狂的玛格丽特\"。","body":"纽卡斯尔公爵夫人，自学成才的自然哲学家。她写了关于原子论的哲学著作，反对笛卡尔的机械论世界观，主张物质本身具有感知能力。1666年她出版了《燃烧的世界》——一部科幻乌托邦小说，女主人公穿越到一个由动物人统治的平行世界，最终成为那个世界的女皇。她是第一个被邀请参加英国皇家学会会议的女性（1667年），虽然之后近两百年不再有女性获得同样的机会。同时代的人嘲笑她是\"疯子\"，但莱布尼茨读了她的作品后修改了自己的哲学体系。","ref":"《燃烧的世界》(The Blazing World, 1666)","lat":52,"lng":-1},{"id":"phil_12","pool":"philosopher","poolLabel":"哲学家","name":"Anne Conway","cn":"安妮·康威","era":"1631–1679","reg":"英国","q":"她写了一本哲学书，直接影响了莱布尼茨的单子论。这本书在她死后才出版，署名是\"匿名\"。","body":"终身饱受偏头痛折磨，严重到需要开颅手术（17世纪的开颅手术）。尽管如此，她通过家庭教师学习了笛卡尔和剑桥柏拉图主义哲学。她写了《最古老和最现代的哲学原理》，反对笛卡尔的二元论和霍布斯的唯物论，提出了一种\"一元多层次\"的形而上学——万物由同一种基本物质构成，但以不同程度的精神性存在。莱布尼茨读到这本书后，在自己的著作中引用了她，并发展出了\"单子论\"。但她的书匿名出版，先被翻译成拉丁文，再被翻译回英文，作者身份长期不明。","ref":"《最古老和最现代的哲学原理》(The Principles of the Most Ancient and Modern Philosophy, 1690)","lat":52,"lng":-1},{"id":"phil_13","pool":"philosopher","poolLabel":"哲学家","name":"Susanne Langer","cn":"苏珊·朗格","era":"1895–1985","reg":"美国","q":"她的《哲学新解》卖了50万册——20世纪卖得最好的哲学书之一。然后哲学系不给她终身教职。","body":"哈佛大学第一批女博士之一。1942年出版《哲学新解：理性、仪式与艺术中的符号》，论证人类不只是\"理性动物\"，而是\"符号动物\"——艺术、音乐、仪式和语言一样，是人类理解世界的基本方式。这本书颠覆了当时分析哲学\"只有可验证的命题才有意义\"的教条，成为20世纪最畅销的哲学著作之一。但她在哈佛拿不到正式教职——不是因为学术水平不够，是因为性别。她后来在康涅狄格学院教了整个职业生涯的后半段。","ref":"《哲学新解》(Philosophy in a New Key, 1942)","lat":39,"lng":-98},{"id":"phil_14","pool":"philosopher","poolLabel":"哲学家","name":"Ruth Barcan Marcus","cn":"露丝·巴肯·马库斯","era":"1921–2012","reg":"美国","q":"她发明了\"Barcan公式\"，改写了现代逻辑学。然后一个男哲学家在学术会议上公开声称那是他的想法。","body":"在逻辑学还被视为纯男性领域的年代，她发展了量化模态逻辑——听起来很抽象，但这套系统是回答\"什么是可能的、什么是必然的\"这类问题的数学工具。她提出的\"Barcan公式\"至今是模态逻辑教科书的核心内容。1962年，在一场学术会议上，Saul Kripke（后来的逻辑学巨星）公开宣读了一篇论文，核心思想与她十年前发表的成果高度重叠，且未给予充分引用。这件事在哲学界引发了长达数十年的归属争议。她是耶鲁大学哲学系第一位女性正教授。","ref":"Ruth Barcan Marcus 论文集 *Modalities* (1993)","lat":39,"lng":-98},{"id":"phil_15","pool":"philosopher","poolLabel":"哲学家","name":"Philippa Foot","cn":"菲利帕·福特","era":"1920–2010","reg":"英国/美国","q":"你听说过\"电车难题\"吗？就是她发明的。","body":"1967年，她在一篇论文里提出了一个思想实验：一辆失控的电车即将撞死五个人，你可以拉一个道岔让它转向，但另一条轨道上有一个人。你拉不拉？这个\"电车难题\"(Trolley Problem)后来成为哲学史上被讨论最多的道德实验之一，从本科课堂到自动驾驶伦理都在用。但很少有人知道发明它的是一个英国女人。她更大的贡献是复兴了亚里士多德式的美德伦理学——在功利主义和义务论统治道德哲学的年代，她坚持说\"好的行为来自好的品格\"，而不是来自算计或规则。","ref":"Philippa Foot《Natural Goodness》(2001)","lat":52,"lng":-1},{"id":"phil_16","pool":"philosopher","poolLabel":"哲学家","name":"Mary Midgley","cn":"玛丽·米奇利","era":"1919–2018","reg":"英国","q":"她55岁才出版第一本书。然后连续写到99岁去世，一辈子都在跟\"人类比动物高级\"这个幻觉打架。","body":"牛津大学哲学系1930年代末的学生——那个年代男同学都去打二战了，女生终于有机会安安静静做学问。她和同学 Philippa Foot、Iris Murdoch、Elizabeth Anscombe 四个女人几乎重塑了英国道德哲学。她55岁才出第一本书《野兽与人》，挑战了当时流行的\"自私基因\"叙事和还原论科学观。她认为将人类行为简化为基因或进化策略是一种哲学错误——人是完整的存在，不是被基因操纵的机器人。她写作清晰、毒舌、面向大众读者——哲学不应该只在学术期刊里自说自话。","ref":"Mary Midgley《Beast and Man》(1978)；《Science and Poetry》(2001)","lat":52,"lng":-1},{"id":"phil_17","pool":"philosopher","poolLabel":"哲学家","name":"Iris Murdoch","cn":"艾丽丝·默多克","era":"1919–1999","reg":"英国/爱尔兰","q":"她是20世纪最重要的英语小说家之一。但她首先是一个哲学家。","body":"牛津毕业后做过联合国救济机构的工作人员，在战后欧洲的难民营里见过人类处境的底部。她的道德哲学核心概念是\"注意力\"(attention)——借用薇依(Simone Weil)的思想，她认为道德不是做出正确的\"选择\"，而是学会\"看见\"他人的真实处境。这种\"看见\"本身就是一种道德行为。她写了26部小说来探索这个问题——小说不是哲学的附属品，是哲学的另一种形态。晚年被阿尔茨海默症夺去了语言和记忆，但她的哲学恰恰是关于\"注意力\"的丧失如何让我们变得不道德。","ref":"Iris Murdoch《The Sovereignty of Good》(1970)","lat":52,"lng":-1},{"id":"phil_18","pool":"philosopher","poolLabel":"哲学家","name":"Elizabeth Anscombe","cn":"伊丽莎白·安斯康姆","era":"1919–2001","reg":"英国","q":"她翻译了维特根斯坦。她当面反对杜鲁门获荣誉学位——因为他下令在广岛投了原子弹。","body":"维特根斯坦最信任的学生和遗著执行人，翻译了他最重要的著作《哲学研究》。1956年，牛津大学拟授予杜鲁门荣誉学位，她是唯一公开站出来反对的人——她认为对平民使用原子弹是谋杀，大学不应该向一个下令谋杀的人致敬。她的1958年论文《现代道德哲学》直接引发了美德伦理学的复兴——她论证当代道德哲学的\"义务\"\"应该\"等概念已经失去了原来的宗教根基，变成了空壳。她生了七个孩子，同时在剑桥大学做了几十年教授。","ref":"G.E.M. Anscombe《Intention》(1957)；论文\"Modern Moral Philosophy\" (1958)","lat":52,"lng":-1},{"id":"phil_19","pool":"philosopher","poolLabel":"哲学家","name":"Rabia of Basra","cn":"拉比亚·巴士拉","era":"约714–801","reg":"阿拔斯帝国（伊拉克）","q":"有人问她为什么不结婚。她说：\"我忙着跟上帝谈恋爱，没空分心。","body":"出生于巴士拉一个赤贫家庭，幼年被卖为奴隶。获得自由后成为苏菲派最重要的神秘主义哲学家之一。她将\"无条件的爱\"(ishq)引入苏菲派思想——爱上帝不是为了天堂的奖赏，也不是因为害怕地狱的惩罚，而是纯粹的、无所求的爱。传说她曾手持火把和水壶走在巴士拉街头，说\"我要用火烧掉天堂，用水浇灭地狱——这样人们才能不为奖惩、只为爱本身而爱上帝。\" 在伊斯兰哲学的父权传统中，她是极少数被后世一致尊崇的女性思想家。","ref":"Margaret Smith《Rabi'a the Mystic and Her Fellow-Saints in Islam》(1928)","lat":33,"lng":44},{"id":"phil_20","pool":"philosopher","poolLabel":"哲学家","name":"Im Yunjidang","cn":"任允之堂","era":"1721–1793","reg":"朝鲜","q":"朝鲜时代的女性不能上学、不能科举、不能做官。她在家自学成了一个比大多数男性学者都深刻的哲学家。","body":"本名任氏，\"允之堂\"是她的号。在朝鲜严格的性别等级社会中，她无法接受正式教育，靠哥哥的书和笔记自学性理学（朝鲜版新儒学）。她对人性论的理解在当时的学术圈极为罕见——她主张圣人的本性与普通人并无不同，人人皆可成圣，而这个\"人人\"包括女人。这在18世纪的朝鲜是一个真正激进的立场。她的著作直到20世纪才被学术界重新发现，现在被认为是朝鲜启蒙时期最重要的女性思想家。","ref":"相关研究收录于 Korean Women Philosophers 学术合集","lat":37.5,"lng":127},{"id":"phil_21","pool":"philosopher","poolLabel":"哲学家","name":"Nana Asma'u","cn":"娜娜·阿斯玛乌","era":"1793–1864","reg":"索科托哈里发国（今尼日利亚）","q":"19世纪西非最有影响力的女性知识分子。她用四种语言写诗，然后建了一个全由女教师组成的教育网络。","body":"索科托哈里发（西非最大伊斯兰政权）创始人的女儿。精通阿拉伯语、豪萨语、塔马切克语和富拉尼语，写了大量关于伊斯兰法学、历史和苏菲灵修的诗歌和散文。但她最重大的贡献是建立了\"yan taru\"——一个由受过训练的女教师组成的流动教育网络，深入农村为无法上学的女性提供教育。这个系统在她死后持续运作了几十年。在殖民时期\"非洲没有知识传统\"的叙事下，她的存在本身就是反驳。","ref":"Jean Boyd《The Caliph's Sister: Nana Asma'u, 1793-1865》(1989)","lat":10,"lng":7},{"id":"phil_22","pool":"philosopher","poolLabel":"哲学家","name":"Mary Whiton Calkins","cn":"玛丽·惠顿·卡尔金斯","era":"1863–1930","reg":"美国","q":"哈佛说她完成了博士所有要求但不能给她学位——因为她是女人。她成了美国心理学会和美国哲学学会的第一位女性主席。","body":"在哈佛跟随威廉·詹姆斯学习，完成了所有博士课程要求，论文答辩获得最高评价。但哈佛拒绝授予她博士学位——因为哈佛不录取女生（拉德克利夫学院后来提出给她一个\"替代学位\"，她拒绝了——\"那不是我读的学位\"）。没有博士学位的她，先后当选美国心理学会主席（1905年）和美国哲学学会主席（1918年）——两个学会历史上的第一位女性主席。她发明了配对联想法(paired-associate technique)，至今是记忆研究的基础工具。","ref":"Laurel Furumoto《Mary Whiton Calkins, 1863-1930》收录于《心理学史》","lat":39,"lng":-98},{"id":"phil_23","pool":"philosopher","poolLabel":"哲学家","name":"Genevieve Lloyd","cn":"珍妮维夫·劳埃德","era":"1941–","reg":"澳大利亚","q":"她问了一个让整个西方哲学传统心虚的问题：当哲学家们说\"理性\"的时候，他们说的是人类的理性，还是男性的理性？","body":"1984年出版《理性之人》，追溯了从古希腊到启蒙运动的哲学史，论证\"理性\"这个概念本身就是性别化的——不是因为女人不理性，而是因为\"理性\"的定义方式从一开始就把女性的认知方式排除在外了。柏拉图、笛卡尔、康德、黑格尔——每一个都在用\"理性\"的时候暗含了\"像男人那样思考\"。这本书不是在反对理性，而是在揭示：当我们说\"客观\"\"中立\"\"理性\"的时候，从来不是真的中立。这是澳大利亚女性主义哲学的奠基之作。","ref":"Genevieve Lloyd《The Man of Reason: \"Male\" and \"Female\" in Western Philosophy》(1984)","lat":-25,"lng":134},{"id":"phil_24","pool":"philosopher","poolLabel":"哲学家","name":"Eva Feder Kittay","cn":"伊娃·费德·基泰","era":"1946–","reg":"美国","q":"她的女儿有严重的认知障碍。这让她看到了整个西方政治哲学的盲区：它默认每个人都是独立自主的。","body":"哲学教授，女儿 Sesha 患有严重的认知障碍，终身需要照料。这段经历让她对罗尔斯式的正义理论产生了根本性质疑：自由主义哲学假设社会成员都是\"自由且平等的理性人\"——但那些无法独立、终身依赖他人照料的人呢？照料他们的人（通常是女性）呢？她提出\"依赖关系\"不是社会的边缘现象，而是人类生存的基本条件。每个人在生命的某个阶段都完全依赖他人——婴儿期、疾病中、衰老后。一个不承认依赖的正义理论，不是正义理论。","ref":"Eva Feder Kittay《Love's Labor: Essays on Women, Equality, and Dependency》(1999)","lat":39,"lng":-98},{"id":"phil_25","pool":"philosopher","poolLabel":"哲学家","name":"Anita Allen","cn":"安妮塔·艾伦","era":"1953–","reg":"美国","q":"美国哲学学会一百多年历史里的第一位黑人女性主席。","body":"法哲学教授，专攻隐私权、数据伦理和种族正义。她的研究揭示了\"隐私\"这个概念对不同群体意味着完全不同的东西——对白人中产来说隐私是一种权利，但对黑人女性来说隐私从来不存在：从奴隶制时代身体被公开检视，到现代社会中少数族裔社区被过度监控。2023年当选美国哲学学会主席——该学会成立一百多年来第一位非裔女性主席。她的存在本身就是一个哲学论证：当一个学科一百年来没有出现过你这种面孔的领导者，问题不在你身上。 *共计 25 张卡片。归入思想家 pool，与现有女性主义思想家卡片混合。*","ref":"Anita Allen《Unpopular Privacy: What Must We Hide?》(2011)","lat":39,"lng":-98}]},"business":{"label":"商业·经济·金融","cards":[{"id":"biz_01","pool":"business","poolLabel":"商业·经济·金融","name":"Joan Robinson","cn":"琼·罗宾逊","era":"1903–1983","reg":"英国","q":"她教出了两个诺贝尔奖得主。她自己被认为是\"最著名的没有获得诺贝尔奖的经济学家\"。","body":"1933年发明了\"买方垄断\"(monopsony)概念——跟垄断反过来，一个买家面对很多卖家。这个理论后来成了解释\"为什么女性工资比男性低\"的核心工具之一。她是凯恩斯的学生，帮他澄清了《通论》里很多连凯恩斯自己都没说清楚的东西。她在剑桥教了四十多年书，教出了阿马蒂亚·森和约瑟夫·斯蒂格利茨——两个诺贝尔奖得主。但她自己在剑桥直到丈夫退休那年才被提升为正教授。1975年她被广泛预测会拿诺贝尔奖，没有。被称为\"有史以来最著名的没有获得诺贝尔奖的经济学家\"。","ref":"Joan Robinson《The Economics of Imperfect Competition》(1933)","lat":52,"lng":-1},{"id":"biz_02","pool":"business","poolLabel":"商业·经济·金融","name":"Elinor Ostrom","cn":"埃莉诺·奥斯特罗姆","era":"1933–2012","reg":"美国","q":"经济学研究生院不收她——因为她是女人。后来她拿了诺贝尔经济学奖。","body":"在UCLA申请经济学研究生被拒，因为政治学系\"对录取女性持怀疑态度\"但还是给了她机会。她一辈子研究的问题是：公共资源（水、森林、渔场）真的会像教科书说的那样必然被过度消耗吗？她跑遍了全世界的村庄和渔村做田野调查，发现很多社区在没有政府和市场介入的情况下自己发明了管理规则——\"公地悲剧\"不是宿命。2009年成为第一个获得诺贝尔经济学奖的女性。消息传出时，很多经济学家的反应是\"她是谁？\"——因为她的系在政治学，不在经济学。她在比弗利山庄高中是\"富人学校里的穷孩子\"，父母都没上过大学。","ref":"Elinor Ostrom《Governing the Commons》(1990)","lat":39,"lng":-98},{"id":"biz_03","pool":"business","poolLabel":"商业·经济·金融","name":"Esther Duflo","cn":"埃斯特·迪弗洛","era":"1972–","reg":"法国/美国","q":"她说：我们不知道怎么消灭贫困，但我们可以像做临床试验一样，一个问题一个问题地测试。","body":"把医学里的随机对照实验(RCT)搬进了发展经济学——不是坐在办公室里建模型，是去印度和非洲的村子里，把人随机分成两组，一组给干预一组不给，然后看数据。教科书发蚊帐能防疟疾，但免费发还是收一点钱？测一下。给老师发奖金能提高教学质量吗？测一下。2019年获诺贝尔经济学奖，46岁，是最年轻的经济学诺奖得主，也是第二位获奖的女性。她和丈夫Abhijit Banerjee一起获奖——他们在研究中相爱，后来结了婚。","ref":"Esther Duflo & Abhijit Banerjee《Poor Economics》(2011)","lat":47,"lng":2},{"id":"biz_04","pool":"business","poolLabel":"商业·经济·金融","name":"Claudia Goldin","cn":"克劳迪娅·戈尔丁","era":"1946–","reg":"美国","q":"为了回答\"女性工资为什么比男性低\"这个问题，她往回挖了200年的数据。","body":"2023年诺贝尔经济学奖，独自获奖——历史上第一个独得经济学诺奖的女性（之前两位都是跟男性合得）。她是哈佛经济系第一位女性终身教授。她研究的核心问题听起来简单：女人为什么挣得比男人少？但她不满足于\"性别歧视\"这个笼统的答案。她挖了200年的美国劳动力市场数据，发现答案在不同时代是不同的——避孕药的发明、教育扩张、\"贪婪的工作\"(greedy work)结构——每一代女性面对的障碍都不一样。她说做研究的秘诀是\"你必须对答案有真正的渴望\"。","ref":"Claudia Goldin《Career and Family: Women's Century-Long Journey toward Equity》(2021)","lat":39,"lng":-98},{"id":"biz_05","pool":"business","poolLabel":"商业·经济·金融","name":"Susan Athey","cn":"苏珊·阿西","era":"1970–","reg":"美国","q":"第一个获得John Bates Clark Medal的女性——那个奖被叫做经济学界的\"小诺奖\"。","body":"2007年获得克拉克奖（授予40岁以下最杰出的美国经济学家），是第一位女性得主。她的研究横跨拍卖理论、产业组织、数字经济和机器学习在经济学中的应用——是把AI引入经济学分析的先驱之一。后来去了斯坦福商学院，同时担任微软首席经济学家。在一个\"数学男孩俱乐部\"气质浓厚的领域里，她用纯粹的技术能力打开了门，然后把门撑着不让它关上。","ref":"Susan Athey 关于数字市场和机器学习的系列论文","lat":39,"lng":-98},{"id":"biz_06","pool":"business","poolLabel":"商业·经济·金融","name":"Janet Yellen","cn":"珍妮特·耶伦","era":"1946–","reg":"美国","q":"她一个人集齐了美国经济政策的三大顶位。每一个都是\"第一位女性\"。","body":"白宫经济顾问委员会主席、美联储主席、财政部长——美国经济政策最高权力的三把椅子，她坐了个遍，每一次都是第一位女性。2014年执掌美联储时，全球金融市场的每一次心跳都跟她的措辞有关。她的学术研究关注效率工资和劳动力市场——用人话说就是\"为什么老板不愿意降工资即使经济不好\"。在一个以鹰派男性为传统形象的央行世界里，她的风格是数据驱动、谨慎、不张扬——但没有人敢小看她说出的每一个字。","ref":"美联储主席任期 (2014–2018)","lat":39,"lng":-98},{"id":"biz_07","pool":"business","poolLabel":"商业·经济·金融","name":"Christine Lagarde","cn":"克里斯蒂娜·拉加德","era":"1956–","reg":"法国","q":"IMF第一位女总裁。然后是欧洲央行第一位女行长。她的职业生涯就是一连串的\"第一个\"。","body":"律师出身，做到了全球律师事务所Baker McKenzie的第一位女性主席。2007年成为法国第一位女性财政部长——接手时正赶上全球金融危机。2011年接任IMF总裁，是第一位女性。2019年又成为欧洲央行第一位女行长。每一步都是在一个从未有女性到达过的位置上坐下来，然后让那个位置看起来理所当然。她说：\"如果是雷曼姐妹而不是雷曼兄弟，金融危机可能不会发生。\"","ref":"IMF总裁任期 (2011–2019)；ECB行长 (2019–)","lat":47,"lng":2},{"id":"biz_08","pool":"business","poolLabel":"商业·经济·金融","name":"Abigail Johnson","cn":"阿比盖尔·约翰逊","era":"1961–","reg":"美国","q":"她掌管着4.5万亿美元。你的退休金大概率有一部分在她手上。","body":"富达投资(Fidelity Investments)董事长兼CEO，掌管超过4.5万亿美元资产——全球最大的资产管理公司之一。她是家族第三代，但不是简单的\"继承\"——她从客服电话接线开始做起，做过分析师、基金经理、零售业务总裁。2014年从父亲手中接过CEO时，华尔街不乏质疑声。她做的第一件事之一是把富达推进了加密货币领域——在大多数传统金融机构还在观望的时候。在一个由西装革履的男性主导的资管世界里，她是安静的那一种权力。","ref":"Fidelity Investments CEO (2014–)","lat":39,"lng":-98},{"id":"biz_09","pool":"business","poolLabel":"商业·经济·金融","name":"Ruth Porat","cn":"露丝·波拉特","era":"1957–","reg":"美国","q":"从摩根士丹利CFO到Google CFO——华尔街到硅谷最高阶的女性路径之一。","body":"在摩根士丹利工作了27年，一路做到CFO和执行副总裁。2008年金融危机期间她是摩根士丹利的关键决策者之一——在雷曼倒闭、整个华尔街摇摇欲坠的那几天里。2015年跳到Google担任CFO，后来管整个Alphabet的财务和投资。她在两个完全不同的世界（传统金融和科技）都做到了最高层的女性——这条路径本身就说明了某种突破。","ref":"Alphabet/Google CFO & President (2015–)","lat":39,"lng":-98},{"id":"biz_10","pool":"business","poolLabel":"商业·经济·金融","name":"","cn":"董明珠","era":"1954–","reg":"中国","q":"36岁丧夫，带着儿子南下打工。从格力的基层销售做到董事长，把一家空调厂做成了世界500强。","body":"1990年，36岁的董明珠丧夫后离开南京，带着年幼的儿子去了珠海，进入格力做基层销售。不到三年，她一个人的销售额占了整个公司的八分之一。之后一路做到总经理、董事长，把格力从一个区域空调品牌做成世界500强。她的管理风格极其强硬——\"走过的路不长草\"。她公开跟雷军打十亿赌约，在直播间亲自卖货，跟经销商翻脸。外界对她的评价永远两极：铁腕企业家或者独裁者。但没人能否认，在中国制造业这个男性主导到骨子里的行业，她是唯一一个公众叫得出名字的女性面孔。","ref":"格力电器发展史","lat":35,"lng":105},{"id":"biz_11","pool":"business","poolLabel":"商业·经济·金融","name":"","cn":"张欣","era":"1965–","reg":"中国","q":"天津纺织厂女工→香港打工→剑桥硕士→SOHO中国联合创始人。","body":"14岁在天津工厂做女工，后来去了香港边打工边读书。拿到剑桥大学发展经济学硕士后进入华尔街，在高盛和旅行者集团工作。1995年与潘石屹结婚，共同创立SOHO中国，把北京和上海的天际线改写了一部分——望京SOHO、银河SOHO、外滩SOHO都是她的项目。她的人生轨迹本身就是一个关于\"阶层流动到底可不可能\"的案例研究。","ref":"SOHO中国发展史","lat":35,"lng":105},{"id":"biz_12","pool":"business","poolLabel":"商业·经济·金融","name":"","cn":"周群飞","era":"1970–","reg":"中国","q":"初中辍学，在工厂流水线上打工。后来她创办的公司，给全世界一半的手机做屏幕玻璃。","body":"出生在湖南湘乡农村，父亲残疾，母亲早逝。初中没读完就去了深圳打工，在一家手表玻璃加工厂流水线上干活。1993年用借来的两万块钱创办了自己的玻璃加工作坊。2003年进入手机屏幕领域，赶上了智能手机爆发——蓝思科技成为苹果、三星、华为的核心供应商。2015年蓝思科技上市，她成为中国最富有的白手起家女性。从流水线工人到全球手机屏幕玻璃龙头——这个跨越的距离，比任何商学院案例都远。","ref":"蓝思科技 (Lens Technology) 发展史","lat":35,"lng":105},{"id":"biz_13","pool":"business","poolLabel":"商业·经济·金融","name":"Kiran Mazumdar-Shaw","cn":"基兰·马祖达-肖","era":"1953–","reg":"印度","q":"想当酿酒师，印度没有啤酒厂愿意雇女人。于是她去创办了一家生物制药公司。","body":"在澳大利亚学了酿酒学，满怀热情回到印度——没有一家啤酒厂愿意雇一个女酿酒师。1978年在自家车库里创办了Biocon，从酶制剂做起，慢慢转型为生物制药。现在Biocon是印度最大的生物制药公司之一，她是印度最富有的白手起家女性。她的公司专注于让胰岛素和抗癌药物变得更便宜——不是做奢侈品生意，是做穷人也用得起的药。从啤酒到胰岛素，中间只隔了一个\"没人要她\"的拐点。","ref":"Biocon 发展史","lat":22,"lng":78},{"id":"biz_14","pool":"business","poolLabel":"商业·经济·金融","name":"Ho Ching","cn":"何晶","era":"1953–","reg":"新加坡","q":"掌管新加坡主权财富基金淡马锡17年。是的，她也是李显龙的妻子，但那不是她坐上那把椅子的原因。","body":"新加坡国防部工程师出身，在多家国防科技企业任高管后，2004年出任淡马锡控股CEO——新加坡最重要的主权财富基金，管理资产超过3000亿美元。她在任17年间把淡马锡从一个保守的政府投资机构转型为全球最活跃的主权基金之一，大举投资中国、印度和东南亚的科技和消费行业。外界永远绕不过她是李显龙妻子这个身份，但看过她的履历和淡马锡在她任期内的回报数据，质疑就安静了。2021年卸任时淡马锡的年化回报率是14%。","ref":"淡马锡控股 (Temasek Holdings) 年报","lat":1.35,"lng":103.8},{"id":"biz_15","pool":"business","poolLabel":"商业·经济·金融","name":"Sri Mulyani Indrawati","cn":"斯里·穆利亚尼","era":"1962–","reg":"印度尼西亚","q":"世界银行常务副行长。回国后继续当财政部长。《Forbes》评她为亚洲最有权力的女性之一。","body":"印尼经济学家，伊利诺伊大学经济学博士。2005年成为印尼财政部长，推动了一系列反腐败和税收改革——在一个以\"潜规则\"著称的行政体系里得罪了太多人。2010年被推荐去世界银行担任常务副行长，离开了国内政治的漩涡。2016年被总统佐科请回来再次出任财政部长，带领印尼经济度过了新冠疫情的冲击。在东南亚的政治生态里，一个女性经济学家能两次坐上财政部长的位置，本身就是一个需要解释的现象。","ref":"世界银行常务副行长任期 (2010–2016)","lat":-2,"lng":118},{"id":"biz_16","pool":"business","poolLabel":"商业·经济·金融","name":"Tomoko Namba","cn":"南场智子","era":"1962–","reg":"日本","q":"在日本互联网产业几乎没有女性创始人的时代，她创办了DeNA。","body":"麦肯锡出身，1999年在日本互联网泡沫期间创办了DeNA——从移动拍卖平台做起，后来转型为游戏和电商巨头。在日本商界，女性创业者本身就极其罕见——更不用说做到上市公司CEO。她后来成为日本经济团体联合会（经团联）副会长，是这个由老年男性主导的日本商业权力核心里极少数的女性面孔。她说：\"在日本，女性创业者最大的障碍不是资金，是'为什么你不回去结婚'这个问题。\"","ref":"DeNA 发展史","lat":36,"lng":138},{"id":"biz_17","pool":"business","poolLabel":"商业·经济·金融","name":"Madam C.J. Walker","cn":"沃克夫人","era":"1867–1919","reg":"美国","q":"父母是刚获得自由的奴隶。她成为美国历史上第一位白手起家的女性百万富翁。","body":"出生时名叫Sarah Breedlove，父母是路易斯安那的前奴隶。7岁成为孤儿，14岁结婚逃离虐待她的姐夫，20岁丧夫，带着女儿在密西西比河边的洗衣房里做工。因为长期用碱性肥皂洗衣导致脱发，她开始自己研发护发产品。从挨家挨户推销到建立全国性的销售网络——她培训了数千名黑人女性成为销售代理，给了她们经济独立的机会。1910年代她已经是百万富翁，同时大量捐赠给黑人教育机构和反私刑运动。她证明了一件事：在所有障碍都叠加在一起的时候（黑人、女性、贫困、孤儿），一个人仍然可以创造出路——并且把路修宽让别人也能走。","ref":"A'Lelia Bundles《On Her Own Ground: The Life and Times of Madam C.J. Walker》(2001)","lat":39,"lng":-98},{"id":"biz_18","pool":"business","poolLabel":"商业·经济·金融","name":"Coco Chanel","cn":"可可·香奈儿","era":"1883–1971","reg":"法国","q":"她从孤儿院里走出来，然后改变了全世界女人穿衣服的方式。","body":"6岁母亲去世，父亲把她和姐姐送进了修道院孤儿院。在那里她学会了缝纫。20多岁在咖啡馆唱歌时得到了\"Coco\"这个绰号。她的设计哲学是把女人从紧身胸衣和繁复装饰里解放出来——小黑裙、斜纹软呢套装、假珠宝首饰，这些现在看起来理所当然的东西在1920年代是对整个时尚体系的颠覆。她说\"奢华的反面不是贫穷，是庸俗。\"但她的人生也有无法忽视的暗面：二战期间她与德国军官有亲密关系，并试图利用纳粹的\"雅利安化\"政策夺回被犹太合伙人持有的香水业务。伟大和卑劣可以住在同一个人身上。","ref":"Hal Vaughan《Sleeping with the Enemy: Coco Chanel's Secret War》(2011)","lat":47,"lng":2},{"id":"biz_19","pool":"business","poolLabel":"商业·经济·金融","name":"Estée Lauder","cn":"雅诗·兰黛","era":"1906–2004","reg":"美国","q":"她在酒店大堂拦住陌生女人往她们脸上抹面霜。这个策略后来被叫做\"试用装营销\"。","body":"匈牙利犹太移民家庭，在纽约皇后区长大。叔叔是一个业余化学家，在厨房里调配护肤品。她把叔叔的配方商业化——不是靠广告（她买不起），而是靠在美容院和酒店大堂拦住女人，直接往她们脸上抹产品。\"试用一下，如果你不喜欢，就当我请你做了一次美容。\"这个\"先试后买\"的策略后来被写进了所有市场营销教科书。1946年创办雅诗兰黛公司，从一个产品一个柜台开始，做成了全球最大的化妆品集团之一。她是有记录以来白手起家最成功的女性企业家之一。","ref":"Estée Lauder《Estée: A Success Story》(1985)","lat":39,"lng":-98},{"id":"biz_20","pool":"business","poolLabel":"商业·经济·金融","name":"Oprah Winfrey","cn":"奥普拉·温弗瑞","era":"1954–","reg":"美国","q":"出生在密西西比的贫民窟，9岁被性侵，14岁怀孕（孩子早夭）。后来她建了一个媒体帝国。","body":"童年在密西西比农村由外祖母抚养，后来搬到密尔沃基跟母亲住——在那里遭受了多年的性虐待。14岁怀孕，孩子出生后夭折。19岁成为纳什维尔最年轻的电视新闻主播，也是第一位黑人女主播。1986年开始做《奥普拉秀》，成为美国电视史上最成功的脱口秀。但她不只是一个主持人——她的读书俱乐部能让一本默默无闻的书在一周内卖出百万册，她的推荐能让一个人的人生改变方向。2003年成为第一位进入《福布斯》亿万富翁榜的非裔美国女性。从\"被侮辱的人\"到\"有能力改变别人命运的人\"，中间是四十年的不放弃。 *共计 20 张卡片。经济学家5张 + 金融/央行4张 + 亚洲商界7张 + 经典先驱4张。亚洲与非亚洲比例约 7:13。*","ref":"Kitty Kelley《Oprah: A Biography》(2010)","lat":39,"lng":-98}]},"architecture":{"label":"建筑与设计","cards":[{"id":"arch_01","pool":"architecture","poolLabel":"建筑与设计","name":"Zaha Hadid","cn":"扎哈·哈迪德","era":"1950–2016","reg":"伊拉克/英国","q":"她赢了同一场比赛三次。他们还是没让她建。","body":"1994年，Cardiff Bay歌剧院国际设计竞赛，268份参赛方案，Zaha Hadid的\"水晶项链\"拿下冠军。评委会随即质疑可行性，她证明了可以建、可以控制预算。评委会史无前例地重开半决赛，让她和两个更有名的男建筑师重新比。她又赢了。第三轮，还是她。但资金最终被撤回，歌剧院没有建成。她说她遇到的是\"prejudice\"——一个伊拉克女人、一个外来者、一个设计太激进的人。十几年后，被Cardiff拒绝的那套方案落地广州，建成了广州歌剧院。《纽约时报》称它是\"数十年来世界上最迷人的歌剧院\"。2004年她成为Pritzker奖历史上第一位女性获奖者，没有一个记者忘了提她的性别。媒体说她\"headstrong\"\"diva\"——这些词从来没有被用在她的男同行身上。","ref":"Despina Stratigakos《Where Are the Women Architects?》(2016)","lat":52,"lng":-1},{"id":"arch_02","pool":"architecture","poolLabel":"建筑与设计","name":"","cn":"林徽因","era":"1904–1955","reg":"中国","q":"1924年，宾大建筑系不收女生。她宁可不要学位，也要学最好的建筑。","body":"林徽因出国前一年就知道宾夕法尼亚大学建筑系不招女生——理由是有人体写生课、有通宵画图，\"无人陪伴的女孩在场不相宜\"。父亲林长民托中国驻美使馆交涉，被拒。她没有转去其他收女生的学校，而是注册美术系、旁听建筑系全部课程——宾大有当时全美最好的建筑教育，她要学最顶尖的东西，学位不要了。毕业后和梁思成回国，15年间跑了15个省、190个县，测绘2738处古建筑。1937年在山西五台山发现佛光寺——当时中国已知最古老的木构建筑，日本学者此前断言中国不存在唐代木结构，她和梁思成推翻了这个定论。抗战逃难中他们丢弃了几乎所有家当，唯独把数以千计的古建筑照片和测绘手稿紧紧抱在胸前，一张没丢。她参与设计了国徽和人民英雄纪念碑花环图案，1955年病逝。梁思成在她墓碑上只刻了六个字：\"建筑师林徽因墓\"。2024年，宾大补发了迟到97年的建筑学学士学位证书，毕业年份写着\"1927\"。","ref":"费慰梅《梁思成与林徽因》；宾大追授学位新闻 (2024)","lat":35,"lng":105},{"id":"arch_03","pool":"architecture","poolLabel":"建筑与设计","name":"Ray Eames","cn":"蕾·伊姆斯","era":"1912–1988","reg":"美国","q":"Charles说：\"我能做的任何事，她都能做得更好。\"可IBM打电话来，永远只找Charles。","body":"全世界最著名的一把椅子——Eames Lounge Chair——你以为是Charles Eames设计的。事实上，Ray是那个决定了\"Eames美学\"的人：色彩、质感、形式感、那种让工业产品变得有温度的东西，全是她的手笔。Charles自己说\"anything I can do, she can do better\"，每次上电视都强调她是equal partner。但战后的美国不是这么运作的——当IBM或Polaroid的白人男性高管打电话来，他们只问Charles在不在。Ray在Charles的光环下工作了近四十年。1978年Charles去世后，她终于能以自己的名义修正那些错误的署名——把\"Charles Eames\"改成\"Charles and Ray Eames\"。Eames Office在她1988年去世后永久关闭。她生前被严重低估，死后才逐渐获得应有的认可。Vitra在她百岁诞辰时将一条街命名为\"Ray-Eames-Strasse\"——迟到了几十年的门牌号。","ref":"纪录片《Eames: The Architect & The Painter》(2011)；Eames Institute \"Ray's Hand\"线上展览","lat":39,"lng":-98},{"id":"arch_04","pool":"architecture","poolLabel":"建筑与设计","name":"Eileen Gray","cn":"艾琳·格雷","era":"1878–1976","reg":"爱尔兰/法国","q":"她设计了一栋房子。Le Corbusier在墙上画满了裸女。","body":"E-1027——连名字都是一封密码情书：E代表Eileen，10代表J（字母表第10位，恋人Jean Badovici的首字母），2代表B，7代表G。1929年建成于法国南部海岸，不到150平米，每一处功能和美学都经过精密计算。这是现代主义建筑史上最早的杰作之一，出自一个自学成才的爱尔兰女人之手。然后Le Corbusier来了。他对E-1027着了迷——也许是嫉妒一个\"局外人\"、一个女人，设计出了这样的东西。1938到1939年，他未经Gray许可，在那些纯白墙面上画了八幅巨大的、带有性暗示的壁画。建筑评论家Rowan Moore说这像一条狗在别人的领地上撒尿。Gray称之为\"vandalism\"。Le Corbusier此后在自己的写作中不断淡化Gray对E-1027的设计贡献。他甚至在房子旁边给自己盖了一间小木屋，最后在附近游泳时溺亡。而Gray选择了沉默和退隐，直到1968年才被重新发现。她的Bibendum椅和E-1027茶几如今是设计史经典。那栋房子后来的命运更加离奇——后来的屋主在里面搞毒品派对，1996年被人在客厅里谋杀。","ref":"纪录片《E.1027 – Eileen Gray and the House by the Sea》；电影《The Price of Desire》","lat":47,"lng":2},{"id":"arch_05","pool":"architecture","poolLabel":"建筑与设计","name":"Charlotte Perriand","cn":"夏洛特·贝里安","era":"1903–1999","reg":"法国","q":"我们这里不绣靠垫。\"Le Corbusier把24岁的她轰出了工作室。","body":"1927年10月的一个下午，24岁的Charlotte Perriand抱着作品集走进Le Corbusier在Rue de Sèvres的工作室。他翻了翻她的图纸，说出了建筑史上最著名的一句性别歧视：\"Ici, on ne brode pas des coussins\"——我们这里不绣靠垫。然后把她请出了门。几个月后，Perriand在秋季沙龙展出了\"阁楼酒吧\"——全金属、全玻璃、纯粹的机器美学。Le Corbusier看完展览，立刻雇了她。没有薪水。之后的十年，她和Le Corbusier、Pierre Jeanneret三人合作设计了那些如今被视为\"Le Corbusier经典\"的家具：LC4躺椅、Grand Confort扶手椅、Basculant椅。署名是三个人的，但在公众印象里，那些椅子属于Le Corbusier。Perriand一直工作到96岁。她信奉\"l'art de vivre\"——生活的艺术不是靠财富，是靠与环境和谐共处。她用一辈子证明了一件事：她从来就不是在绣靠垫。","ref":"Fondation Louis Vuitton \"Charlotte Perriand: Inventing a New World\" 回顾展 (2019)","lat":47,"lng":2},{"id":"arch_06","pool":"architecture","poolLabel":"建筑与设计","name":"Lina Bo Bardi","cn":"丽娜·博·巴迪","era":"1914–1992","reg":"意大利/巴西","q":"我是斯大林主义者，是militant，是反女权主义者。\"然后她建了巴西最具女性主义气质的建筑。","body":"圣保罗艺术博物馆（MASP）悬浮在大街上方——一个巨大的玻璃体被四根猩红色混凝土柱撑起来，底下是城市最繁忙的人行道。1968年开馆时，Lina Bo Bardi在里面用透明亚克力画架展示画作，没有墙，观众可以自由穿行，打破了传统博物馆的等级秩序。开馆展她策划的不是欧洲大师，而是《巴西人民之手》——来自穷乡僻壤的匿名手工艺品。这一切发生在军事独裁时期。Bo Bardi公开声称自己\"anti-feminist\"——她的马克思主义不认同西方女权运动的\"资产阶级\"倾向。但她的建筑实践比任何宣言都激进：她把美术馆变成广场，把旧工厂变成社区中心（SESC Pompéia），把\"高雅\"和\"民间\"的界限彻底拆掉。她说自己做的是\"穷人的建筑\"，可她自己住在一栋漂亮的玻璃房子里——这个矛盾，她从来没有解释过。","ref":"Zeuler R. M. de A. Lima《Lina Bo Bardi》传记","lat":-23.5,"lng":-46.6},{"id":"arch_07","pool":"architecture","poolLabel":"建筑与设计","name":"Kazuyo Sejima","cn":"妹岛和世","era":"1956–","reg":"日本","q":"建筑界最安静的普利兹克奖得主。必须两个人一起面对媒体时，说话的大多是男搭档。","body":"妹岛和世话不多，烟瘾不小。接受采访时第一件事是问能不能抽烟。当SANAA——她和西泽立卫共同创立的事务所——必须以二人姿态面对媒体时，开口的几乎总是年轻的西泽立卫。2010年SANAA获得普利兹克奖，她是继Zaha Hadid之后第二位获此殊荣的女性建筑师。她的建筑和她本人一样：最少的材料、最少的细节、最大的透明。金泽21世纪美术馆是一个没有正面和背面的圆形建筑，从任何方向都可以进入——她拒绝建筑的等级感。高中时她在杂志上看到菊竹清训的\"空中住宅\"，从此想做建筑师。从日本女子大学毕业后进入伊东丰雄事务所，八年后独立。获奖后很多建筑师开始接大项目，她依然保持一年只做一个项目的节奏——保持真我，不为环境所动。这就是\"妹岛风格\"。","ref":"SANAA金泽21世纪美术馆；卢浮宫朗斯分馆 (2012)","lat":36,"lng":138},{"id":"arch_08","pool":"architecture","poolLabel":"建筑与设计","name":"Norma Merrick Sklarek","cn":"诺玛·梅里克·斯克拉瑞克","era":"1926–2012","reg":"美国","q":"据我所知，我是加州第一位也是唯一一位黑人女建筑师。我对此并不骄傲——我为造成这种荒唐特殊性的制度感到羞耻。","body":"从哥伦比亚大学建筑系毕业后，Norma Merrick Sklarek向19家建筑事务所投了简历，全部被拒。\"他们不雇女人，也不雇非裔美国人，我不知道是哪个原因在起作用。\"她去了纽约市公共工程部做绘图员，觉得自己的才能被浪费了，于是报考了令人闻风丧胆的四天制纽约州建筑师执照考试——一次通过，成为纽约州第一位黑人女性持照建筑师。之后是加州第一位，AIA第一位黑人女性会员，第一位黑人女性Fellow。她主导了洛杉矶国际机场一号航站楼、美国驻东京大使馆、太平洋设计中心等大型项目。但每次自我介绍为项目负责人时，客户的眼神里总是怀疑。1985年她联合创立了美国第一家女性拥有的建筑事务所。被称为\"建筑界的Rosa Parks\"，但她更想被记住的是：她是一个好建筑师，不是一个好的\"黑人女建筑师\"。","ref":"Columbia Magazine \"How Norma Merrick Sklarek Paved the Way for Black Women Architects\" (2024)","lat":39,"lng":-98},{"id":"arch_09","pool":"architecture","poolLabel":"建筑与设计","name":"Denise Scott Brown","cn":"丹尼斯·斯科特·布朗","era":"1931–","reg":"赞比亚/美国","q":"丈夫说：\"Denise Scott Brown是我的灵感来源和平等的合作伙伴。\"普利兹克奖评委会说：不关我们的事。","body":"1991年，Robert Venturi获得普利兹克建筑奖。他和Denise Scott Brown共同经营事务所已经22年，共同写了改变建筑史的《Learning from Las Vegas》，共同定义了后现代主义建筑理论。但奖只给了他一个人。Venturi想拒绝，Scott Brown说家里经济状况不允许放弃10万美元奖金。于是她抵制了颁奖典礼，他独自上台领奖。2013年，哈佛GSD的两个女学生发起请愿，要求普利兹克追认Scott Brown为共同获奖者。17000人签名，包括Rem Koolhaas、Zaha Hadid、Richard Meier，以及Venturi本人——他只写了一句话：\"Denise Scott Brown is my inspiring and equal partner。\"评委会主席回复：后来的评审团不能推翻前一届的决定。Scott Brown说：\"他们不欠我一个普利兹克奖，他们欠我一个普利兹克inclusion ceremony。\"她的那篇1989年的文章《Room at the Top? Sexism and the Star System in Architecture》至今仍是建筑界性别议题的必读文本。","ref":"Denise Scott Brown \"Room at the Top? Sexism and the Star System in Architecture\" (1989)；《Learning from Las Vegas》(1972)","lat":39,"lng":-98}]},"math_cs":{"label":"数学与计算机","cards":[{"id":"math_01","pool":"math_cs","poolLabel":"数学与计算机","name":"Ada Lovelace","cn":"埃达·洛夫莱斯","era":"1815–1852","reg":"英国","q":"分析机编织代数图案，正如提花织机编织花朵与枝叶。","body":"她是拜伦的女儿。母亲害怕她继承父亲的\"疯狂\"，用数学和法语把诗歌从她的教育里挤出去。结果这个女孩在数学里找到了比诗歌更宏大的想象力。1843年，Ada为Charles Babbage设想中的分析机撰写了一篇论文附注，其中\"Note G\"详细描述了一套计算伯努利数的程序——世界上第一段计算机程序。论文署名只用了首字母缩写A.A.L.，66页中有41页是她的原创注释。更惊人的是她的预见力：她写道这台机器\"没有能力创造任何东西\"，它只能执行人类已经知道如何命令它去做的事。这段话后来被Alan Turing称为\"Lady Lovelace's Objection\"，成为人工智能哲学的起点。那台分析机从未被建成。她36岁死于子宫癌。每年十月的第二个星期二是\"Ada Lovelace Day\"，纪念STEM领域的女性贡献。","ref":"Stephen Wolfram \"Untangling the Tale of Ada Lovelace\" (2015)","lat":52,"lng":-1},{"id":"math_02","pool":"math_cs","poolLabel":"数学与计算机","name":"Sophie Germain","cn":"索菲·热尔曼","era":"1776–1831","reg":"法国","q":"父母没收了她的灯、她的火、甚至她的衣服，想逼她不要半夜偷偷学数学。没用。","body":"法国大革命期间，13岁的Sophie Germain读到阿基米德的故事——这位数学家沉迷几何到没注意入侵的罗马士兵，被当场杀死。能让人忘记死亡的学问是什么？她决定去找答案。父母发现她半夜偷偷点蜡烛学数学，没收了灯火和衣服，逼她躺在黑暗里。她裹着毯子继续算。1794年巴黎综合理工学院开放，只收男生。18岁的Germain拿到了一个已退学男生\"Monsieur LeBlanc\"的讲义，以他的名义提交作业。Lagrange看完惊为天人，约\"LeBlanc\"见面，才发现对方是个姑娘——非但没生气，反而成了她的导师。后来她用同一个假名给高斯写信讨论数论，被发现后高斯写道：\"一个女人能克服我们的习俗和偏见所设置的重重障碍去深入这门科学最晦涩的问题，她必定拥有最高贵的勇气和非凡的天赋。\"她的弹性理论后来被用于建造埃菲尔铁塔——但铁塔上镌刻的72位科学家名字里，没有她。","ref":"Massive Science \"Meet Sophie Germain, the amateur mathematician who worked on number theory's toughest problem\" (2021)","lat":47,"lng":2},{"id":"math_03","pool":"math_cs","poolLabel":"数学与计算机","name":"Emmy Noether","cn":"埃米·诺特","era":"1882–1935","reg":"德国","q":"我不认为候选人的性别是反对她任教的理由。毕竟，我们是大学，不是澡堂。","body":"1915年，哥廷根大学的David Hilbert和Felix Klein请Emmy Noether来帮忙解决爱因斯坦广义相对论中的一个数学难题。她来了，用大约十五分钟解决了。然后Hilbert想给她一个教职，哲学系和历史系的教授们反对：\"士兵们从前线回来，发现自己要跪在一个女人脚下学习，他们会怎么想？\"Hilbert的回应成了科学史上最著名的一句话。但他还是输了——Noether只能以\"客座讲师\"身份，挂在Hilbert名下授课，不拿一分钱薪水。就这样干了四年。她的\"Noether定理\"揭示了物理学中对称性与守恒定律的根本联系——没有它，现代粒子物理学不存在。她自由地把自己的想法分享给学生和同事，常常让别人去发表自己的成果。1933年纳粹上台，她被开除，流亡美国，两年后因手术并发症去世。爱因斯坦在讣告中写道：她是\"自女性开始接受高等教育以来，最具创造力的数学天才\"。","ref":"Lee Phillips《Einstein's Tutor》(2024)","lat":51,"lng":10},{"id":"math_04","pool":"math_cs","poolLabel":"数学与计算机","name":"","cn":"王贞仪","era":"1768–1797","reg":"中国（清代）","q":"在自家院子里用圆桌当地球、灯当太阳、圆镜当月亮，独自推演出月食原理。","body":"清代女学者，祖父是前朝官员和藏书家。她11岁随祖母去吉林，在塞北学会了骑马射箭。祖父死后留下七十多柜藏书，她全部读完。25岁时写出《月食解》，用生活物品搭建模型验证月食的成因——在没有望远镜、没有天文台的条件下，一个人在院子里用实验方法得出正确结论。她还撰文批驳\"女子无才便是德\"，写道\"始信须眉等巾帼，谁言儿女不英雄\"。同时代的欧洲女性也被拒于大学门外，但至少有沙龙文化可以交流思想——清代的王贞仪连这个也没有。她29岁病逝，大量手稿散佚。国际天文学联合会以她的名字命名了金星上的一个陨石坑。","ref":"《畴人传》（阮元）；Nature \"Forgotten heroines of science\" 专题","lat":35,"lng":105},{"id":"math_05","pool":"math_cs","poolLabel":"数学与计算机","name":"Grace Hopper","cn":"格蕾丝·霍珀","era":"1906–1992","reg":"美国","q":"她从电脑里拔出一只蛾子，从此全世界管程序错误叫\"bug\"。","body":"1947年，Harvard Mark II出了故障。团队排查后发现一只飞蛾卡在继电器触点之间，被取出来贴在工作日志上，旁注\"First actual case of bug being found\"。Grace Hopper逢人就讲这个故事——\"bug\"和\"debugging\"成了计算机科学的永久术语。但这不是她最大的贡献。Hopper在1952年发明了世界上第一个编译器（A-0），把人类能读懂的语言翻译成机器指令——她说完这个想法，同事们说\"计算机只能做算术，不能理解英语\"。她不理他们，继续做，后来又推动了COBOL语言的诞生。COBOL至今仍在运行全球金融系统和政府基础设施。她退役时是美国海军准将，79岁，是当时美国军队中最年长的现役军官。她最著名的人生哲学是：\"先做了再请求原谅，比请求允许容易得多。\"","ref":"纪录片《Born with Curiosity》（筹备中）；年度Grace Hopper Celebration技术大会","lat":39,"lng":-98},{"id":"math_06","pool":"math_cs","poolLabel":"数学与计算机","name":"Katherine Johnson","cn":"凯瑟琳·约翰逊","era":"1918–2020","reg":"美国","q":"宇航员John Glenn拒绝起飞，除非\"让那个女孩验算一下数字\"。","body":"1962年，美国准备把John Glenn送入地球轨道。NASA已经用IBM电子计算机算好了轨道参数，但Glenn不信任机器。他说：叫Katherine Johnson用手算一遍，她说OK我才上去。Johnson在种族隔离时代的NASA工作——洗手间、食堂、办公区全部按肤色分开。她最初被分配到\"有色人种计算组\"（West Area Computers），做的是被男性工程师认为\"不需要署名\"的基础运算。但她拒绝待在那个位置。她主动要求参加技术简报会——\"没有规定说女人不能参加\"——成为第一个参会的黑人女性。她为水星计划、阿波罗计划和航天飞机项目计算了飞行轨道，与人合著了26篇科学论文。2015年获颁总统自由勋章，2016年她的故事被写成《Hidden Figures》，同年改编电影上映时她已经98岁。","ref":"Margot Lee Shetterly《Hidden Figures》(2016)；同名电影","lat":39,"lng":-98},{"id":"math_07","pool":"math_cs","poolLabel":"数学与计算机","name":"Dorothy Vaughan","cn":"多萝西·沃恩","era":"1910–2008","reg":"美国","q":"当电子计算机来取代\"人肉计算机\"时，她没有等着被淘汰——她自学了FORTRAN，然后教会了整个团队。","body":"Dorothy Vaughan是Katherine Johnson的上司，NASA第一位黑人女性主管。1940年代起她领导\"西区计算组\"——一群在种族隔离制度下被单独安置的黑人女性数学家，做着航空研究中最关键的手工运算。当IBM电子计算机被搬进NASA，所有人都知道\"human computers\"即将被淘汰。Vaughan的应对方式精准得像一次战略转型：她自学了FORTRAN编程语言——在种族隔离的弗吉尼亚，图书馆的FORTRAN书在\"白人专区\"，她把书拿走了。学会后她教给团队里的每一个女人。当NASA宣布需要一个编程团队时，Vaughan举手：\"你们不需要招人，你们已经有一个团队了。\"三十名\"human computers\"直接转型为NASA编程团队，Vaughan任主管。她的故事直到2016年《Hidden Figures》出版才被公众知晓。","ref":"Margot Lee Shetterly《Hidden Figures》(2016)","lat":39,"lng":-98},{"id":"math_08","pool":"math_cs","poolLabel":"数学与计算机","name":"Hedy Lamarr","cn":"海蒂·拉玛","era":"1914–2000","reg":"奥地利/美国","q":"好莱坞最美的女人发明了WiFi和蓝牙的底层技术。没有人信。","body":"在她的第一段婚姻里，她被迫陪丈夫——一个奥地利军火商——参加与纳粹高官的晚宴。她听他们谈论鱼雷制导系统和干扰技术，把每一个细节记在脑子里。1937年她逃离丈夫，去了好莱坞，成了那个时代最著名的女演员之一。但她的大脑从未停止运转。1942年，她和作曲家George Antheil共同申请了\"频率跳变\"专利——无线电信号在多个频率之间快速跳跃以避免被干扰。美国海军拿到专利后说\"谢谢\"，然后把它锁进抽屉，告诉她：\"你去多卖点战争债券更有用。\"这项技术直到1960年代古巴导弹危机期间才被军方启用。再后来，它成了扩频通信技术的基础——你今天用的WiFi、蓝牙和GPS全部依赖这个原理。1997年，83岁的Lamarr终于获得电子前沿基金会先锋奖。她在电话里说：\"It's about time。\"","ref":"纪录片《Bombshell: The Hedy Lamarr Story》(2017)","lat":39,"lng":-98},{"id":"math_09","pool":"math_cs","poolLabel":"数学与计算机","name":"Margaret Hamilton","cn":"玛格丽特·汉密尔顿","era":"1936–","reg":"美国","q":"登月前三分钟，计算机报警了。她的代码救了整个任务。","body":"1969年7月20日，阿波罗11号登月舱\"鹰\"正在向月球表面下降。距离着陆还有三分钟，计算机突然开始闪烁1202和1201警报——系统过载。Buzz Aldrin在操作中触发了一个不必要的雷达系统，计算机同时跑着七个程序，第八个把它压垮了。休斯顿的地面控制必须在几秒钟内决定：继续还是中止。他们选择了继续——因为他们信任Margaret Hamilton写的代码。Hamilton设计了一套优先级调度系统：当计算机过载时，自动丢弃低优先级任务、保留最关键的——也就是着陆需要的那些。几年前她就预见了这种场景，提议加入容错机制，被告知\"宇航员训练有素，永远不会犯错，不需要\"。她还是加了。那张她站在一摞跟她等高的程序代码打印纸旁边的照片，成了计算机科学史上最著名的影像之一。2016年奥巴马授予她总统自由勋章时说：\"我们的宇航员没有多少时间，但幸好他们有Margaret Hamilton。\"","ref":"Smithsonian \"Margaret Hamilton Led the NASA Software Team That Landed Astronauts on the Moon\" (2023)","lat":39,"lng":-98},{"id":"math_10","pool":"math_cs","poolLabel":"数学与计算机","name":"Maryam Mirzakhani","cn":"玛丽亚姆·米尔扎赫尼","era":"1977–2017","reg":"伊朗","q":"她小时候每晚给自己讲一个了不起的女孩的故事。后来她自己成了那个女孩。","body":"八岁的Maryam Mirzakhani每天晚上入睡前都编故事——故事的主角是一个女孩，有时当市长，有时环游世界。长大后她说，她仍在脑子里编故事——只不过主角换成了双曲面和模空间。她在德黑兰长大，连续两年获得国际数学奥林匹克金牌，第二次拿了满分。之后去哈佛读博士，研究双曲曲面上的简单闭合测地线——她用画画来思考数学，办公室地板铺满了巨大的白纸，上面密密麻麻全是图形。她女儿以为妈妈是个画家。2014年，Fields Medal 80年历史上第一次颁给女性，颁给了她——也是第一个伊朗人。她说她一开始以为通知邮件是黑客发的。获奖时她已患乳腺癌，2017年癌细胞扩散到骨髓和肝脏，她在斯坦福医院去世，40岁。全世界女数学家互相发邮件，试图安慰彼此。她的同事们至今在延续她开启的研究方向——2025年一篇基于她理论框架的新论文被称为\"新时代的开端\"。","ref":"Quanta Magazine \"A Tenacious Explorer of Abstract Surfaces\" (2014)","lat":33,"lng":53},{"id":"math_11","pool":"math_cs","poolLabel":"数学与计算机","name":"","cn":"ENIAC六女程序员","era":"1946","reg":"美国","q":"她们编写了世界上第一台通用电子计算机的程序。庆功照里一个女人都没有。","body":"1943年，美国陆军招募了六名女数学家来为一件秘密武器编程：ENIAC——世界上第一台通用电子数字计算机，每秒能做300次乘法运算。她们是Jean Jennings Bartik、Betty Snyder Holberton、Kathleen McNulty Mauchly Antonelli、Marlyn Wescoff Meltzer、Ruth Lichterman Teitelbaum和Frances Bilas Spence。\"编程\"在当时被认为是类似文秘的低等工作，所以交给女人做——没人预料到这项工作的难度和重要性。她们没有编程手册（根本不存在这种东西），靠研究ENIAC的电路图和逻辑结构，自己摸索出如何用电线连接和物理开关来让机器执行计算。ENIAC公开发布时，新闻照片和宣传材料里只有男性科学家。六个女人的名字消失了几十年。直到1990年代，历史学家Kathy Kleiman偶然发现老照片里的这些女性面孔，追踪找到了她们，记录了她们的故事。","ref":"纪录片《The Computers》(2016)；ENIAC Programmers Project","lat":39,"lng":-98},{"id":"math_12","pool":"math_cs","poolLabel":"数学与计算机","name":"Fei-Fei Li","cn":"李飞飞","era":"1976–","reg":"中国/美国","q":"15岁移民美国，一边在Princeton念物理一边遥控管理父母的干洗店。后来她教会了机器\"看\"。","body":"李飞飞16岁跟父母从中国移民到新泽西。父母不会英语，做收银员；她在中餐馆打工。后来全家开了一家干洗店，她是\"CEO\"——接客户电话、处理账单、应对检查——一干就是七年，从18岁一直到博士读到一半。在Princeton念本科时她爱上了物理学，开始思考一个\"大胆的问题\"：机器能不能像人一样理解世界？她去Caltech读博，创建了ImageNet——1500万张人工标注的图片，涵盖22000个类别，用人类认知的组织原则来结构化视觉数据。2012年，一个在ImageNet上训练的神经网络取得了突破性成绩，直接引爆了深度学习革命。Geoffrey Hinton后来进一步发展了神经网络，但他说没有ImageNet这一切不会发生。李飞飞被称为\"AI教母\"。她创立的World Labs目前估值超过10亿美元。但她从来没有完全融入硅谷的叙事——她说自己的边缘身份给了她一种独特的距离感，让她在全球AI狂热中保持冷静。2017年她联合创立了AI4ALL，推动女性和少数族裔进入AI领域。","ref":"李飞飞自传《The Worlds I See》(2023)","lat":35,"lng":105}]},"film":{"label":"电影与戏剧","cards":[{"id":"film_01","pool":"film","poolLabel":"电影与戏剧","name":"Alice Guy-Blaché","cn":"爱丽丝·居伊-布拉谢","era":"1873–1968","reg":"法国/美国","q":"她拍了世界上第一部叙事电影。然后电影史把她忘了一百年。","body":"1896年，23岁的Alice Guy在高蒙公司当秘书。她看到卢米埃尔兄弟拍的\"火车进站\"——那不是电影，只是移动的照片。她跟老板说：我能不能试试用这个机器讲故事？老板说你去吧，别耽误正事就行。她拍了《卷心菜仙子》（La Fée aux Choux），一个女人从卷心菜地里拎出婴儿的奇幻短片——可能是世界上第一部叙事虚构电影。之后的十几年她执导了上千部影片，尝试了同步声音、手工上色、特效和倒放。1910年她在美国建立了自己的电影公司Solax，成为世界上第一个拥有电影公司的女性。片场大门上挂着一块牌子：\"Be Natural\"——自然表演，不要夸张，这在当时是革命性的导演理念。然而随着好莱坞studio system的建立和她与丈夫离婚，她逐渐被挤出行业。她花了晚年大量时间试图让电影史承认她的存在——写信给档案馆、联系历史学家——大多数时候得到的回应是沉默。2018年，纪录片《Be Natural》终于讲述了她的故事。","ref":"纪录片《Be Natural: The Untold Story of Alice Guy-Blaché》(2018)","lat":47,"lng":2},{"id":"film_02","pool":"film","poolLabel":"电影与戏剧","name":"Lois Weber","cn":"洛伊丝·韦伯","era":"1879–1939","reg":"美国","q":"1916年，好莱坞片酬最高的导演——不分性别——拍了一部关于堕胎的电影。","body":"Lois Weber一开始是街头布道者，在纽约和匹兹堡的街角唱赞美诗传教。后来她发现电影比布道更有力。1914年她执导了美国第一部女性导演的长片《威尼斯商人》。1916年的《Where Are My Children?》直面堕胎和避孕——宾夕法尼亚审查委员会称之为\"说不出口的肮脏\"，但这部电影给Universal赚了大量票房。同年她成为Universal片酬最高的导演，与D.W. Griffith和Cecil B. DeMille并称好莱坞\"三大头脑\"。她发明了分屏（split screen）和双重曝光等技术，比大多数男性先锋导演更早。1917年她成立了自己的制片公司，成为第一个拥有以自己名字命名的制片厂的美国女性。她还在Universal City竞选市长并当选——当时全世界唯一的女市长。她说过一句话：\"行业太新了，每个人都忙着学自己那一块，没人有空注意一个女人是不是在站稳脚跟。\"1920年代好莱坞工业化后，她被彻底边缘化。1939年去世时身无分文。1975年《Village Voice》写她：\"被遗忘得非常彻底。\"","ref":"Shelley Stamp《Lois Weber in Early Hollywood》","lat":39,"lng":-98},{"id":"film_03","pool":"film","poolLabel":"电影与戏剧","name":"Germaine Dulac","cn":"日耳曼·杜拉克","era":"1882–1942","reg":"法国","q":"她拍了第一部超现实主义电影。超现实主义的男孩们在首映礼上骂她是头母牛。","body":"1922年，Germaine Dulac拍了《微笑的布代夫人》——一个被困在无爱婚姻中的女人幻想杀死丈夫的故事。BFI称之为\"可能是第一部女性主义电影\"。六年后她拍了《贝壳与牧师》（1928），一个关于牧师情欲妄想的超现实梦境——比布努埃尔和达利的《一条安达鲁狗》早了整整一年。首映那天，超现实主义运动的男性成员们涌进影院，对着银幕大吵大闹。编剧Antonin Artaud（他刚被超现实主义团体开除）因为骂Dulac是\"une vache\"（母牛）被保安请了出去。英国电影审查委员会拒绝放映这部电影，理由是\"它如此晦涩以至于几乎毫无意义——如果它有意义的话，那就是令人反感的\"。Dulac在早期职业生涯中是记者，为《La Française》和《La Fronde》等女权刊物写稿。她一生都在倡导电影是一门独立的艺术形式——不是戏剧的附属品，不是文学的图解。声音电影的到来摧毁了她的先锋实验空间，最后十年她在Pathé和Gaumont拍新闻短片。","ref":"Another Gaze \"Cinematic Riots: Feminism and Surrealism in Germaine Dulac\"","lat":47,"lng":2},{"id":"film_04","pool":"film","poolLabel":"电影与戏剧","name":"","cn":"阮玲玉","era":"1910–1935","reg":"中国","q":"人言可畏。\"她在遗书里写了四个字，然后吞下了安眠药。","body":"1930年代上海，阮玲玉是中国最耀眼的电影明星。默片时代她不靠台词，只靠眼睛和身体就能让观众落泪——蔡楚生的《新女性》里她演一个被逼上绝路的知识女性，关锦鹏说那几乎就是她自己的预言。她的私生活被小报无止境地消费：与茶叶商人同居、与前男友的财产纠纷被搬上法庭，每一个细节都被放大成公众丑闻。1935年3月8日——恰好是国际妇女节——她在上海寓所吞服安眠药自杀，年仅25岁。遗书中写道\"人言可畏\"。三十万人为她送葬，鲁迅写了《论人言可畏》悼念她，说杀死她的不是某一个男人，而是整个社会对女性的审判机制。2014年，电影制片人在上海找到了她从未被公开的第四封遗书——内容至今存疑。关锦鹏1992年拍了《阮玲玉》，张曼玉凭此片在柏林电影节封后，角色与演员的命运产生了微妙的共振。","ref":"关锦鹏《阮玲玉》(1992)；鲁迅《论人言可畏》","lat":35,"lng":105},{"id":"film_05","pool":"film","poolLabel":"电影与戏剧","name":"Maya Deren","cn":"玛雅·黛伦","era":"1917–1961","reg":"乌克兰/美国","q":"她用250美元和一台二手摄影机，改写了\"电影\"这个词的定义。","body":"1943年，Maya Deren和丈夫Alexander Hammid用一台借来的16mm摄影机、250美元预算拍了《午后之网》——一个女人在梦与现实之间反复坠落的14分钟短片。没有片场、没有灯光师、没有剧本——她就是演员、导演、剪辑和概念设计。这部电影被认为是美国实验电影运动的起点。Deren拒绝了好莱坞的一切逻辑：不要叙事、不要角色弧光、不要\"故事\"——电影应该像诗一样运作，通过节奏和意象创造感受。她在纽约的公寓里放映自己的电影，一张票五毛钱，观众坐在地板上，看完之后争论到凌晨。她是第一个获得古根海姆基金会电影奖学金的人。后来她迷上了海地巫毒教，拍了大量仪式记录影像，写了一本关于巫毒的学术专著。44岁死于脑溢血，可能与长期营养不良和过度劳累有关。Stan Brakhage说她\"几乎单枪匹马创造了美国先锋电影\"。","ref":"《午后之网》(Meshes of the Afternoon, 1943)；Maya Deren《Divine Horsemen: The Living Gods of Haiti》","lat":39,"lng":-98},{"id":"film_06","pool":"film","poolLabel":"电影与戏剧","name":"Ida Lupino","cn":"艾达·路皮诺","era":"1918–1995","reg":"英国/美国","q":"1950年代整个好莱坞只有一位女导演。她拍的是强奸、未婚怀孕和连环杀手。","body":"Ida Lupino的导演处女作是一场意外。1949年，她联合制作的电影《Not Wanted》开拍前，导演心脏病发倒下了。Lupino当天就接过导演筒，用游击队式的手法把片子在预算内拍完。15万美元成本，100万美元票房——但最终导演署名给了那个倒下的男人。从那以后，五尺二寸的Lupino在清一色男性剧组面前执导了一部又一部禁忌题材：强奸（《Outrage》）、未婚怀孕（《Not Wanted》）、重婚（《The Bigamist》，她成为第一个在自己导演的电影里演出的女性）。1953年她拍了《The Hitch-Hiker》——经典好莱坞历史上唯一一部女性执导的film noir。整个1950年代，她是好莱坞唯一在职的女导演——从Dorothy Arzner 1943年退休到后来的漫长空白期，中间只有她一个人。麦卡锡主义让好莱坞变得保守胆怯，但她依然坚持把社会议题塞进B级片的框架里。后来她转向电视，导演了超过100集各种类型剧集。","ref":"Alexandra Seros《Ida Lupino, Forgotten Auteur: From Film Noir to the Director's Chair》","lat":52,"lng":-1},{"id":"film_07","pool":"film","poolLabel":"电影与戏剧","name":"Agnès Varda","cn":"阿涅斯·瓦尔达","era":"1928–2019","reg":"比利时/法国","q":"法国新浪潮有一群年轻男人和一个比他们都早开始拍电影的女人。","body":"1955年，Agnès Varda拍了《短角情事》（La Pointe Courte），比戈达尔的《筋疲力尽》早五年，比特吕弗的《四百击》早四年。但当人们谈论法国新浪潮时，提到的名字是戈达尔、特吕弗、夏布洛尔、侯麦——Varda被称为\"新浪潮的祖母\"，一个奇怪的称号，因为她比这些\"父亲\"们更早开始。她没有上过电影学校，之前是摄影师，直接拿起摄影机就拍了。她说电影应该像写作一样私密——\"cine-écriture\"（电影写作），每个镜头都是导演手写的句子。她一辈子拍穷人、拾荒者、边缘人、衰老的身体——2000年的《拾穗者》是一部关于垃圾、食物浪费和尊严的纪录片，她用一台小型数码相机拍的。2017年，89岁的Varda获得奥斯卡终身成就奖——她是第一位获此荣誉的女导演。领奖时她说自己像一个\"不太正常的老太太\"。她2019年去世，最后一部电影叫《阿涅斯论瓦尔达》——一个导演对着镜头总结自己的一生。","ref":"《拾穗者》(Les Glaneurs et la Glaneuse, 2000)；《阿涅斯的海滩》(2008)","lat":47,"lng":2},{"id":"film_08","pool":"film","poolLabel":"电影与戏剧","name":"Chantal Akerman","cn":"尚塔尔·阿克曼","era":"1950–2015","reg":"比利时","q":"《让娜·迪尔曼》用三个半小时拍一个家庭主妇削土豆、擦桌子、叠毛巾。2022年被评为影史最伟大电影第一名。","body":"1975年，25岁的Chantal Akerman拍了一部关于布鲁塞尔家庭主妇让娜·迪尔曼的电影：201分钟，固定机位，没有配乐，大量实时记录的家务劳动——削土豆、擦桌子、洗碗、叠毛巾。这些镜头令人坐立不安——不是因为发生了什么，而是因为什么都没发生，而你慢慢意识到这种\"什么都没发生\"就是千千万万女人的一生。让娜还兼做性工作者，接客的场面同样冷静得令人窒息。最后她杀了一个嫖客——用一把剪发剪刀。没有高潮音乐，没有特写，没有解释。2022年，《Sight & Sound》十年一度的影史最伟大电影评选，《让娜·迪尔曼》击败《迷魂记》和《公民凯恩》排名第一——影史上第一部由女性执导的电影登顶。Akerman一生受抑郁症折磨，2015年在巴黎自杀，65岁。她母亲是奥斯维辛集中营幸存者，那段创伤是她所有作品的暗流。","ref":"《让娜·迪尔曼》(Jeanne Dielman, 23 quai du Commerce, 1080 Bruxelles, 1975)","lat":50.8,"lng":4.4},{"id":"film_09","pool":"film","poolLabel":"电影与戏剧","name":"Leni Riefenstahl","cn":"莱尼·里芬施塔尔","era":"1902–2003","reg":"德国","q":"她拍出了电影史上最伟大的纪录片。为希特勒。","body":"《意志的胜利》（1935）记录了1934年纳粹党纽伦堡集会——低角度仰拍让希特勒如神降临，云层剪辑暗示天命所归，几十万人的集会在她的镜头下成为一首关于秩序与力量的视觉交响曲。从纯技术角度，这部电影发明了纪录片的语言：多机位拍摄、航拍、运动镜头、蒙太奇节奏控制。从道德角度，这是有史以来最有效的政治宣传工具。1936年柏林奥运会的《奥林匹亚》进一步证明了她的天才——慢动作拍摄运动员的身体美学至今被体育转播模仿。战后她声称自己只是一个\"艺术家\"，对纳粹的暴行一无所知。去纳粹化法庭判定她是\"fellow traveler\"而非罪犯。她此后被主流电影界放逐，但从未认过错。72岁学水肺潜水，拍水下摄影；100岁还在发表作品。她活了101岁——比她拍摄的那个政权长寿了近六十年。关于她的核心争论至今无解：天才和帮凶可以是同一个人吗？艺术可以和它服务的目的分开吗？","ref":"Jürgen Trimborn《Leni Riefenstahl: A Life》","lat":51,"lng":10},{"id":"film_10","pool":"film","poolLabel":"电影与戏剧","name":"","cn":"许鞍华","era":"1947–","reg":"中国香港","q":"七十多岁了还在拍。没有退休金。","body":"许鞍华是香港新浪潮的核心人物，也是华语电影世界最多产的女导演——四十多年导了三十多部电影。她拍越南难民（《胡越的故事》）、拍老年痴呆（《桃姐》）、拍张爱玲（《半生缘》《第一炉香》）、拍政治流亡者、拍穷老太太。2020年她成为第一位获得威尼斯电影节终身成就金狮奖的女导演。但她在香港没有自己的房子——七十多岁还跟妈妈租房住在北角。她多次公开说自己没有退休金、没有存款——香港电影业不提供这些。有记者问她为什么不去拍商业片赚钱，她说\"我不会拍那种东西\"。另一个记者问她为什么不结婚，她说\"我对婚姻没有信心\"。她的电影总是关注那些被大时代碾过去的普通人——而她自己也像她镜头下的人物一样，倔强地活在体制的边缘。","ref":"《桃姐》(A Simple Life, 2012)；纪录片《好好拍电影》(Keep Rolling, 2020)","lat":22.3,"lng":114.2},{"id":"film_11","pool":"film","poolLabel":"电影与戏剧","name":"Kathryn Bigelow","cn":"凯瑟琳·毕格罗","era":"1951–","reg":"美国","q":"奥斯卡82年历史上第一位女性最佳导演。她拍的是战争片。","body":"2010年，Kathryn Bigelow凭《拆弹部队》获得奥斯卡最佳导演——82年来第一位女性。她打败的对手之一是前夫James Cameron的《阿凡达》——一部斥资两亿三千万美元的视觉奇观。她的电影预算只有Cameron的零头。颁奖季媒体反复问她\"作为第一位获提名的女导演有什么感想\"，她说：\"作为一个电影人，我宁愿不被按性别分类。\"她的职业生涯一直在证明这一点——她不拍人们期待女导演拍的电影。她拍冲浪银行抢劫（《惊爆点》）、拍潜艇战争（《K-19》）、拍伊拉克战场上的肾上腺素瘾君子（《拆弹部队》）、拍追杀本·拉登的十年情报战（《猎杀本·拉登》）。批评者说她拍的是\"男人的电影\"——但这个批评本身就暴露了问题：为什么战争、暴力、权力只能是\"男人的题材\"？","ref":"《拆弹部队》(The Hurt Locker, 2008)；《猎杀本·拉登》(Zero Dark Thirty, 2012)","lat":39,"lng":-98},{"id":"film_12","pool":"film","poolLabel":"电影与戏剧","name":"Chloé Zhao","cn":"赵婷","era":"1982–","reg":"中国/美国","q":"在奥斯卡领奖台上引用《三字经》的那个女人，在中国被全网封杀。","body":"赵婷在北京长大，继母是宋丹丹。少年时代去了伦敦寄宿学校，后来到洛杉矶读完高中，在NYU学电影时跟Spike Lee学拍片。她的风格是用真实的人演真实的生活——第一部长片《哥哥教我唱的歌》在南达科他州的松岭保留地拍摄，全部非职业演员。《无依之地》跟着Frances McDormand和真正的游牧者穿越美国西部，纪录与虚构的边界几乎消失。2021年凭此片获奥斯卡最佳导演和最佳影片——她是历史上第二位获最佳导演的女性、第一位亚裔女性、第一位有色人种女性。领奖台上她说，小时候父亲跟她一起背古诗词，\"人之初，性本善\"这六个字影响她至今。然而在中国，这段话被屏蔽了。此前有人翻出她早年接受采访时说中国是\"一个充满谎言的地方\"（后被指为断章取义），官媒从\"华人骄傲\"瞬间转向全网封杀，豆瓣删海报，微博删话题，《无依之地》撤档，她执导的漫威《永恒族》无法在中国上映。网友在宋丹丹微博下留言祝贺——那是唯一一个没有被删干净的入口。","ref":"《无依之地》(Nomadland, 2020)；《骑士》(The Rider, 2017)","lat":35,"lng":105}]},"journalism":{"label":"新闻与出版","cards":[{"id":"jour_01","pool":"journalism","poolLabel":"新闻与出版","name":"Nellie Bly","cn":"内莉·布莱","era":"1864–1922","reg":"美国","q":"她假装疯了，让自己被关进精神病院。十天后她写出了改变美国精神卫生制度的报道。","body":"1887年，23岁的Nellie Bly接到《纽约世界报》的任务：以病人身份潜入纽约布莱克威尔岛精神病院，看看里面到底发生了什么。她在镜子前练习了一晚上\"疯癫\"的表情，第二天成功让医生相信她精神失常。在病院里待了十天——她看到病人被冰水浇淋、吃腐烂食物、被绑在长凳上整夜不许动。出来后写成《疯人院十日》，直接促使纽约市拨款增加精神病院预算并改革管理制度。两年后她又干了一件事：受儒勒·凡尔纳《八十天环游地球》启发，她用72天6小时11分钟环绕地球一圈，打破了虚构角色的记录。全美国人都在跟踪她的路线打赌。她发明了一种新闻类型——后来叫做\"卧底调查报道\"——用身体当工具，用亲历当证据。","ref":"Nellie Bly《Ten Days in a Mad-House》(1887)","lat":39,"lng":-98},{"id":"jour_02","pool":"journalism","poolLabel":"新闻与出版","name":"Ida B. Wells","cn":"艾达·B·威尔斯","era":"1862–1931","reg":"美国","q":"当南方白人说私刑是为了\"保护白人女性\"时，她用数据证明那是谎言。","body":"1892年，Ida B. Wells的三个朋友——黑人企业主——在田纳西州被白人暴民私刑处死。他们的罪名是\"挑衅白人\"，实际罪行是开了一家杂货店，抢了白人商铺的生意。Wells在自己的报纸《自由言论报》上发表调查，逐案统计南方的私刑数据，发现被以\"强奸白人女性\"为由处死的黑人中，大多数案件根本没有强奸发生——很多是自愿的跨种族关系，被发现后女方指控强奸以自保。Wells写道：\"在南方，每一个白人男性在黑人面前都自动成为法官、陪审团和刽子手。\"白人暴民烧毁了她的报社，威胁说她要是回来就杀她。她再也没有回过孟菲斯。之后几十年她在芝加哥继续反私刑运动，联合创立了NAACP（全国有色人种协进会）。2020年，她被追授普利策特别奖。","ref":"Ida B. Wells《Southern Horrors: Lynch Law in All Its Phases》(1892)","lat":39,"lng":-98},{"id":"jour_03","pool":"journalism","poolLabel":"新闻与出版","name":"","cn":"吕碧城","era":"1883–1943","reg":"中国","q":"中国新闻史上第一位女编辑。追求者无数，她一个也看不上。死后骨灰和面为丸，投入大海。","body":"1903年，20岁的吕碧城去天津找一个亲戚未果，身无分文，写了一封信给《大公报》总经理英敛之。英敛之读完信惊为天才，立刻聘她为编辑——她成了中国新闻史上第一位女编辑。从此她在《大公报》上发表大量女权文章，把兴办女学提升到\"关乎国家存亡\"的高度。她和秋瑾交好，秋瑾曾仰慕她到给自己也取号\"碧城\"，后来主动取消以免混淆。秋瑾被处决后，吕碧城冒险派人偷出遗体安葬。她12岁丧父，族人夺产，夫家退婚——这些童年创伤让她早早看清了封建社会女性的处境。后来她做了北洋女子公学校长（中国第一位女性校长）、袁世凯总统府秘书（袁称帝后她辞职）、上海女商人（两三年间致富）、哥伦比亚大学留学生、欧美漫游七年的旅行作家。追求她的人从袁克文到英敛之本人，她一个也没选。晚年皈依佛教，法号\"宝莲\"。遗嘱要求火化后骨灰和面为丸，投入南海——不留形骸于人世。","ref":"苏雪林论吕碧城；《欧美漫游录》","lat":35,"lng":105},{"id":"jour_04","pool":"journalism","poolLabel":"新闻与出版","name":"Oriana Fallaci","cn":"奥里亚娜·法拉奇","era":"1929–2006","reg":"意大利","q":"她采访基辛格，让他说出了职业生涯中\"最愚蠢的一句话\"。","body":"基辛格后来说，接受Oriana Fallaci的采访是他\"公共生活中做过的最愚蠢的事\"。他在采访中把自己比作一个\"独自骑马走在前面\"的牛仔——一个外交官不该有的自恋表态。Fallaci就是有这种能力：她不是提问，是诱供。她让伊朗的霍梅尼当着她的面侮辱女性，然后在全世界面前扯掉了自己头上的面纱。她让巴基斯坦总理布托承认了自己的独裁倾向。她让以色列的沙龙不小心说了不该说的话。她的采访风格不是客观中立——她公开厌恶权力，每一个问题都带着进攻性，但她的进攻建立在事实研究之上。她说\"新闻不是一面镜子，新闻是一种行动\"。她在采访越战时被枪击中险些丧命，在墨西哥报道学生运动时中了三枪。晚年她的反伊斯兰言论引发巨大争议，被指控煽动种族仇恨。她是一个不可能被简单定义的人——勇敢、偏执、天才、危险，全都是她。","ref":"Oriana Fallaci《Interview with History》(1976)","lat":42,"lng":12},{"id":"jour_05","pool":"journalism","poolLabel":"新闻与出版","name":"Martha Gellhorn","cn":"玛莎·盖尔霍恩","era":"1908–1998","reg":"美国","q":"诺曼底登陆那天，海明威从船上看着海滩。她藏在医疗船的厕所里，带着一壶威士忌，偷渡上了岸。","body":"Martha Gellhorn的前夫是海明威。1944年D-Day前夕，Collier's杂志只给了一个战地记者名额——海明威说服杂志社给了他。Gellhorn没有采访证，不被允许随军。她的解决方案是：假装成护理人员，溜上一艘医疗船，锁进厕所，等船开了再出来。6月8日，她涉水走上奥马哈海滩，假扮担架手运送伤员——她比海明威更早踏上法国土地。海明威那天全程在船上。她写的报道比海明威的更深刻——他写自己的英勇，她写士兵的痛苦和平民的恐惧。但Collier's把海明威的文章放在封面，她的放在第16页。回到伦敦后她被宪兵逮捕，罪名是未经许可前往诺曼底。她后来还是达豪集中营的第一批进入者之一。她一生覆盖了几乎所有20世纪重大战争——西班牙内战、二战、越战、中美洲冲突，81岁时还报道了美国入侵巴拿马。她最痛恨的标签是\"海明威前妻\"。她说：\"我不是任何人的注脚。\"","ref":"Caroline Moorehead《Gellhorn: A Twentieth Century Life》(2003)","lat":39,"lng":-98},{"id":"jour_06","pool":"journalism","poolLabel":"新闻与出版","name":"Anna Politkovskaya","cn":"安娜·波利特科夫斯卡娅","era":
