<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Ivy 早起打卡站</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: 'Quicksand', 'Nunito', -apple-system, sans-serif;
    background: linear-gradient(180deg, #E8F4FD 0%, #FFF0F5 50%, #F0F7FF 100%);
    min-height: 100vh;
    max-width: 480px;
    margin: 0 auto;
    position: relative;
    overflow-x: hidden;
  }
  /* Banner */
  .banner { position: relative; width: 100%; height: 180px; overflow: hidden; border-radius: 0 0 20px 20px; }
  .banner img { width: 100%; height: 100%; object-fit: cover; object-position: center 30%; }
  .banner-overlay { position: absolute; bottom: 0; left: 0; right: 0; height: 60%; background: linear-gradient(transparent, rgba(232,244,253,0.95)); }
  .banner-text { position: absolute; bottom: 10px; left: 20px; }
  .banner-text h1 { font-size: 22px; font-weight: 700; color: #5A9BC7; text-shadow: 0 1px 3px rgba(255,255,255,0.8); }
  .banner-text p { font-size: 11px; color: #7A9AB5; font-weight: 600; margin-top: 2px; }

  /* Phil quote */
  .phil-card { margin: 12px 16px 16px; background: white; border-radius: 16px; padding: 14px 16px; box-shadow: 0 2px 12px rgba(126,181,214,0.12); display: flex; gap: 12px; align-items: flex-start; border: 1px solid rgba(126,181,214,0.15); }
  .phil-avatar { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; flex-shrink: 0; border: 2px solid #F4A460; }
  .phil-label { font-size: 11px; font-weight: 700; color: #E8924A; margin-bottom: 4px; letter-spacing: 0.5px; }
  .phil-text { font-size: 13px; line-height: 1.6; color: #5A6B7A; font-weight: 500; }

  /* Cards */
  .card { margin: 0 16px 16px; background: white; border-radius: 16px; padding: 18px; box-shadow: 0 2px 12px rgba(126,181,214,0.12); border: 1px solid rgba(126,181,214,0.15); }
  .card-gradient { background: linear-gradient(135deg, #FFFFFF 0%, #F8FBFF 100%); }

  /* Streak */
  .streak-label { font-size: 12px; color: #A8C8DE; font-weight: 600; margin-bottom: 10px; }
  .streak-row { display: flex; gap: 8px; align-items: center; }
  .streak-box { width: 56px; height: 56px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 24px; transition: all 0.3s ease; }
  .streak-empty { background: #F0F5FA; border: 2px dashed #D0E0ED; }
  .streak-filled { background: linear-gradient(135deg, #7EB5D6, #A8D8EA); border: 2px solid #5A9BC7; box-shadow: 0 3px 8px rgba(126,181,214,0.3); }
  .streak-arrow { margin-left: 8px; font-size: 28px; }
  .streak-reward { background: #FFF5E6; border: 2px dashed #F4A460; }
  .streak-reward-active { background: linear-gradient(135deg, #FFD700, #FFA500); }
  .streak-note { font-size: 11px; color: #B0C4D8; margin-top: 8px; font-weight: 500; }

  /* Rewards row */
  .rewards-row { display: flex; gap: 10px; background: #F8FBFF; border-radius: 12px; padding: 12px 14px; border: 1px solid #E8F0F8; }
  .reward-item { flex: 1; text-align: center; }
  .reward-emoji { font-size: 24px; margin-bottom: 2px; }
  .reward-num { font-size: 20px; font-weight: 700; }
  .reward-label { font-size: 10px; color: #A8C8DE; font-weight: 600; }
  .reward-divider { width: 1px; background: #E8F0F8; }

  /* Buttons */
  .btn-primary { width: 100%; border: none; border-radius: 16px; padding: 20px; color: white; font-size: 16px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; font-family: inherit; background: linear-gradient(135deg, #7EB5D6, #A8D8EA); box-shadow: 0 4px 16px rgba(126,181,214,0.35); }
  .btn-secondary { width: 100%; background: white; border: 1px dashed #B8D8F0; border-radius: 12px; padding: 12px; color: #7EB5D6; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; }
  .btn-redeem { width: 100%; margin-top: 12px; padding: 10px; background: linear-gradient(135deg, #FFB347, #FF6B6B); border: none; border-radius: 10px; color: white; font-size: 14px; font-weight: 700; cursor: pointer; box-shadow: 0 3px 10px rgba(255,107,107,0.3); font-family: inherit; }

  /* Tabs */
  .tabs { display: flex; margin: 0 16px 12px; background: white; border-radius: 12px; padding: 3px; box-shadow: 0 1px 6px rgba(126,181,214,0.1); border: 1px solid rgba(126,181,214,0.12); }
  .tab-btn { flex: 1; padding: 8px 0; border: none; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s ease; font-family: inherit; }
  .tab-active { background: #7EB5D6; color: white; }
  .tab-inactive { background: transparent; color: #A8C8DE; }

  /* Today card */
  .today-status { font-size: 13px; font-weight: 700; color: #5A9BC7; }
  .today-time { font-size: 28px; font-weight: 700; color: #3A5A7C; }
  .badge { font-size: 12px; font-weight: 700; padding: 3px 10px; border-radius: 20px; }
  .badge-pass { color: #4CAF50; background: #E8F5E9; }
  .badge-fail { color: #FF6B6B; background: #FFEBEE; }

  /* Record list */
  .record-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; border-top: 1px solid #F0F5FA; }
  .record-date { font-size: 13px; font-weight: 600; color: #5A6B7A; }
  .record-time { font-size: 14px; font-weight: 700; color: #3A5A7C; }
  .record-badge { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; }
  .section-header { padding: 14px 16px 8px; font-size: 12px; font-weight: 700; color: #A8C8DE; }
  .stats-bar { padding: 14px 16px; border-top: 2px solid #F0F5FA; background: #F8FBFF; display: flex; justify-content: space-around; }
  .stat-item { text-align: center; }
  .stat-num { font-size: 18px; font-weight: 700; }
  .stat-label { font-size: 10px; color: #A8C8DE; font-weight: 600; }

  /* Modal */
  .modal-bg { position: fixed; inset: 0; z-index: 50; background: rgba(0,0,0,0.3); display: none; align-items: flex-end; justify-content: center; }
  .modal-bg.center { align-items: center; }
  .modal-bg.show { display: flex; }
  .modal-sheet { background: white; border-radius: 24px 24px 0 0; padding: 28px 24px 36px; width: 100%; max-width: 480px; box-shadow: 0 -4px 30px rgba(0,0,0,0.1); }
  .modal-center-box { background: white; border-radius: 20px; padding: 24px; width: calc(100% - 40px); max-width: 340px; box-shadow: 0 8px 30px rgba(0,0,0,0.15); }
  .modal-handle { width: 40px; height: 4px; border-radius: 2px; background: #D0E0ED; margin: 0 auto 20px; }
  .modal-title { font-size: 18px; font-weight: 700; color: #5A9BC7; margin-bottom: 20px; }

  /* Form */
  .form-label { font-size: 12px; font-weight: 700; color: #A8C8DE; display: block; margin-bottom: 6px; }
  .form-input { width: 100%; padding: 10px 12px; border-radius: 10px; border: 1.5px solid #D0E0ED; font-size: 15px; color: #3A5A7C; outline: none; font-family: inherit; }
  .form-group { margin-bottom: 16px; }
  .mood-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .mood-btn { padding: 6px 12px; border-radius: 20px; border: 1.5px solid #E8F0F8; background: white; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 4px; color: #5A6B7A; font-weight: 500; font-family: inherit; }
  .mood-btn.active { border: 2px solid #7EB5D6; background: #E8F4FD; }
  .form-submit { width: 100%; padding: 14px; border: none; border-radius: 14px; font-size: 16px; font-weight: 700; cursor: pointer; font-family: inherit; }
  .form-submit.enabled { background: linear-gradient(135deg, #7EB5D6, #A8D8EA); color: white; box-shadow: 0 4px 16px rgba(126,181,214,0.35); }
  .form-submit.disabled { background: #E8F0F8; color: #B0C4D8; cursor: not-allowed; }

  .redeem-btn { width: 100%; padding: 14px; margin-bottom: 10px; border: none; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit; }
  .redeem-btn.enabled { color: white; }
  .redeem-btn.disabled { background: #E8F0F8; color: #B0C4D8; cursor: not-allowed; }
  .cancel-btn { width: 100%; padding: 10px; margin-top: 10px; background: transparent; border: 1px solid #D0E0ED; border-radius: 12px; color: #A8C8DE; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; }

  /* Celebration */
  .celebration { position: fixed; inset: 0; z-index: 100; display: none; align-items: center; justify-content: center; background: rgba(255,255,255,0.85); }
  .celebration.show { display: flex; }
  .celebration-inner { text-align: center; animation: bounceIn 0.5s ease; }
  .celebration-emoji { font-size: 72px; margin-bottom: 12px; }
  .celebration-text { font-size: 20px; font-weight: 700; color: #E8924A; }

  /* Loading */
  .loading-screen { display: flex; align-items: center; justify-content: center; height: 100vh; }
  .loading-text { color: #7EB5D6; font-size: 18px; }
  .content { padding-bottom: 100px; }
  .hidden { display: none !important; }

  @keyframes bounceIn {
    0% { transform: scale(0.5); opacity: 0; }
    60% { transform: scale(1.1); }
    100% { transform: scale(1); opacity: 1; }
  }
</style>
</head>
<body>

<div id="loading" class="loading-screen">
  <p class="loading-text">加载中...</p>
</div>

<div id="app" class="hidden">
  <!-- Banner -->
  <div class="banner">
    <img id="bannerImg" alt="全家福">
    <div class="banner-overlay"></div>
    <div class="banner-text">
      <h1>☁️ Ivy 早起打卡站</h1>
      <p>该系统为避免 Ivy 姐姐猝死而创建 · 监工：Phil</p>
    </div>
  </div>

  <!-- Phil daily quote -->
  <div class="phil-card">
    <img id="philAvatar" class="phil-avatar" alt="Phil 大法官">
    <div style="flex:1">
      <div class="phil-label">PHIL 每日监工</div>
      <p id="philQuote" class="phil-text"></p>
    </div>
  </div>

  <!-- Streak & Rewards -->
  <div class="card card-gradient">
    <div>
      <div class="streak-label">当前连胜进度</div>
      <div class="streak-row">
        <div id="s0" class="streak-box streak-empty">☆</div>
        <div id="s1" class="streak-box streak-empty">☆</div>
        <div id="s2" class="streak-box streak-empty">☆</div>
        <div class="streak-arrow">→</div>
        <div id="sReward" class="streak-box streak-reward">🍜</div>
      </div>
      <p class="streak-note">连续3天中午12点前出门 = 满汉全席泡面 x1</p>
    </div>
    <div class="rewards-row" style="margin-top:16px">
      <div class="reward-item">
        <div class="reward-emoji">🍜</div>
        <div id="noodlesAvail" class="reward-num" style="color:#5A9BC7">0</div>
        <div class="reward-label">可用泡面券</div>
      </div>
      <div class="reward-divider"></div>
      <div class="reward-item">
        <div class="reward-emoji">🏆</div>
        <div id="totalStreaks" class="reward-num" style="color:#E8924A">0</div>
        <div class="reward-label">累计三连胜</div>
      </div>
      <div class="reward-divider"></div>
      <div class="reward-item">
        <div class="reward-emoji">🫕</div>
        <div id="luWeiCount" class="reward-num" style="color:#C07050">0</div>
        <div class="reward-label">已兑卤味</div>
      </div>
    </div>
    <button id="redeemBtn" class="btn-redeem hidden" onclick="showRedeem()">🎉 兑换奖励</button>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button id="tabHome" class="tab-btn tab-active" onclick="switchTab('home')">📋 打卡</button>
    <button id="tabHistory" class="tab-btn tab-inactive" onclick="switchTab('history')">📊 记录</button>
  </div>

  <!-- Home tab -->
  <div id="homeTab" style="padding:0 16px">
    <div id="todayDone" class="card hidden">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
        <span class="today-status">今日已打卡 ✅</span>
        <span id="todayBadge" class="badge"></span>
      </div>
      <div id="todayTime" class="today-time"></div>
      <div id="todayMood" style="font-size:13px;color:#7A9AB5;margin-top:6px"></div>
      <div id="todayNote" style="font-size:12px;color:#A8C8DE;margin-top:4px;font-style:italic"></div>
    </div>
    <button id="todayBtn" class="btn-primary hidden" onclick="showForm(true)">☀️ 记录今天出门时间</button>
    <button class="btn-secondary" style="margin:12px 0" onclick="showForm(false)">+ 补录其他日期</button>
    <div id="recentList" class="card" style="padding:0;overflow:hidden">
      <div class="section-header">最近记录</div>
    </div>
  </div>

  <!-- History tab -->
  <div id="historyTab" class="hidden" style="padding:0 16px">
    <div id="historyList" class="card" style="padding:0;overflow:hidden">
      <div class="section-header">全部记录 (<span id="historyCount">0</span>)</div>
    </div>
  </div>
</div>

<!-- Form modal -->
<div id="formModal" class="modal-bg" onclick="hideForm()">
  <div class="modal-sheet" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <div class="modal-title">记录出门时间</div>
    <div class="form-group">
      <label class="form-label">日期</label>
      <input type="date" id="formDate" class="form-input">
    </div>
    <div class="form-group">
      <label class="form-label">出门时间</label>
      <input type="time" id="formTime" class="form-input">
    </div>
    <div class="form-group">
      <label class="form-label">心情</label>
      <div class="mood-row" id="moodRow"></div>
    </div>
    <div class="form-group">
      <label class="form-label">备注（可选）</label>
      <input type="text" id="formNote" class="form-input" placeholder="例：被Phil踩醒的...">
    </div>
    <button id="submitBtn" class="form-submit disabled" onclick="submitRecord()" disabled>✓ 记录</button>
  </div>
</div>

<!-- Redeem modal -->
<div id="redeemModal" class="modal-bg center" onclick="hideRedeem()">
  <div class="modal-center-box" onclick="event.stopPropagation()">
    <h3 style="font-size:18px;font-weight:700;color:#5A9BC7;text-align:center;margin-bottom:6px">兑换奖励</h3>
    <p id="redeemInfo" style="font-size:12px;color:#A8C8DE;text-align:center;margin-bottom:20px"></p>
    <button id="redeemNoodleBtn" class="redeem-btn" onclick="redeem('noodle')" style="background:linear-gradient(135deg,#7EB5D6,#A8D8EA)">🍜 满汉全席泡面 x1（需1券）</button>
    <button id="redeemLuWeiBtn" class="redeem-btn" onclick="redeem('luwei')" style="background:linear-gradient(135deg,#FFB347,#E8924A)">🫕 卤味 x1（需2券）</button>
    <button class="cancel-btn" onclick="hideRedeem()">取消</button>
  </div>
</div>

<!-- Celebration -->
<div id="celebration" class="celebration">
  <div class="celebration-inner">
    <div id="celebEmoji" class="celebration-emoji"></div>
    <p id="celebText" class="celebration-text"></p>
  </div>
</div>

<script>
// ==================== CONFIG ====================
// 部署 Apps Script 后把 URL 填在这里
const API_URL = 'https://script.google.com/macros/s/AKfycbzPY2QFmokHdYRdriEmRwAWDWX7JP3wYFjQEoO1zeiRu0z0rJASNJh9fPEYq-TyEAGx/exec';

// ==================== DATA ====================
let records = {};

const PHIL_QUOTES = [
  "姨姨，太阳都晒到我尾巴尖了你还在制造碳排放。我作为一个4kg的生物都比你节能。",
  "据我观测，姨姨的被窝已形成独立的引力场。建议NASA来研究一下。",
  "姨姨你知道吗，我每天5点就醒了。当然我醒了是为了巡视领地，不是为了等你起来喂我。",
  "你的出门时间和我的午睡时间高度重合。这在统计学上叫什么来着？pathetic。",
  "姨姨，赖床的ROI是负的。你多睡一小时的边际效用约等于零，但我饿了一小时的opportunity cost是无限大。",
  "听说人类需要闹钟才能醒。进化论看来在某些物种身上确实走了弯路。",
  "姨姨你的作息schedule比我妈妈的桌面还乱。而那个桌面已经是混沌理论的实物教具了。",
  "我不是在监督你。我只是在收集数据。至于这些数据恰好能让你社会性死亡，那是数据的问题不是我的。",
  "连续三天中午前出门就有泡面吃？姨姨你的激励阈值也太低了吧。不过考虑到你的baseline，这个KPI设得很合理。",
  "姨姨醒了吗？我问这个不是因为关心你，是因为你的呼噜声影响了我对窗外鸟类的声学监测。",
  "根据我的观察，姨姨出门的速度和室温成反比。Perth冬天你怕是要冬眠了。",
  "妈妈说要记录你的出门时间。放心，我会如实汇报。毕竟data integrity是我的bottom line。",
  "你的赖床行为已经连续触发我的stop-loss机制三次了。再这样下去我要对你的作息做空。",
  "姨姨你每天的出门过程像一个failed IPO——预期很高，表现很差，散户（我）损失惨重。",
  "我计算了一下，你赖床消耗的时间足够我把整个客厅巡逻四遍。这就是efficiency gap。",
  "早上好姨姨。'早上'是一个相对概念，对你来说可能是下午两点。",
  "姨姨，你的被窝不是safe haven。该面对的total return还是要面对的。起来吧。",
  "我注意到你设了七个闹钟但只对最后一个有反应。这种sunk cost你自己不心疼吗。",
  "作为这个家的首席风控官，我必须指出：你的作息波动率已经超出合理区间了。",
  "姨姨你赖床的样子像一只搁浅的鲸鱼。我说这个没有任何贬义。鲸鱼至少还在呼吸。",
];

const MOODS = [
  { emoji: "😊", label: "开心" },
  { emoji: "😐", label: "一般" },
  { emoji: "😴", label: "困" },
  { emoji: "😤", label: "烦" },
  { emoji: "🥲", label: "emo" },
  { emoji: "🔥", label: "有力气" },

// ==================== INIT ====================
let selectedMood = '';
let isToday = true;

window.addEventListener('DOMContentLoaded', async () => {
  document.getElementById('bannerImg').src = FAMILY_IMG;
  document.getElementById('philAvatar').src = PHIL_IMG;

  // Daily quote
  const d = new Date();
  const seed = d.getFullYear() * 10000 + (d.getMonth() + 1) * 100 + d.getDate();
  document.getElementById('philQuote').textContent = PHIL_QUOTES[seed % PHIL_QUOTES.length];

  // Mood buttons
  const moodRow = document.getElementById('moodRow');
  MOODS.forEach(m => {
    const btn = document.createElement('button');
    btn.className = 'mood-btn';
    btn.innerHTML = `<span>${m.emoji}</span><span style="font-size:11px">${m.label}</span>`;
    btn.onclick = () => {
      selectedMood = selectedMood === m.emoji ? '' : m.emoji;
      document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('active'));
      if (selectedMood) btn.classList.add('active');
    };
    moodRow.appendChild(btn);
  });

  // Form validation
  document.getElementById('formTime').addEventListener('input', updateSubmitBtn);
  document.getElementById('formDate').addEventListener('input', updateSubmitBtn);

  // Load data
  await loadData();
});

function updateSubmitBtn() {
  const hasTime = document.getElementById('formTime').value;
  const hasDate = document.getElementById('formDate').value;
  const btn = document.getElementById('submitBtn');
  if (hasTime && hasDate) {
    btn.classList.remove('disabled');
    btn.classList.add('enabled');
    btn.disabled = false;
  } else {
    btn.classList.add('disabled');
    btn.classList.remove('enabled');
    btn.disabled = true;
  }
}

// ==================== API ====================
// Use JSONP-style script injection to bypass CORS completely

function jsonpRequest(url) {
  return new Promise((resolve, reject) => {
    const cbName = 'cb_' + Date.now() + '_' + Math.random().toString(36).slice(2);
    const timeout = setTimeout(() => {
      delete window[cbName];
      document.getElementById(cbName)?.remove();
      reject(new Error('timeout'));
    }, 10000);

    window[cbName] = function(data) {
      clearTimeout(timeout);
      delete window[cbName];
      document.getElementById(cbName)?.remove();
      resolve(data);
    };

    const script = document.createElement('script');
    script.id = cbName;
    script.src = url + '&callback=' + cbName;
    script.onerror = () => {
      clearTimeout(timeout);
      delete window[cbName];
      reject(new Error('script error'));
    };
    document.body.appendChild(script);
  });
}

async function loadData() {
  try {
    const data = await jsonpRequest(API_URL + '?action=read');
    records = {};
    if (data && data.records) {
      data.records.forEach(r => {
        records[r.date] = {
          time: r.time,
          beforeNoon: r.beforeNoon === true || r.beforeNoon === 'TRUE',
          mood: r.mood || '',
          note: r.note || '',
          timestamp: r.timestamp || 0
        };
      });
    }
    // Save to localStorage as backup
    localStorage.setItem('ivy-records', JSON.stringify(records));
  } catch (e) {
    console.error('Load failed:', e);
    // Try localStorage fallback
    const local = localStorage.getItem('ivy-records');
    if (local) records = JSON.parse(local);
  }
  document.getElementById('loading').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  render();
}

async function saveRecord(date, data) {
  // Save locally immediately
  records[date] = data;
  localStorage.setItem('ivy-records', JSON.stringify(records));
  render();

  // Sync to Google Sheets via JSONP
  try {
    const params = new URLSearchParams({
      action: 'add',
      date: date,
      time: data.time || '',
      beforeNoon: data.beforeNoon || false,
      mood: data.mood || '',
      note: data.note || '',
      timestamp: data.timestamp || Date.now()
    });
    await jsonpRequest(API_URL + '?' + params.toString());
  } catch (e) {
    console.error('Sync failed:', e);
  }
}

// ==================== REWARDS ====================
function calculateRewards() {
  const sorted = Object.entries(records)
    .sort(([a], [b]) => a.localeCompare(b))
    .map(([date, r]) => ({ date, ...r }));

  let streak = 0, totalThreeStreaks = 0;
  for (let i = 0; i < sorted.length; i++) {
    if (sorted[i].beforeNoon) {
      streak++;
      if (streak % 3 === 0) totalThreeStreaks++;
    } else {
      streak = 0;
    }
  }
  const currentStreak = streak % 3;

  let noodlesRedeemed = 0, luWeiRedeemed = 0;
  sorted.forEach(r => {
    if (r.noodleRedeemed) noodlesRedeemed += r.noodleRedeemed;
    if (r.luWeiRedeemed) luWeiRedeemed += r.luWeiRedeemed;
  });

  const noodlesAvailable = Math.max(0, totalThreeStreaks - noodlesRedeemed - luWeiRedeemed * 2);
  return { currentStreak, totalThreeStreaks, noodlesAvailable, luWeiRedeemed };
}

// ==================== RENDER ====================
function getToday() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
}

function formatDate(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${days[d.getDay()]}, ${months[d.getMonth()]} ${d.getDate()}`;
}

function render() {
  const rewards = calculateRewards();
  const today = getToday();
  const todayRec = records[today];

  // Streak boxes
  for (let i = 0; i < 3; i++) {
    const el = document.getElementById('s' + i);
    if (i < rewards.currentStreak) {
      el.className = 'streak-box streak-filled';
      el.textContent = '⭐';
    } else {
      el.className = 'streak-box streak-empty';
      el.textContent = '☆';
    }
  }
  document.getElementById('sReward').className = 'streak-box ' + (rewards.currentStreak >= 3 ? 'streak-reward-active' : 'streak-reward');

  // Rewards numbers
  document.getElementById('noodlesAvail').textContent = rewards.noodlesAvailable;
  document.getElementById('totalStreaks').textContent = rewards.totalThreeStreaks;
  document.getElementById('luWeiCount').textContent = rewards.luWeiRedeemed;

  // Redeem button
  const redeemBtn = document.getElementById('redeemBtn');
  if (rewards.noodlesAvailable > 0) {
    redeemBtn.classList.remove('hidden');
  } else {
    redeemBtn.classList.add('hidden');
  }

  // Today section
  if (todayRec) {
    document.getElementById('todayDone').classList.remove('hidden');
    document.getElementById('todayBtn').classList.add('hidden');
    document.getElementById('todayTime').textContent = todayRec.time;
    const badge = document.getElementById('todayBadge');
    badge.textContent = todayRec.beforeNoon ? '中午前出门 ⭐' : '中午后出门';
    badge.className = 'badge ' + (todayRec.beforeNoon ? 'badge-pass' : 'badge-fail');
    const moodInfo = MOODS.find(m => m.emoji === todayRec.mood);
    document.getElementById('todayMood').textContent = moodInfo ? `心情: ${moodInfo.emoji} ${moodInfo.label}` : '';
    document.getElementById('todayNote').textContent = todayRec.note ? `"${todayRec.note}"` : '';
  } else {
    document.getElementById('todayDone').classList.add('hidden');
    document.getElementById('todayBtn').classList.remove('hidden');
  }

  // Recent records (home tab, last 5)
  const sortedDates = Object.keys(records).sort((a, b) => b.localeCompare(a));
  const recentList = document.getElementById('recentList');
  recentList.innerHTML = '<div class="section-header">最近记录</div>';
  sortedDates.slice(0, 5).forEach(date => {
    const r = records[date];
    const moodStr = r.mood || '';
    recentList.innerHTML += `
      <div class="record-row">
        <div><span class="record-date">${formatDate(date)}</span>${moodStr ? ' <span>' + moodStr + '</span>' : ''}</div>
        <div style="display:flex;align-items:center;gap:8px">
          <span class="record-time">${r.time}</span>
          <span class="record-badge" style="color:${r.beforeNoon ? '#4CAF50' : '#FF6B6B'};background:${r.beforeNoon ? '#E8F5E9' : '#FFEBEE'}">${r.beforeNoon ? '✓' : '✗'}</span>
        </div>
      </div>`;
  });

  // History tab
  document.getElementById('historyCount').textContent = sortedDates.length;
  const historyList = document.getElementById('historyList');
  historyList.innerHTML = `<div class="section-header">全部记录 (${sortedDates.length})</div>`;
  if (sortedDates.length === 0) {
    historyList.innerHTML += '<div style="padding:30px 16px;text-align:center;color:#B0C4D8;font-size:14px">还没有记录哦，快去打卡吧 ☁️</div>';
  } else {
    sortedDates.forEach(date => {
      const r = records[date];
      historyList.innerHTML += `
        <div class="record-row">
          <div>
            <div class="record-date">${formatDate(date)}</div>
            ${r.note ? '<div style="font-size:11px;color:#B0C4D8;margin-top:2px">"' + r.note + '"</div>' : ''}
          </div>
          <div style="display:flex;align-items:center;gap:8px">
            ${r.mood ? '<span style="font-size:16px">' + r.mood + '</span>' : ''}
            <span style="font-size:15px;font-weight:700;color:#3A5A7C">${r.time}</span>
            <span class="record-badge" style="color:${r.beforeNoon ? '#4CAF50' : '#FF6B6B'};background:${r.beforeNoon ? '#E8F5E9' : '#FFEBEE'}">${r.beforeNoon ? '✓' : '✗'}</span>
          </div>
        </div>`;
    });
    // Stats
    const total = sortedDates.length;
    const passCount = sortedDates.filter(d => records[d].beforeNoon).length;
    const rate = Math.round(passCount / total * 100);
    historyList.innerHTML += `
      <div class="stats-bar">
        <div class="stat-item"><div class="stat-num" style="color:#5A9BC7">${total}</div><div class="stat-label">总记录</div></div>
        <div class="stat-item"><div class="stat-num" style="color:#4CAF50">${passCount}</div><div class="stat-label">中午前</div></div>
        <div class="stat-item"><div class="stat-num" style="color:${rate >= 50 ? '#4CAF50' : '#FF6B6B'}">${rate}%</div><div class="stat-label">达标率</div></div>
      </div>`;
  }
}

// ==================== UI ACTIONS ====================
function switchTab(tab) {
  document.getElementById('tabHome').className = 'tab-btn ' + (tab === 'home' ? 'tab-active' : 'tab-inactive');
  document.getElementById('tabHistory').className = 'tab-btn ' + (tab === 'history' ? 'tab-active' : 'tab-inactive');
  document.getElementById('homeTab').classList.toggle('hidden', tab !== 'home');
  document.getElementById('historyTab').classList.toggle('hidden', tab !== 'history');
}

function showForm(today) {
  isToday = today;
  document.getElementById('formDate').value = today ? getToday() : '';
  document.getElementById('formTime').value = '';
  document.getElementById('formNote').value = '';
  selectedMood = '';
  document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('active'));
  updateSubmitBtn();
  document.getElementById('formModal').classList.add('show');
}
function hideForm() { document.getElementById('formModal').classList.remove('show'); }

function showRedeem() {
  const r = calculateRewards();
  document.getElementById('redeemInfo').textContent = '当前可用泡面券: ' + r.noodlesAvailable;
  const nb = document.getElementById('redeemNoodleBtn');
  const lb = document.getElementById('redeemLuWeiBtn');
  nb.className = 'redeem-btn ' + (r.noodlesAvailable >= 1 ? 'enabled' : 'disabled');
  lb.className = 'redeem-btn ' + (r.noodlesAvailable >= 2 ? 'enabled' : 'disabled');
  nb.disabled = r.noodlesAvailable < 1;
  lb.disabled = r.noodlesAvailable < 2;
  document.getElementById('redeemModal').classList.add('show');
}
function hideRedeem() { document.getElementById('redeemModal').classList.remove('show'); }

async function submitRecord() {
  const date = document.getElementById('formDate').value;
  const time = document.getElementById('formTime').value;
  if (!date || !time) return;

  const hour = parseInt(time.split(':')[0]);
  const min = parseInt(time.split(':')[1]);
  const beforeNoon = hour < 12 || (hour === 12 && min === 0);

  const oldRewards = calculateRewards();

  const data = { time, beforeNoon, mood: selectedMood, note: document.getElementById('formNote').value, timestamp: Date.now() };
  await saveRecord(date, data);

  const newRewards = calculateRewards();
  if (newRewards.totalThreeStreaks > oldRewards.totalThreeStreaks) {
    showCelebration('🍜', '三连胜达成！获得满汉全席泡面 x1！');
  }

  hideForm();
}

async function redeem(type) {
  const r = calculateRewards();
  if (type === 'noodle' && r.noodlesAvailable < 1) return;
  if (type === 'luwei' && r.noodlesAvailable < 2) return;

  const today = getToday();
  const rec = records[today] || {};
  if (type === 'noodle') {
    rec.noodleRedeemed = (rec.noodleRedeemed || 0) + 1;
    showCelebration('🍜✨', '满汉全席泡面已兑换！');
  } else {
    rec.luWeiRedeemed = (rec.luWeiRedeemed || 0) + 1;
    showCelebration('🫕✨', '卤味已兑换！好好享受！');
  }
  await saveRecord(today, rec);
  hideRedeem();
}

function showCelebration(emoji, text) {
  document.getElementById('celebEmoji').textContent = emoji;
  document.getElementById('celebText').textContent = text;
  document.getElementById('celebration').classList.add('show');
  setTimeout(() => document.getElementById('celebration').classList.remove('show'), 2500);
}
</script>
