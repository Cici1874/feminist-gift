// ============= 工具函数 =============
function srand(s){return()=>{s=(s*16807)%2147483647;return(s-1)/2147483646}}
const START=new Date(2026,4,25);
function dayN(){return Math.max(0,Math.floor((new Date()-START)/864e5))}
function fmtDate(){return new Date().toLocaleDateString("zh-CN",{year:"numeric",month:"long",day:"numeric",weekday:"long"})}

function daily(d){
  const r=srand(d*31+7);
  // 从所有人物卡里抽4张（不重复pool优先，但不强制）
  const shuffled=[...ALL_CARDS].sort(()=>r()-0.5);
  const picked=[];
  const usedPools=new Set();
  // 优先从不同pool里各抽一张
  for(const c of shuffled){
    if(picked.length>=4)break;
    if(!usedPools.has(c.pool)){
      picked.push({...c,cType:"p"});
      usedPools.add(c.pool);
    }
  }
  // 如果不够4张（不太可能），从剩余的补
  for(const c of shuffled){
    if(picked.length>=4)break;
    if(!picked.find(p=>p.id===c.id)){
      picked.push({...c,cType:"p"});
    }
  }
  // 1张纸条
  const note=NOTES[Math.floor(r()*NOTES.length)];
  picked.push({...note,cType:"n"});
  return picked;
}

  const MapView=()=>{
    const W=800,H=440;
    const mapContRef=useRef(null);
    const[mapT,setMapT]=useState({scale:1,x:0,y:0});
    const pinchRef=useRef({dist:0,scale:1,x:0,y:0,dragging:false,startX:0,startY:0,lastX:0,lastY:0});

    const groups=useMemo(()=>{
      const all=ALL_CARDS.filter(c=>c.lat!=null&&c.lng!=null);
      const g={};
      all.forEach(c=>{const k=`${c.lat},${c.lng}`;if(!g[k])g[k]={lat:c.lat,lng:c.lng,reg:c.reg,cards:[]};g[k].cards.push(c);});
      return Object.values(g);
    },[]);

    const clamp=(v,min,max)=>Math.max(min,Math.min(max,v));
    const getDist=(t)=>Math.hypot(t[0].clientX-t[1].clientX,t[0].clientY-t[1].clientY);
    const getMid=(t)=>({x:(t[0].clientX+t[1].clientX)/2,y:(t[0].clientY+t[1].clientY)/2});

    const onTS=useCallback((e)=>{
      const t=e.touches;
      if(t.length===2){
        e.preventDefault();
        pinchRef.current={...pinchRef.current,dist:getDist(t),scale:mapT.scale,x:mapT.x,y:mapT.y,dragging:false};
      }else if(t.length===1&&mapT.scale>1){
        e.preventDefault();
        pinchRef.current={...pinchRef.current,dragging:true,startX:t[0].clientX-mapT.x,startY:t[0].clientY-mapT.y};
      }
    },[mapT]);

    const onTM=useCallback((e)=>{
      const t=e.touches;
      if(t.length===2){
        e.preventDefault();
        const newDist=getDist(t);
        const ratio=newDist/pinchRef.current.dist;
        const newScale=clamp(pinchRef.current.scale*ratio,1,5);
        if(!mapContRef.current)return;
        const rect=mapContRef.current.getBoundingClientRect();
        const mid=getMid(t);
        const cx=mid.x-rect.left,cy=mid.y-rect.top;
        const maxPan=(newScale-1)*Math.max(rect.width,rect.height)/2;
        let nx=pinchRef.current.x+(cx-rect.width/2)*(1-ratio);
        let ny=pinchRef.current.y+(cy-rect.height/2)*(1-ratio);
        nx=clamp(nx,-maxPan,maxPan);ny=clamp(ny,-maxPan,maxPan);
        setMapT({scale:newScale,x:nx,y:ny});
      }else if(t.length===1&&pinchRef.current.dragging){
        e.preventDefault();
        const rect=mapContRef.current.getBoundingClientRect();
        const maxPan=(mapT.scale-1)*Math.max(rect.width,rect.height)/2;
        let nx=t[0].clientX-pinchRef.current.startX;
        let ny=t[0].clientY-pinchRef.current.startY;
        nx=clamp(nx,-maxPan,maxPan);ny=clamp(ny,-maxPan,maxPan);
        setMapT(p=>({...p,x:nx,y:ny}));
      }
    },[mapT]);

    const onTE=useCallback(()=>{pinchRef.current.dragging=false;},[]);

    const resetZoom=()=>setMapT({scale:1,x:0,y:0});

    return(<div>
      <div style={{position:"relative"}}>
        <div ref={mapContRef}
          onTouchStart={onTS} onTouchMove={onTM} onTouchEnd={onTE}
          style={{background:"rgba(255,255,255,.5)",borderRadius:16,padding:8,overflow:"hidden",border:"1px solid rgba(180,160,140,.15)",touchAction:"none"}}>
          <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height:"auto",display:"block",transform:`scale(${mapT.scale}) translate(${mapT.x/mapT.scale}px,${mapT.y/mapT.scale}px)`,transformOrigin:"center center",transition:pinchRef.current.dragging?"none":"transform 0.1s ease"}}>
            <rect x="0" y="0" width={W} height={H} fill="#f0ebe3" rx="8"/>
            {Object.entries(MAP_PATHS).map(([name,d])=>(
              <path key={name} d={d} fill="#ddd4c6" stroke="#c8bfb0" strokeWidth="1" opacity=".8"/>
            ))}
            {groups.map((g,i)=>{
              const[x,y]=proj(g.lat,g.lng,W,H);
              const total=g.cards.length;
              const r=Math.min(20,7+total*0.8);
              const sel=mapSel===i;
              const mainPool=g.cards.reduce((acc,c)=>{acc[c.pool]=(acc[c.pool]||0)+1;return acc},{});
              const topPool=Object.entries(mainPool).sort((a,b)=>b[1]-a[1])[0][0];
              const color=getPoolColor(topPool);
              return(<g key={i} onClick={e=>{e.stopPropagation();setMapSel(sel?null:i)}} style={{cursor:"pointer"}}>
                {sel&&<circle cx={x} cy={y} r={r+6} fill={color} opacity=".2"/>}
                <circle cx={x} cy={y} r={r} fill={color} opacity={sel?.95:.75} stroke={sel?"#3a2a1a":"#fff"} strokeWidth={sel?2:1}/>
                <text x={x} y={y+1} textAnchor="middle" dominantBaseline="middle" fill="#fff" fontSize={total>9?8:10} fontWeight="600">{total}</text>
                {mapT.scale>=1.5&&<text x={x} y={y+r+10} textAnchor="middle" fill="#7a6a5a" fontSize="7" fontFamily="'Noto Serif SC',serif">{g.reg}</text>}
              </g>);
            })}
            {mapT.scale<1.5&&<g transform={`translate(15,${H-16})`}>
              <text x="0" y="0" fill="#a09080" fontSize="8" fontFamily="'Noto Serif SC',serif">双指缩放 · 点击圆点查看</text>
            </g>}
          </svg>
        </div>
        {mapT.scale>1.05&&<button onClick={resetZoom} style={{position:"absolute",top:16,right:16,background:"rgba(255,255,255,.85)",border:"1px solid rgba(180,160,140,.3)",borderRadius:20,padding:"4px 12px",fontSize:11,color:"#8a7a6a",cursor:"pointer",backdropFilter:"blur(4px)"}}>重置缩放</button>}
      </div>
      {mapSel!==null&&groups[mapSel]&&(<div style={{marginTop:16,animation:"fu .3s ease"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <h3 style={{fontSize:15,color:"#4a3728",fontWeight:500,fontFamily:ff}}>{groups[mapSel].reg} <span style={{fontSize:12,fontWeight:400,color:"#b0a090"}}>({groups[mapSel].cards.length})</span></h3>
          <button onClick={()=>setMapSel(null)} style={{background:"none",border:"none",fontSize:12,color:"#b0a090",cursor:"pointer"}}>收起</button>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {groups[mapSel].cards.map(c=>(<div key={c.id} onClick={()=>setOpen({...c,cType:"p"})} style={{background:"rgba(255,255,255,.6)",borderRadius:12,padding:"12px 16px",cursor:"pointer",borderLeft:`3px solid ${getPoolColor(c.pool)}`}}>
            <div style={{display:"flex",alignItems:"baseline",gap:6,flexWrap:"wrap"}}><Name card={c}/><span style={{fontSize:9,color:"#fff",background:getPoolColor(c.pool),padding:"1px 6px",borderRadius:6}}>{POOLS[c.pool]?.label||""}</span></div>
            <p style={{fontSize:11,color:"#9a8a7a",marginTop:3}}>{c.era}</p>
          </div>))}
        </div>
      </div>)}
    </div>);
  };

  const Browse=()=>{
    const pool=POOLS[browsePool];
    const poolCards=pool?pool.cards:[];
    return(<div>
      {/* 模式切换: 列表 / 地图 */}
      <div style={{display:"flex",gap:6,marginBottom:12}}>
        {[["list","📋 按领域"],["map","🗺️ 世界地图"]].map(([k,lb])=>(
          <button key={k} onClick={()=>{setBrowseMode(k);setMapSel(null)}} style={{flex:1,padding:"10px 0",borderRadius:12,border:"none",fontSize:13,fontFamily:ff,letterSpacing:1,cursor:"pointer",background:browseMode===k?"linear-gradient(135deg,#c4956a,#b8866a)":"rgba(255,255,255,.5)",color:browseMode===k?"#fff":"#8a7a6a"}}>{lb}</button>
        ))}
      </div>
      {browseMode==="map"&&<MapView/>}
      {browseMode==="list"&&<>
        {/* Pool选择器 - 横向滚动（保持位置） */}
        <div ref={scrollRef} style={{overflowX:"auto",marginBottom:16,paddingBottom:8,WebkitOverflowScrolling:"touch"}}>
          <div style={{display:"flex",gap:6,minWidth:"max-content"}}>
            {POOL_KEYS.map(k=>{
              const p=POOLS[k];
              const active=browsePool===k;
              return(<button key={k} data-pool={k} onClick={()=>handlePoolClick(k)} style={{
                padding:"8px 14px",borderRadius:12,border:"none",fontSize:12,
                fontFamily:ff,letterSpacing:1,cursor:"pointer",whiteSpace:"nowrap",flexShrink:0,
                background:active?getPoolColor(k):"rgba(255,255,255,.5)",
                color:active?"#fff":"#8a7a6a",
                boxShadow:active?"0 2px 8px rgba(0,0,0,.15)":"none",
                transition:"all .2s"
              }}>{p.label} <span style={{opacity:.7,fontSize:10}}>({p.cards.length})</span></button>);
            })}
          </div>
        </div>
        {/* 卡片列表 */}
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          {poolCards.map(c=>(<div key={c.id} onClick={()=>setOpen({...c,cType:"p"})} style={{
            background:"rgba(255,255,255,.6)",borderRadius:14,padding:"16px 18px",
            cursor:"pointer",borderLeft:`3px solid ${getPoolColor(browsePool)}`
          }}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div style={{display:"flex",alignItems:"baseline",gap:6,flexWrap:"wrap"}}><Name card={c}/></div>
              {iF(c.id)&&<span style={{color:"#c4956a",fontSize:14}}>♥</span>}
            </div>
            <p style={{fontSize:12,color:"#9a8a7a",marginTop:4}}>{[c.era,c.reg,c.sch,c.tp].filter(Boolean).join(" · ")}</p>
            {c.q&&<p style={{fontSize:12,color:"#8a7a6a",marginTop:6,fontStyle:"italic",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.q}</p>}
          </div>))}
        </div>
      </>}
    </div>);
  };

  // ============= 纸条盒 =============
  const Favs=()=>{
    const allSearchable=[...ALL_CARDS.map(c=>({...c,cType:"p"})),...NOTES.map(c=>({...c,cType:"n"}))];
    const fav=allSearchable.filter(c=>favs[c.id]).sort((a,b)=>new Date(favs[b.id])-new Date(favs[a.id]));
    if(!fav.length)return(<div style={{textAlign:"center",padding:"60px 20px",color:"#b0a090"}}><div style={{fontSize:48,marginBottom:16}}>📦</div><p style={{fontSize:14,lineHeight:1.8}}>纸条盒还是空的</p><p style={{fontSize:13,marginTop:8}}>翻开卡片，点 ♡ 收藏喜欢的内容</p></div>);
    return(<div style={{display:"flex",flexDirection:"column",gap:12}}>
      <p style={{fontSize:12,color:"#b0a090",letterSpacing:2,marginBottom:4}}>已收藏 {fav.length} 张纸条</p>
      {fav.map((c,i)=>(<div key={c.id}><div style={{fontSize:10,color:"#c0b0a0",marginBottom:4,paddingLeft:4}}>收藏于 {new Date(favs[c.id]).toLocaleDateString("zh-CN",{month:"long",day:"numeric"})}</div><CP card={c} idx={Math.min(i,4)}/></div>))}
    </div>);
  };

  // ============= 主页面 =============
  return(<div style={{minHeight:"100vh",background:bg,fontFamily:ff,paddingBottom:80}}>
    <div style={{padding:"24px 20px 16px",textAlign:"center"}}>
      <h1 style={{fontSize:18,fontWeight:400,color:"#4a3728",letterSpacing:4,margin:0}}>{tab==="today"?"今日纸条":tab==="browse"?"自由翻阅":"纸条盒"}</h1>
      {tab==="today"&&<><p style={{fontSize:12,color:"#b0a090",marginTop:6,letterSpacing:1}}>{fmtDate()}</p><p style={{fontSize:11,color:"#c4956a",marginTop:4}}>第 {dn+1} 天</p></>}
    </div>
    <div style={{padding:"0 16px"}}>
      {tab==="today"&&<div style={{display:"flex",flexDirection:"column",gap:14}}>{cards.map((c,i)=><CP key={c.id+i} card={c} idx={i}/>)}</div>}
      {tab==="browse"&&<Browse/>}
      {tab==="favorites"&&<Favs/>}
    </div>
    <div style={{position:"fixed",bottom:0,left:0,right:0,background:"rgba(250,246,240,.95)",backdropFilter:"blur(20px)",borderTop:"1px solid rgba(180,160,140,.15)",display:"flex",justifyContent:"space-around",padding:"10px 0",zIndex:50}}>
      {[["today","📜","今日"],["browse","📚","翻阅"],["favorites","📦","纸条盒"]].map(([k,ic,lb])=>(<button key={k} onClick={()=>setTab(k)} style={{background:"none",border:"none",display:"flex",flexDirection:"column",alignItems:"center",gap:2,cursor:"pointer",padding:"4px 16px",opacity:tab===k?1:.45}}><span style={{fontSize:20}}>{ic}</span><span style={{fontSize:10,color:"#5a4a3a",letterSpacing:1,fontFamily:ff}}>{lb}</span></button>))}
    </div>

    {/* Update Log Modal */}
    {showUpdateLog&&page==="main"&&<div style={{position:"fixed",inset:0,background:"rgba(40,30,20,.5)",backdropFilter:"blur(6px)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:20}} onClick={dismissUpdateLog}>
      <div style={{background:"linear-gradient(170deg,#faf8f4,#f5f0e8)",borderRadius:20,padding:"28px 24px",maxWidth:380,width:"100%",maxHeight:"75vh",overflow:"auto",boxShadow:"0 16px 48px rgba(40,30,20,.3)"}} onClick={e=>e.stopPropagation()}>
        <div style={{textAlign:"center",marginBottom:20}}>
          <div style={{fontSize:32,marginBottom:8}}>🎉</div>
          <h2 style={{fontSize:18,fontWeight:500,color:"#4a3728",fontFamily:ff,letterSpacing:2}}>每日纸条 v{APP_VERSION}</h2>
          <p style={{fontSize:12,color:"#b0a090",marginTop:4}}>更新日志</p>
        </div>
        {UPDATE_LOG.slice(0,2).map(log=>(
          <div key={log.ver} style={{marginBottom:16}}>
            <p style={{fontSize:12,color:"#c4956a",marginBottom:8,fontWeight:500}}>{log.ver} · {log.date}</p>
            <div style={{fontSize:13,color:"#5a4a3a",lineHeight:2}}>
              {log.items.map((item,i)=><p key={i} style={{paddingLeft:12,textIndent:"-12px"}}>· {item}</p>)}
            </div>
          </div>
        ))}
        <div style={{textAlign:"center",marginTop:20}}>
          <button onClick={dismissUpdateLog} style={{background:"linear-gradient(135deg,#c4956a,#b8866a)",color:"#fff",border:"none",borderRadius:24,padding:"10px 36px",fontSize:14,letterSpacing:2,cursor:"pointer",fontFamily:"inherit",boxShadow:"0 4px 16px rgba(180,130,90,.3)"}}>知道了</button>
        </div>
      </div>
    </div>}
    <Modal/>
  </div>);
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
